ckground:#fcebea}.diff-line.meta{color:#777;font-style:italic}.diff-add{color:#288447}.diff-del{color:#c33b32}.diff-empty,.diff-error{margin:auto;padding:32px;color:var(--muted,#79736b);text-align:center}.diff-error{color:#b42318}@media(max-width:760px){.diff-layout{grid-template-columns:1fr}.diff-files{max-height:180px;border-right:0;border-bottom:1px solid var(--border,#dedbd4)}}
