      - name: Format Rust
        run: cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml --all
      - name: Install desktop dependencies
        working-directory: apps/medusa-desktop
        run: npm ci
      - name: Validate implementation
        run: |
          cargo test --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml diffs::tests
          cargo clippy --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
          cd apps/medusa-desktop
          npm run typecheck
          npm test
          npm run build
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/medusa-desktop
          git commit -m "Add desktop multi-file diff viewer"
          git push origin HEAD:agent/desktop-multi-file-diff-viewer
