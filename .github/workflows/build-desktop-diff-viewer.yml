          marker = 'export interface RuntimeActivity {'
          types = r'''export type DiffStatus = "added" | "deleted" | "modified" | "renamed";
export type DiffLineKind = "context" | "addition" | "deletion" | "meta";

export interface DiffLine {
  kind: DiffLineKind;
  oldLine?: number;
  newLine?: number;
  text: string;
}

export interface DiffHunk {
  header: string;
  lines: DiffLine[];
}

export interface DiffFile {
  oldPath: string;
  newPath: string;
  status: DiffStatus;
  binary: boolean;
  additions: number;
  deletions: number;
  hunks: DiffHunk[];
}

export interface RepositoryDiff {
  files: DiffFile[];
  additions: number;
  deletions: number;
}

'''
          text = text.replace(marker, types + marker)
          text += '\nexport async function readRuntimeDiff(repo: string): Promise<RepositoryDiff> {\n  return invoke<RepositoryDiff>("runtime_read_diff", { repo });\n}\n'
          runtime.write_text(text, encoding='utf-8')

          (web / 'DiffViewer.tsx').write_text(r'''import { FileCode2, RefreshCw } from "lucide-react";
import { useCallback, useEffect, useMemo, useState } from "react";
import { readRuntimeDiff, type DiffFile, type RepositoryDiff } from "./runtime";

function displayPath(file: DiffFile): string {
  return file.status === "deleted" ? file.oldPath : file.newPath;
}

export function DiffViewer({ repo }: { repo: string }) {
  const [diff, setDiff] = useState<RepositoryDiff>({ files: [], additions: 0, deletions: 0 });
  const [selectedPath, setSelectedPath] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState<string>();

  const refresh = useCallback(async () => {
    if (!repo) return;
    setLoading(true);
    setError(undefined);
    try {
      const next = await readRuntimeDiff(repo);
      setDiff(next);
      setSelectedPath((current) => next.files.some((file) => displayPath(file) === current)
        ? current
        : next.files[0] ? displayPath(next.files[0]) : "");
    } catch (cause) {
      setError(String(cause));
    } finally {
      setLoading(false);
    }
  }, [repo]);

  useEffect(() => { void refresh(); }, [refresh]);
  const selected = useMemo(
    () => diff.files.find((file) => displayPath(file) === selectedPath),
    [diff.files, selectedPath],
  );

  if (!repo) return <div className="diff-empty">Open a repository to inspect working-tree changes.</div>;

  return (
    <div className="diff-viewer">
      <header className="diff-toolbar">
        <div>
          <h2>Working tree changes</h2>
          <p>{diff.files.length} files <span className="diff-add">+{diff.additions}</span> <span className="diff-del">−{diff.deletions}</span></p>
        </div>
        <button onClick={() => void refresh()} disabled={loading} aria-label="Refresh changes"><RefreshCw size={15} /> {loading ? "Refreshing" : "Refresh"}</button>
      </header>
      {error && <div className="diff-error">{error}</div>}
      {!diff.files.length && !loading ? <div className="diff-empty">No tracked changes against HEAD.</div> : (
        <div className="diff-layout">
          <nav className="diff-files" aria-label="Changed files">
            {diff.files.map((file) => {
              const path = displayPath(file);
              return <button key={`${file.oldPath}-${file.newPath}`} className={path === selectedPath ? "active" : ""} onClick={() => setSelectedPath(path)}>
                <FileCode2 size={14} /><span><strong>{path}</strong><small>{file.status}</small></span><em className="diff-add">+{file.additions}</em><em className="diff-del">−{file.deletions}</em>
              </button>;
            })}
          </nav>
          <section className="diff-file" aria-live="polite">
            {selected && <>
              <header><strong>{displayPath(selected)}</strong>{selected.status === "renamed" && <small>{selected.oldPath} → {selected.newPath}</small>}</header>
              {selected.binary ? <div className="diff-empty">Binary file changed. Text preview is unavailable.</div> : selected.hunks.map((hunk, hunkIndex) => (
                <div className="diff-hunk" key={`${hunk.header}-${hunkIndex}`}>
                  <div className="diff-hunk-header">{hunk.header}</div>
                  {hunk.lines.map((line, lineIndex) => <div className={`diff-line ${line.kind}`} key={`${hunkIndex}-${lineIndex}`}>
                    <span>{line.oldLine ?? ""}</span><span>{line.newLine ?? ""}</span><code>{line.kind === "addition" ? "+" : line.kind === "deletion" ? "−" : " "}{line.text}</code>
                  </div>)}
                </div>
              ))}
            </>}
          </section>
        </div>
      )}
    </div>
  );
}
