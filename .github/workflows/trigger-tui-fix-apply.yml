name: Trigger TUI fix application

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/tui-markdown-scrollback-terse-chat'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Extract embedded patch
        shell: python
        run: |
          from pathlib import Path
          import base64

          source = Path('.github/workflows/apply-tui-fixes.yml').read_text()
          lines = source.splitlines()
          start = next(i for i, line in enumerate(lines) if "<<'PATCH_EOF'" in line) + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PATCH_EOF')
          encoded = ''.join(line.strip() for line in lines[start:end])
          patch = base64.b64decode(encoded, validate=True)
          Path('/tmp/tui.patch').write_bytes(patch)
          print(f'extracted {len(patch)} patch bytes')
      - name: Apply and publish code changes
        shell: bash
        run: |
          set -euxo pipefail
          patch --batch --forward -p1 < /tmp/tui.patch
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-agent/src/engine.rs \
            crates/medusa-tui/src/app.rs \
            crates/medusa-tui/src/app/tests.rs \
            crates/medusa-tui/src/lib.rs \
            crates/medusa-tui/src/render.rs \
            crates/medusa-tui/src/render/markdown.rs \
            crates/medusa-tui/src/session.rs
          git diff --cached --stat
          git commit -m "tui: fix markdown scrollback and concise chat"
          git push origin HEAD
