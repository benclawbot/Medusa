name: PR 173 test contract repair

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  repair:
    if: github.event.issue.pull_request && github.event.issue.number == 173 && github.event.comment.body == '/repair-pr-173-tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/medusa-limitations-batch
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Update immediate-submit test contract
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/medusa-tui/src/app/tests.rs')
          text = path.read_text()

          text = text.replace(
              'fn question_modal_tabs_answers_and_requires_confirmation_before_submission() {',
              'fn question_modal_tabs_answers_and_submits_final_selection_immediately() {',
              1,
          )

          old_multi = '''    assert_eq!(
        app.handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("answer second question"),
        AppAction::Redraw
    );
    assert!(app.question_modal().expect("review answers").is_reviewing());
    assert_eq!(app.transcript.len(), 1);
    let action = app
        .handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("confirm answers");
'''
          new_multi = '''    let action = app
        .handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("answer second question and submit answers");
'''
          if old_multi not in text:
              raise SystemExit('multi-question legacy confirmation assertion not found')
          text = text.replace(old_multi, new_multi, 1)

          text = text.replace(
              'fn clarification_question_and_confirmed_answer_stay_in_transcript() {',
              'fn clarification_question_and_immediate_answer_stay_in_transcript() {',
              1,
          )
          old_single = '''    assert_eq!(
        app.handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("select answer"),
        AppAction::Redraw
    );
    let action = app
        .handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("confirm answer");
'''
          new_single = '''    let action = app
        .handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("select and submit answer");
'''
          if old_single not in text:
              raise SystemExit('single-question legacy confirmation assertion not found')
          text = text.replace(old_single, new_single, 1)
          path.write_text(text)
          PY
      - name: Validate TUI contract
        run: |
          cargo fmt --all -- --check
          cargo test -p medusa-tui
          cargo clippy -p medusa-tui --all-targets -- -D warnings
      - name: Commit repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-tui/src/app/tests.rs
          git commit -m "test(tui): expect immediate question submission"
          git push origin HEAD:fix/medusa-limitations-batch
