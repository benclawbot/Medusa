name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply compiler fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply lifetime fix
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-intelligence/src/lib.rs')
          text = path.read_text()
          old = "fn text(source: &str, node: Node<'_>) -> MedusaResult<&str> {"
          new = "fn text<'a>(source: &'a str, node: Node<'_>) -> MedusaResult<&'a str> {"
          if text.count(old) != 1:
              raise SystemExit('expected exactly one lifetime signature')
          path.write_text(text.replace(old, new))
          PY
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-intelligence/src/lib.rs
          git commit -m "fix: tie syntax text lifetime to source"
          git push

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo generate-lockfile
      - run: cargo deny check advisories sources
      - run: cargo audit
