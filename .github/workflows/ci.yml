name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply live-agent integrity fixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Patch verification and atomic-write integrity
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('crates/medusa-agent/src/lib.rs')
          text = path.read_text()

          text, prompt_count = re.subn(
              r'const SYSTEM_PROMPT: &str = ".*?";',
              'const SYSTEM_PROMPT: &str = "You are Medusa, an autonomous coding agent. Inspect the repository, make the smallest correct change, and verify it. Use tools rather than inventing repository contents. Never modify tests, verification scripts, snapshots, fixtures, or expected outputs unless the user explicitly asks for that exact change; fix the product code instead. Do not expose private chain-of-thought; provide concise decisions and evidence.";',
              text,
              count=1,
          )
          text, shell_count = re.subn(
              r'Some\(\("sh",\s*vec!\["verify\.sh"\]\)\)',
              'Some(("bash", vec!["verify.sh"]))',
              text,
              count=1,
          )
          text, write_count = re.subn(
              r'(?P<indent>\s*)let temporary = path\.with_extension\("medusa-tmp"\);\s*fs::write\(&temporary, content\)\?;\s*fs::rename\(&temporary, &path\)\?;',
              lambda match: (
                  f'{match.group("indent")}let original_permissions = fs::metadata(&path)\n'
                  f'{match.group("indent")}    .ok()\n'
                  f'{match.group("indent")}    .map(|metadata| metadata.permissions());\n'
                  f'{match.group("indent")}let temporary = path.with_extension("medusa-tmp");\n'
                  f'{match.group("indent")}fs::write(&temporary, content)?;\n'
                  f'{match.group("indent")}if let Some(permissions) = original_permissions {{\n'
                  f'{match.group("indent")}    fs::set_permissions(&temporary, permissions)?;\n'
                  f'{match.group("indent")}}}\n'
                  f'{match.group("indent")}fs::rename(&temporary, &path)?;'
              ),
              text,
              count=1,
          )

          if prompt_count != 1 or shell_count != 1 or write_count != 1:
              raise SystemExit(
                  f'patch counts prompt={prompt_count} shell={shell_count} write={write_count}'
              )
          if 'Never modify tests' not in text or 'Some(("bash", vec!["verify.sh"]))' not in text:
              raise SystemExit('post-patch integrity assertion failed')
          path.write_text(text)
          PY
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-agent/src/lib.rs
          git commit -m "fix: preserve verifier integrity in live agent runs"
          git push

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check advisories sources
      - run: cargo audit
