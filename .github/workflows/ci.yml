name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Apply rustfmt to extraction
        shell: bash
        run: |
          cargo fmt --all
          if ! git diff --quiet; then
            git config user.name "medusa-ci"
            git config user.email "medusa-ci@users.noreply.github.com"
            git add Cargo.lock crates/medusa-agent/src
            git commit -m "style(agent): apply rustfmt to extracted modules"
            git push
          fi
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Full workspace tests
        run: cargo test --workspace --all-features --locked
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check advisories sources
      - run: cargo audit
