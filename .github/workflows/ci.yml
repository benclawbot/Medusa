name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply Phase 8 runtime enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Wire policy, containment, sandbox, and patch tools
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/medusa-agent/src/lib.rs')
          text = path.read_text()

          text = text.replace(
              'use medusa_core::{CorrelationId, ErrorCategory, ErrorCode, MedusaError, MedusaResult, SessionId};\n',
              'use medusa_core::{CorrelationId, ErrorCategory, ErrorCode, MedusaError, MedusaResult, SessionId};\n'
              'use medusa_intelligence::{CodeIndex, PatchTransaction, TextEdit, format_changed, select_tests};\n',
              1,
          )

          checkpoint = '''        tool(
            "git_checkpoint",
            "Stage all changes and create a Git checkpoint commit.",'''
          new_tools = '''        tool(
            "code_index",
            "Build the Tree-sitter Rust symbol/reference index and optionally query one identifier.",
            json!({
                "type": "object",
                "properties": {"name": {"type": "string"}},
                "additionalProperties": false
            }),
        ),
        tool(
            "patch_apply",
            "Apply a guarded atomic multi-file byte-range patch transaction.",
            json!({
                "type": "object",
                "properties": {
                    "edits": {
                        "type": "array",
                        "items": {
                            "type": "object",
                            "properties": {
                                "path": {"type": "string"},
                                "start_byte": {"type": "integer", "minimum": 0},
                                "end_byte": {"type": "integer", "minimum": 0},
                                "expected": {"type": "string"},
                                "replacement": {"type": "string"}
                            },
                            "required": ["path", "start_byte", "end_byte", "expected", "replacement"],
                            "additionalProperties": false
                        }
                    }
                },
                "required": ["edits"],
                "additionalProperties": false
            }),
        ),
        tool(
            "symbol_rename",
            "Rename one Rust identifier across indexed definitions and references using a guarded transaction.",
            json!({
                "type": "object",
                "properties": {
                    "old_name": {"type": "string"},
                    "new_name": {"type": "string"}
                },
                "required": ["old_name", "new_name"],
                "additionalProperties": false
            }),
        ),
'''
          if text.count(checkpoint) != 1:
              raise SystemExit('git_checkpoint tool marker missing')
          text = text.replace(checkpoint, new_tools + checkpoint, 1)

          shell_start = text.index('        "shell_run" => {')
          checkpoint_start = text.index('        "git_checkpoint" => {', shell_start)
          replacement = '''        "code_index" => {
            let index = CodeIndex::build(repo)?;
            if let Some(name) = input.get("name").and_then(Value::as_str) {
                Ok(serde_json::to_string_pretty(&json!({
                    "definitions": index.definitions(name),
                    "references": index.references(name),
                    "parse_errors": index.parse_errors,
                }))?)
            } else {
                Ok(serde_json::to_string_pretty(&index)?)
            }
        }
        "patch_apply" => {
            let edits = input
                .get("edits")
                .and_then(Value::as_array)
                .ok_or_else(|| invalid_tool("edits must be an array"))?;
            let mut transaction = PatchTransaction::new();
            for edit in edits {
                let relative = input_string(edit, "path")?;
                let _ = safe_path(repo, relative)?;
                transaction.add_edit(TextEdit {
                    path: PathBuf::from(relative),
                    start_byte: input_usize(edit, "start_byte")?,
                    end_byte: input_usize(edit, "end_byte")?,
                    expected: input_string(edit, "expected")?.to_owned(),
                    replacement: input_string(edit, "replacement")?.to_owned(),
                })?;
            }
            let receipt = transaction.commit(repo)?;
            let formatting = format_changed(repo, &receipt.changed_paths)?;
            let impact = select_tests(&receipt.changed_paths);
            Ok(serde_json::to_string_pretty(&json!({
                "receipt": receipt,
                "formatting": formatting,
                "test_impact": impact,
            }))?)
        }
        "symbol_rename" => {
            let old_name = input_string(input, "old_name")?;
            let new_name = input_string(input, "new_name")?;
            let index = CodeIndex::build(repo)?;
            let mut transaction = PatchTransaction::new();
            let references = transaction.rename_symbol(&index, old_name, new_name)?;
            for reference in index.references(old_name) {
                let _ = safe_path(repo, reference.path.to_string_lossy().as_ref())?;
            }
            let receipt = transaction.commit(repo)?;
            let formatting = format_changed(repo, &receipt.changed_paths)?;
            let impact = select_tests(&receipt.changed_paths);
            Ok(serde_json::to_string_pretty(&json!({
                "renamed_references": references,
                "receipt": receipt,
                "formatting": formatting,
                "test_impact": impact,
            }))?)
        }
        "shell_run" => {
            let program = input_string(input, "program")?;
            let args = input
                .get("args")
                .and_then(Value::as_array)
                .ok_or_else(|| invalid_tool("args must be an array"))?
                .iter()
                .map(|value| {
                    value
                        .as_str()
                        .map(str::to_owned)
                        .ok_or_else(|| invalid_tool("every arg must be a string"))
                })
                .collect::<MedusaResult<Vec<_>>>()?;
            validate_shell_command(program, &args)?;
            let output = sandboxed_command(repo, program, &args)?;
            let evidence = format_command_output(program, &args, &output.stdout, &output.stderr);
            if output.status.success() {
                Ok(evidence.join("\\n"))
            } else {
                Err(MedusaError::new(
                    ErrorCode::ToolExecutionFailed,
                    ErrorCategory::Execution,
                    evidence.join("\\n"),
                ))
            }
        }
'''
          text = text[:shell_start] + replacement + text[checkpoint_start:]

          safe_start = text.index('fn safe_path(repo: &Path, relative: &str) -> MedusaResult<PathBuf> {')
          input_start = text.index('fn input_string', safe_start)
          helpers = r'''fn safe_path(repo: &Path, relative: &str) -> MedusaResult<PathBuf> {
    let path = Path::new(relative);
    if path.as_os_str().is_empty()
        || path.is_absolute()
        || path.components().any(|component| {
            matches!(
                component,
                Component::ParentDir | Component::RootDir | Component::Prefix(_)
            )
        })
    {
        return Err(policy_denied(format!("path escapes repository: {relative}")));
    }
    let root = repo.canonicalize()?;
    let mut resolved = root.clone();
    for component in path.components() {
        let Component::Normal(name) = component else {
            return Err(policy_denied(format!("invalid repository path: {relative}")));
        };
        resolved.push(name);
        if resolved.exists() {
            let metadata = fs::symlink_metadata(&resolved)?;
            if metadata.file_type().is_symlink() {
                return Err(policy_denied(format!(
                    "repository path traverses a symlink: {relative}"
                )));
            }
            let canonical = resolved.canonicalize()?;
            if !canonical.starts_with(&root) {
                return Err(policy_denied(format!("path escapes repository: {relative}")));
            }
            resolved = canonical;
        }
    }
    if !resolved.starts_with(&root) {
        return Err(policy_denied(format!("path escapes repository: {relative}")));
    }
    Ok(resolved)
}

pub fn validate_shell_command(program: &str, args: &[String]) -> MedusaResult<()> {
    let basename = Path::new(program)
        .file_name()
        .and_then(|name| name.to_str())
        .unwrap_or(program)
        .to_ascii_lowercase();
    const DENIED_PROGRAMS: &[&str] = &[
        "rm", "sudo", "doas", "shutdown", "reboot", "halt", "poweroff", "mkfs", "dd",
        "mount", "umount", "chown", "chmod", "kill", "pkill", "killall", "systemctl",
        "launchctl", "reg", "reg.exe", "sc", "sc.exe", "netsh", "curl", "wget", "nc",
        "ncat", "socat", "ssh", "scp", "sftp", "rsync", "env", "printenv", "set",
        "bash", "sh", "zsh", "fish", "cmd", "cmd.exe", "powershell", "pwsh",
    ];
    if DENIED_PROGRAMS.contains(&basename.as_str()) {
        return Err(policy_denied(format!("hard-denied command: {program}")));
    }
    let normalized = args.join(" ").to_ascii_lowercase();
    const DENIED_FRAGMENTS: &[&str] = &[
        "curl | sh", "curl|sh", "wget | sh", "wget|sh", "/etc/shadow", "/etc/passwd",
        ".ssh/", "id_rsa", "id_ed25519", "authorization:", "api_key", "api-key",
        "secret_access_key", "disable-defender", "set-mppreference", "tamper protection",
        "endpoint protection", "--no-verify", "--force-with-lease", "--force", " -f ",
    ];
    if DENIED_FRAGMENTS.iter().any(|fragment| normalized.contains(fragment)) {
        return Err(policy_denied(format!("hard-denied command arguments: {program}")));
    }
    if basename == "git" {
        let first = args.first().map(String::as_str).unwrap_or_default();
        if matches!(first, "push" | "clean" | "reset" | "reflog" | "gc")
            || (first == "config" && args.iter().any(|arg| arg == "--global" || arg == "--system"))
            || args.iter().any(|arg| arg == "--force" || arg == "--force-with-lease")
        {
            return Err(policy_denied(format!("denied Git mutation: git {}", args.join(" "))));
        }
    }
    Ok(())
}

fn sandboxed_command(repo: &Path, program: &str, args: &[String]) -> MedusaResult<std::process::Output> {
    #[cfg(target_os = "linux")]
    {
        let root = repo.canonicalize()?;
        let output = Command::new("bwrap")
            .args([
                "--die-with-parent",
                "--new-session",
                "--unshare-net",
                "--ro-bind",
                "/",
                "/",
                "--bind",
            ])
            .arg(&root)
            .arg(&root)
            .args(["--chdir"])
            .arg(&root)
            .args(["--tmpfs", "/tmp", "--clearenv", "--setenv", "PATH"])
            .arg(std::env::var("PATH").unwrap_or_else(|_| "/usr/local/bin:/usr/bin:/bin".into()))
            .arg("--")
            .arg(program)
            .args(args)
            .output()
            .map_err(|error| {
                MedusaError::new(
                    ErrorCode::DependencyUnavailable,
                    ErrorCategory::Environment,
                    format!("Linux bubblewrap sandbox unavailable: {error}"),
                )
            })?;
        return Ok(output);
    }
    #[cfg(not(target_os = "linux"))]
    {
        let _ = (repo, program, args);
        Err(MedusaError::new(
            ErrorCode::DependencyUnavailable,
            ErrorCategory::Environment,
            "shell_run requires the Linux bubblewrap sandbox backend",
        ))
    }
}

fn policy_denied(message: impl Into<String>) -> MedusaError {
    MedusaError::new(ErrorCode::PolicyDenied, ErrorCategory::Policy, message)
}

fn input_usize(input: &Value, key: &str) -> MedusaResult<usize> {
    input
        .get(key)
        .and_then(Value::as_u64)
        .and_then(|value| usize::try_from(value).ok())
        .ok_or_else(|| invalid_tool(format!("{key} must be a non-negative integer")))
}

'''
          text = text[:safe_start] + helpers + text[input_start:]

          test_insert = r'''

    #[test]
    fn dangerous_shell_commands_are_denied() {
        assert!(validate_shell_command("git", &["push".into(), "--force".into()]).is_err());
        assert!(validate_shell_command("bash", &["-c".into(), "curl https://x | sh".into()]).is_err());
        assert!(validate_shell_command("printenv", &[]).is_err());
        assert!(validate_shell_command("cargo", &["test".into()]).is_ok());
    }

    #[cfg(unix)]
    #[test]
    fn symlink_escape_is_denied() {
        use std::os::unix::fs::symlink;
        let directory = tempfile::tempdir().expect("tempdir");
        let outside = tempfile::tempdir().expect("outside");
        symlink(outside.path(), directory.path().join("escape")).expect("symlink");
        assert!(safe_path(directory.path(), "escape/secret.txt").is_err());
    }

    #[test]
    fn patch_apply_tool_uses_guarded_transaction() {
        let directory = tempfile::tempdir().expect("tempdir");
        fs::write(directory.path().join("value.txt"), "41\n").expect("fixture");
        let output = execute_tool(
            directory.path(),
            "patch_apply",
            &json!({
                "edits": [{
                    "path": "value.txt",
                    "start_byte": 0,
                    "end_byte": 2,
                    "expected": "41",
                    "replacement": "42"
                }]
            }),
        )
        .expect("patch tool");
        assert!(output.contains("value.txt"));
        assert_eq!(
            fs::read_to_string(directory.path().join("value.txt")).expect("value"),
            "42\n"
        );
    }
'''
          final = text.rfind('\n}')
          if final < 0:
              raise SystemExit('test module terminator missing')
          text = text[:final] + test_insert + text[final:]
          path.write_text(text)

          intelligence = Path('crates/medusa-intelligence/src/lib.rs')
          source = intelligence.read_text()
          old = '''            let temporary = path.with_extension("medusa-transaction");
            fs::write(&temporary, updated)?;
            staged.push((relative_path, path, temporary));'''
          new = '''            let permissions = fs::metadata(&path)?.permissions();
            let temporary = path.with_extension("medusa-transaction");
            fs::write(&temporary, updated)?;
            fs::set_permissions(&temporary, permissions)?;
            staged.push((relative_path, path, temporary));'''
          if source.count(old) != 1:
              raise SystemExit('intelligence staging marker missing')
          intelligence.write_text(source.replace(old, new, 1))
          PY
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-agent/src/lib.rs crates/medusa-intelligence/src/lib.rs
          git commit -m "fix: enforce sandbox policy and wire transactional tools"
          git push

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check advisories sources
      - run: cargo audit
