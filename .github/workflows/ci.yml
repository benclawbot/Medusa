name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-dynamic-skill-autocomplete:
    if: github.head_ref == 'feat/dynamic-skill-autocomplete'
    name: Apply dynamic skill autocomplete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/dynamic-skill-autocomplete
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply guarded patch and focused tests
        shell: bash
        run: |
          set -o pipefail
          sed -n "/python3 - <<'PY'/,/^          PY$/p" .github/workflows/apply-dynamic-skill-autocomplete.yml \
            | sed '1d;$d;s/^          //' > /tmp/apply_dynamic_skill_autocomplete.py
          test -s /tmp/apply_dynamic_skill_autocomplete.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply_dynamic_skill_autocomplete.py')
          text = path.read_text()
          text = text.replace(
              "if 'repository: PathBuf,' not in text:",
              "if 'pub struct AppState {\\n    repository: PathBuf,' not in text:",
              1,
          )
          path.write_text(text)
          PY
          python3 /tmp/apply_dynamic_skill_autocomplete.py
          cargo fmt --all
          git diff --check
          cargo test -p medusa-tui 2>&1 | tee autocomplete-tests.log
      - name: Capture autocomplete diagnostics
        if: failure()
        shell: bash
        run: git diff -- . ':!Cargo.lock' > autocomplete.patch
      - name: Upload autocomplete diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autocomplete-diagnostics
          path: |
            autocomplete-tests.log
            autocomplete.patch
          if-no-files-found: error
      - name: Commit implementation when needed
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-tui/src/commands.rs crates/medusa-tui/src/app.rs crates/medusa-tui/src/render.rs
          git commit -m "feat(tui): autocomplete installed skills"
          git push origin HEAD:feat/dynamic-skill-autocomplete

  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rustfmt.log
      - name: Capture rustfmt patch
        if: failure()
        shell: bash
        run: |
          cargo fmt --all
          git diff -- . ':!Cargo.lock' > rustfmt.patch
      - name: Upload rustfmt diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            rustfmt.log
            rustfmt.patch
          if-no-files-found: ignore
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore
      - name: Full workspace tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features --locked -- --nocapture 2>&1 | tee workspace-tests.log
      - name: Upload workspace test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-diagnostics
          path: workspace-tests.log
          if-no-files-found: error
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: Cargo deny
        shell: bash
        run: |
          set -o pipefail
          cargo deny check advisories sources 2>&1 | tee cargo-deny.log
      - name: Upload cargo-deny diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-diagnostics
          path: cargo-deny.log
          if-no-files-found: error
      - name: Cargo audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee cargo-audit.log
      - name: Upload cargo-audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-diagnostics
          path: cargo-audit.log
          if-no-files-found: error
