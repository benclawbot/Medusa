name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply Phase 5 Clippy fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-memory/src/lib.rs')
          text = path.read_text()
          old = 'use sha2::{Digest, Sha256};\n'
          if text.count(old) != 1:
              raise SystemExit('expected exactly one unused sha2 import')
          path.write_text(text.replace(old, ''))
          PY
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-memory/src/lib.rs
          git commit -m "fix: remove unused memory hashing imports"
          git push

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo generate-lockfile
      - run: cargo deny check advisories sources
      - run: cargo audit
