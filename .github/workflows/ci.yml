name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix-desktop-commander-review:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/desktop-commander-mcp' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/desktop-commander-mcp
          fetch-depth: 0
      - run: python3 .github/scripts/fix_desktop_commander_review.py
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - run: cargo generate-lockfile
      - run: cargo fmt --all
      - run: bash scripts/check-source-size.sh
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test -p medusa-extensions -p medusa-agent -p medusa-cli --locked
      - name: Commit review fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/medusa-extensions/src/desktop_commander.rs crates/medusa-agent/src/tools/mod.rs crates/medusa-agent/src/engine_support.rs
          git diff --cached --check
          git commit -m "fix(mcp): enforce read-only Desktop Commander policy"
          git push origin HEAD:feat/desktop-commander-mcp

  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rustfmt.log
      - name: Capture rustfmt patch
        if: failure()
        shell: bash
        run: |
          cargo fmt --all
          git diff -- . ':!Cargo.lock' > rustfmt.patch
      - name: Upload rustfmt diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            rustfmt.log
            rustfmt.patch
          if-no-files-found: ignore
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore
      - name: Full workspace tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features --locked -- --nocapture 2>&1 | tee workspace-tests.log
      - name: Upload workspace test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-diagnostics
          path: workspace-tests.log
          if-no-files-found: error
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: Cargo deny
        shell: bash
        run: |
          set -o pipefail
          cargo deny check advisories sources 2>&1 | tee cargo-deny.log
      - name: Upload cargo-deny diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-diagnostics
          path: cargo-deny.log
          if-no-files-found: error
      - name: Cargo audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee cargo-audit.log
      - name: Upload cargo-audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-diagnostics
          path: cargo-audit.log
          if-no-files-found: error
