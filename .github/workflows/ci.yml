name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, test, docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - name: Capture Clippy diagnostics
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features -- -D warnings > clippy.log 2>&1
          echo $? > clippy.status
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: phase2-clippy-diagnostics
          path: |
            clippy.log
            clippy.status
      - run: test "$(cat clippy.status)" = "0"
      - run: cargo test --workspace --all-features
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo generate-lockfile
      - run: cargo deny check advisories sources
      - run: cargo audit
