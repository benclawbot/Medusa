name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-question-transcript-test:
    name: Apply question transcript test correction
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Update stale transcript expectations
        shell: python
        run: |
          from pathlib import Path

          path = Path('crates/medusa-tui/src/app/tests.rs')
          text = path.read_text()
          old = '''    assert_eq!(
              app.question_modal()
                  .expect("question modal")
                  .active_question(),
              1
          );
          assert!(app.transcript.is_empty());
          assert_eq!(
              app.handle_event(Event::Key(crossterm::event::KeyEvent::new(
                  KeyCode::Enter,
                  KeyModifiers::NONE,
              )))
              .expect("answer second question"),
              AppAction::Redraw
          );
          assert!(app.question_modal().expect("review answers").is_reviewing());
          assert!(app.transcript.is_empty());
          '''
          new = '''    assert_eq!(
              app.question_modal()
                  .expect("question modal")
                  .active_question(),
              1
          );
          assert!(matches!(
              app.transcript.as_slice(),
              [TranscriptEntry::Assistant(text)]
                  if text.contains("Which project should I use?")
                      && text.contains("Who is this for?")
          ));
          assert_eq!(
              app.handle_event(Event::Key(crossterm::event::KeyEvent::new(
                  KeyCode::Enter,
                  KeyModifiers::NONE,
              )))
              .expect("answer second question"),
              AppAction::Redraw
          );
          assert!(app.question_modal().expect("review answers").is_reviewing());
          assert_eq!(app.transcript.len(), 1);
          '''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'expected one stale question transcript block, found {text.count(old)}')
              path.write_text(text.replace(old, new, 1))
      - name: Verify complete TUI suite
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh
          cargo test -p medusa-tui
      - name: Commit correction
        run: |
          if git diff --quiet; then
            echo 'Test correction already applied and verified.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates/medusa-tui/src/app/tests.rs
          git commit -m 'test(tui): retain clarification conversation'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rustfmt.log
      - name: Capture rustfmt patch
        if: failure()
        shell: bash
        run: |
          cargo fmt --all
          git diff -- . ':!Cargo.lock' > rustfmt.patch
      - name: Upload rustfmt diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            rustfmt.log
            rustfmt.patch
          if-no-files-found: ignore
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore
      - name: Full workspace tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features --locked -- --nocapture 2>&1 | tee workspace-tests.log
      - name: Upload workspace test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-diagnostics
          path: workspace-tests.log
          if-no-files-found: error
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: Cargo deny
        shell: bash
        run: |
          set -o pipefail
          cargo deny check advisories sources 2>&1 | tee cargo-deny.log
      - name: Upload cargo-deny diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-diagnostics
          path: cargo-deny.log
          if-no-files-found: error
      - name: Cargo audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee cargo-audit.log
      - name: Upload cargo-audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-diagnostics
          path: cargo-audit.log
          if-no-files-found: error
