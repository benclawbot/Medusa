name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-fix:
    if: github.event_name == 'pull_request'
    name: Apply canonical rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting when required
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: apply rustfmt"
            git push origin HEAD:${{ github.head_ref }}
          fi

  quality:
    name: Lint, test, docs
    needs: format-fix
    if: always() && (needs.format-fix.result == 'success' || needs.format-fix.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo generate-lockfile
      - name: Cargo deny
        id: deny
        shell: bash
        run: |
          set +e
          cargo deny check advisories sources 2>&1 | tee cargo-deny.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cargo-deny-log
          path: cargo-deny.log
      - name: Enforce cargo-deny result
        run: test "${{ steps.deny.outputs.exit_code }}" = "0"
      - run: cargo audit
