name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Apply test-only import gate
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-agent/src/lib.rs')
          text = path.read_text()
          old = 'use policy::safe_path;\n'
          new = '#[cfg(test)]\nuse policy::safe_path;\n'
          if text.count(old) != 1:
              raise SystemExit('safe_path import marker missing or ambiguous')
          path.write_text(text.replace(old, new, 1))
          PY
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-agent/src/lib.rs
          git commit -m "fix(agent): gate test-only safe_path import"
          git push
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Full workspace tests
        run: cargo test --workspace --all-features --locked
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check advisories sources
      - run: cargo audit
