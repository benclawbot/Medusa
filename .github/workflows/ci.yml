name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply live-agent integrity fixes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Patch verification and atomic-write integrity
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-agent/src/lib.rs')
          text = path.read_text()
          replacements = [
              (
                  'const SYSTEM_PROMPT: &str = "You are Medusa, an autonomous coding agent. Inspect the repository, make the smallest correct change, and verify it. Use tools rather than inventing repository contents. Do not expose private chain-of-thought; provide concise decisions and evidence.";',
                  'const SYSTEM_PROMPT: &str = "You are Medusa, an autonomous coding agent. Inspect the repository, make the smallest correct change, and verify it. Use tools rather than inventing repository contents. Never modify tests, verification scripts, snapshots, fixtures, or expected outputs unless the user explicitly asks for that exact change; fix the product code instead. Do not expose private chain-of-thought; provide concise decisions and evidence.";'
              ),
              (
                  '        Some(("sh", vec!["verify.sh"]))',
                  '        Some(("bash", vec!["verify.sh"]))'
              ),
              (
                  '            let temporary = path.with_extension("medusa-tmp");\n            fs::write(&temporary, content)?;\n            fs::rename(&temporary, &path)?;',
                  '            let original_permissions = fs::metadata(&path).ok().map(|metadata| metadata.permissions());\n            let temporary = path.with_extension("medusa-tmp");\n            fs::write(&temporary, content)?;\n            if let Some(permissions) = original_permissions {\n                fs::set_permissions(&temporary, permissions)?;\n            }\n            fs::rename(&temporary, &path)?;'
              ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'expected exactly one match for: {old[:80]}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-agent/src/lib.rs
          git commit -m "fix: preserve verifier integrity in live agent runs"
          git push

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check advisories sources
      - run: cargo audit
