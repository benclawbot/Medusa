name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Apply Phase 8 formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: |
          cargo fmt --all
          git config user.name "medusa-ci"
          git config user.email "medusa-ci@users.noreply.github.com"
          git add crates/medusa-hardening/src/lib.rs crates/medusa-cli/src/main.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: apply Phase 8 rustfmt"
          git push

  browser-e2e:
    name: Playwright visual verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: browser/package.json
      - run: npm install --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        with:
          name: phase6-browser-evidence
          path: browser/artifacts

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo generate-lockfile
      - run: cargo deny check advisories sources
      - run: cargo audit
