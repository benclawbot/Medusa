name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Diagnose live-agent patch tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record source token diagnostics
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-agent/src/lib.rs')
          text = path.read_text()
          tokens = {
              'prompt_start': 'const SYSTEM_PROMPT: &str = "',
              'shell_exact': 'Some(("sh", vec!["verify.sh"]))',
              'temp_line': '            let temporary = path.with_extension("medusa-tmp");\n',
              'write_line': '            fs::write(&temporary, content)?;\n',
              'rename_line': '            fs::rename(&temporary, &path)?;\n',
          }
          with open('patch-diagnostics.txt', 'w') as output:
              for name, token in tokens.items():
                  output.write(f'{name}={text.count(token)}\n')
              for needle in ['SYSTEM_PROMPT', 'verify.sh', 'medusa-tmp', 'fs::write(&temporary', 'fs::rename(&temporary']:
                  index = text.find(needle)
                  output.write(f'\n[{needle}] index={index}\n')
                  if index >= 0:
                      output.write(text[max(0, index-180):index+420])
                      output.write('\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: live-agent-patch-diagnostics
          path: patch-diagnostics.txt

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check advisories sources
      - run: cargo audit
