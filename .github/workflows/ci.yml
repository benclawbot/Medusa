name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-final-clippy-cleanup:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/tui-markdown-io-consistency'
    name: Apply final TUI Clippy cleanup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/tui-markdown-io-consistency
          fetch-depth: 0
      - name: Apply focused cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          support = Path('crates/medusa-tui/src/render/support.rs')
          text = support.read_text()
          old_user = '''                lines.extend(conversation_block_lines(
                    "You     ",
                    Color::Cyan,
                    text,
                    Color::Black,
                    Some(Color::Grey),
                    true,
                    Attribute::Reset,
                    width,
                ));'''
          new_user = '''                lines.extend(user_block_lines("You     ", Color::Cyan, text, width));'''
          if text.count(old_user) != 1:
              raise SystemExit(f'user block match count: {text.count(old_user)}')
          text = text.replace(old_user, new_user, 1)

          old_attachment = '''                    lines.extend(conversation_block_lines(
                        "        ",
                        Color::DarkGrey,
                        &format!("[attachment] {}", attachment_label(attachment)),
                        Color::Black,
                        Some(Color::Grey),
                        true,
                        Attribute::Reset,
                        width,
                    ));'''
          new_attachment = '''                    lines.extend(user_block_lines(
                        "        ",
                        Color::DarkGrey,
                        &format!("[attachment] {}", attachment_label(attachment)),
                        width,
                    ));'''
          if text.count(old_attachment) != 1:
              raise SystemExit(f'attachment block match count: {text.count(old_attachment)}')
          text = text.replace(old_attachment, new_attachment, 1)

          old_signature = '''fn conversation_block_lines(
    first_marker: &str,
    marker_color: Color,
    text: &str,
    foreground: Color,
    background: Option<Color>,
    fill_background: bool,
    attribute: Attribute,
    width: u16,
) -> Vec<StyledLine> {'''
          new_signature = '''fn user_block_lines(
    first_marker: &str,
    marker_color: Color,
    text: &str,
    width: u16,
) -> Vec<StyledLine> {'''
          if text.count(old_signature) != 1:
              raise SystemExit(f'helper signature match count: {text.count(old_signature)}')
          text = text.replace(old_signature, new_signature, 1)
          text = text.replace(
              '''                foreground,
                background,
                attribute,
                fill_background,''',
              '''                Color::Black,
                Some(Color::Grey),
                Attribute::Reset,
                true,''',
              1,
          )
          support.write_text(text)

          markdown = Path('crates/medusa-tui/src/render/markdown.rs')
          text = markdown.read_text()
          old = '        assert!(rendered.iter().any(|line| line == &"└─"));'
          new = '        assert!(rendered.contains(&"└─"));'
          if text.count(old) != 1:
              raise SystemExit(f'contains cleanup match count: {text.count(old)}')
          markdown.write_text(text.replace(old, new, 1))
          PY
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - run: cargo fmt --all
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test -p medusa-tui --locked
      - run: bash scripts/check-source-size.sh
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/medusa-tui/src/render/support.rs crates/medusa-tui/src/render/markdown.rs
          git diff --cached --check
          git commit -m "refactor(tui): simplify user transcript styling"
          git push origin HEAD:feat/tui-markdown-io-consistency

  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rustfmt.log
      - name: Capture rustfmt patch
        if: failure()
        shell: bash
        run: |
          cargo fmt --all
          git diff -- . ':!Cargo.lock' > rustfmt.patch
      - name: Upload rustfmt diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            rustfmt.log
            rustfmt.patch
          if-no-files-found: ignore
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore
      - name: Full workspace tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features --locked -- --nocapture 2>&1 | tee workspace-tests.log
      - name: Upload workspace test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-diagnostics
          path: workspace-tests.log
          if-no-files-found: error
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: Cargo deny
        shell: bash
        run: |
          set -o pipefail
          cargo deny check advisories sources 2>&1 | tee cargo-deny.log
      - name: Upload cargo-deny diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-diagnostics
          path: cargo-deny.log
          if-no-files-found: error
      - name: Cargo audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee cargo-audit.log
      - name: Upload cargo-audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-diagnostics
          path: cargo-audit.log
          if-no-files-found: error
