name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Workspace quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Refresh dependency lock for the merged PR graph
        run: cargo generate-lockfile
      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee rustfmt.log
      - name: Capture rustfmt patch
        if: failure()
        shell: bash
        run: |
          cargo fmt --all
          git diff -- . ':!Cargo.lock' > rustfmt.patch
      - name: Upload rustfmt diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: |
            rustfmt.log
            rustfmt.patch
          if-no-files-found: ignore
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings 2>&1 | tee clippy.log
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore
      - name: Production panic audit
        id: production_panic_audit
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --all-features --locked --lib --bins --examples -- \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            2>&1 | tee production-panic-audit.log
      - name: Upload production panic diagnostics
        if: failure() && steps.production_panic_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-panic-audit-diagnostics
          path: production-panic-audit.log
          if-no-files-found: error
      - name: Full workspace tests
        id: workspace_tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features --locked -- --nocapture 2>&1 | tee workspace-tests.log
      - name: Upload workspace test diagnostics
        if: failure() && steps.workspace_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-diagnostics
          path: workspace-tests.log
          if-no-files-found: error
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --locked --no-deps

  supply-chain:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: Measure current dependency graph
        id: dependency_metrics_current
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/dependency-metrics.py measure \
            --root . \
            --output dependency-current.json \
            2>&1 | tee dependency-metrics.log
      - name: Compare pull request dependency graph with base
        id: dependency_metrics_compare
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git worktree add ../dependency-base FETCH_HEAD
          python3 scripts/dependency-metrics.py measure \
            --root ../dependency-base \
            --output dependency-base.json \
            2>&1 | tee -a dependency-metrics.log
          python3 scripts/dependency-metrics.py compare \
            --base dependency-base.json \
            --current dependency-current.json \
            --output dependency-comparison.md \
            2>&1 | tee -a dependency-metrics.log
          cat dependency-comparison.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload dependency metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-metrics
          path: |
            dependency-base.json
            dependency-current.json
            dependency-comparison.md
          if-no-files-found: ignore
      - name: Upload dependency metrics diagnostics
        if: failure() && (steps.dependency_metrics_current.outcome == 'failure' || steps.dependency_metrics_compare.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: dependency-metrics-diagnostics
          path: dependency-metrics.log
          if-no-files-found: error
      - name: Cargo deny
        id: cargo_deny
        shell: bash
        run: |
          set -o pipefail
          cargo deny check advisories sources 2>&1 | tee cargo-deny.log
      - name: Upload cargo-deny diagnostics
        if: failure() && steps.cargo_deny.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-diagnostics
          path: cargo-deny.log
          if-no-files-found: error
      - name: Cargo audit
        id: cargo_audit
        shell: bash
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee cargo-audit.log
      - name: Upload cargo-audit diagnostics
        if: failure() && steps.cargo_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-diagnostics
          path: cargo-audit.log
          if-no-files-found: error
