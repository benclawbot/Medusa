name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Phase 3 diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Generate formatted Phase 3 sources
        run: cargo fmt --all
      - uses: actions/upload-artifact@v4
        with:
          name: phase3-formatted-sources
          path: |
            crates/medusa-daemon/src/lib.rs
            crates/medusa-tui/src/main.rs
      - run: git diff --exit-code

  supply-chain:
    name: Dependency diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo generate-lockfile
      - name: Capture dependency policy diagnostics
        run: |
          set +e
          cargo deny check advisories sources > deny.log 2>&1
          echo $? > deny.status
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: phase3-dependency-diagnostics
          path: |
            deny.log
            deny.status
      - run: test "$(cat deny.status)" = "0"
