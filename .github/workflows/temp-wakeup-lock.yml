name: temp wakeup lock
on:
  push:
    branches: [agent/event-driven-process-wakeups-main]
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/event-driven-process-wakeups-main
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo generate-lockfile
      - run: cargo fmt --all
      - run: rm .github/workflows/temp-wakeup-lock.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'chore(wakeup): refresh lockfile'
          git push origin HEAD:agent/event-driven-process-wakeups-main
