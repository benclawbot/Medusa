name: Format Desktop Once

on:
  push:
    branches:
      - feat/medusa-desktop-runtime-entrypoint
    paths:
      - .github/format-desktop-trigger

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/medusa-desktop-runtime-entrypoint
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/medusa-desktop/src-tauri/src
          if git diff --cached --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git commit -m "style(desktop): apply rustfmt"
          git push origin HEAD:feat/medusa-desktop-runtime-entrypoint
