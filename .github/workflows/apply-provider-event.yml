name: Apply durable provider event patch

on:
  push:
    branches:
      - roadmap/134-durable-provider-event

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/134-durable-provider-event
          fetch-depth: 0
      - name: Apply exact source transformations
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"expected source block missing in {path}")
              file.write_text(text.replace(old, new, 1))

          replace(
              "crates/medusa-provider/src/lib.rs",
              """    fn capabilities(&self) -> ProviderCapabilities {\n        ProviderCapabilities::default()\n    }\n}""",
              """    fn capabilities(&self) -> ProviderCapabilities {\n        ProviderCapabilities::default()\n    }\n\n    /// Returns metadata for the most recently completed provider execution.\n    fn execution_status(&self) -> Option<Value> {\n        None\n    }\n}""",
          )

          replace(
              "crates/medusa-provider/src/manager.rs",
              """    fn capabilities(&self) -> ProviderCapabilities {\n        self.providers\n            .first()\n            .map_or_else(ProviderCapabilities::default, ModelProvider::capabilities)\n    }\n}""",
              """    fn capabilities(&self) -> ProviderCapabilities {\n        self.providers\n            .first()\n            .map_or_else(ProviderCapabilities::default, ModelProvider::capabilities)\n    }\n\n    fn execution_status(&self) -> Option<Value> {\n        ProviderManager::execution_status(self)\n    }\n}""",
          )

          replace(
              "crates/medusa-protocol/src/lib.rs",
              """    ModelResponseReceived {\n        response_id: Option<String>,\n        usage: Value,\n    },\n    ToolCallRequested""",
              """    ModelResponseReceived {\n        response_id: Option<String>,\n        usage: Value,\n    },\n    ProviderExecutionRecorded {\n        status: Value,\n    },\n    ToolCallRequested""",
          )

          replace(
              "crates/medusa-agent/src/engine.rs",
              """        append_observed(\n            session,\n            EventPayload::ModelResponseReceived {\n                response_id: response.response_id.clone(),\n                usage: serde_json::to_value(response.usage).map_err(json_error)?,\n            },\n            &mut observer,\n        )?;\n\n        let mut assistant_blocks""",
              """        append_observed(\n            session,\n            EventPayload::ModelResponseReceived {\n                response_id: response.response_id.clone(),\n                usage: serde_json::to_value(response.usage).map_err(json_error)?,\n            },\n            &mut observer,\n        )?;\n        if let Some(status) = self.provider.execution_status() {\n            append_observed(\n                session,\n                EventPayload::ProviderExecutionRecorded { status },\n                &mut observer,\n            )?;\n        }\n\n        let mut assistant_blocks""",
          )

          Path(".github/workflows/apply-provider-event.yml").unlink()
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/medusa-provider/src/lib.rs crates/medusa-provider/src/manager.rs crates/medusa-protocol/src/lib.rs crates/medusa-agent/src/engine.rs .github/workflows/apply-provider-event.yml
          git commit -m "feat(provider): persist execution metadata in session events"
          git push origin HEAD:roadmap/134-durable-provider-event
