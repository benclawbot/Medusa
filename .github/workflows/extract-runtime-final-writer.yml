name: Extract Runtime Final Writer

on:
  push:
    branches:
      - agent/extract-frontend-neutral-runtime
    paths:
      - .github/runtime-extraction-final-trigger

concurrency:
  group: medusa-runtime-extraction-final
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Generate production extraction
        shell: bash
        run: |
          test ! -d crates/medusa-runtime
          awk '/python3 <<'"'"'PY'"'"'/{capture=1; next} /^          PY$/{capture=0} capture {sub(/^          /, ""); print}' \
            .github/workflows/extract-runtime-writer.yml > /tmp/extract-runtime.py
          python3 /tmp/extract-runtime.py
          python3 .github/extract-runtime-fix.py
          cargo fmt --all
          cargo check --workspace --all-features

      - name: Validate production extraction
        shell: bash
        run: |
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked

      - name: Commit production extraction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md crates/medusa-runtime crates/medusa-tui
          git commit -m "refactor: extract frontend-neutral runtime"
          git fetch origin agent/extract-frontend-neutral-runtime
          git rebase origin/agent/extract-frontend-neutral-runtime
          git push origin HEAD:agent/extract-frontend-neutral-runtime
