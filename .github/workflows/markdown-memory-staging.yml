name: Markdown memory staging

on:
  push:
    branches:
      - agent/markdown-memory-main

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/markdown-memory-main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Format and refresh lockfile
        run: |
          cargo fmt --all
          cargo generate-lockfile
          cargo test -p medusa-markdown-memory
      - name: Remove staging workflow
        run: rm .github/workflows/markdown-memory-staging.yml
      - name: Commit generated files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock Cargo.toml crates/medusa-markdown-memory .github/workflows/markdown-memory-staging.yml
          git commit -m "Format Markdown memory retrieval and refresh lockfile"
          git push origin HEAD:agent/markdown-memory-main
