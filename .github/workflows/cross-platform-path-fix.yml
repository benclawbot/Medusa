name: Cross-platform path fix

on:
  pull_request:
    paths:
      - ".github/workflows/cross-platform-path-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply portable path validation
        shell: python
        run: |
          import re
          from pathlib import Path

          target = Path("apps/medusa-desktop/src-tauri/src/mutations.rs")
          source = target.read_text()
          source = source.replace(
              '    path::{Component, Path, PathBuf},',
              '    path::{Path, PathBuf},',
          )
          pattern = re.compile(
              r"            let has_unsafe_component = Path::new\(path\)\.components\(\)\.any\(\|component\| \{.*?"
              r"            if path\.is_empty\(\).*?"
              r"                \|\| path\.starts_with\('-'\)\n"
              r"            \{",
              re.DOTALL,
          )
          replacement = '''            let bytes = path.as_bytes();
            let has_drive_prefix = bytes.len() >= 2
                && bytes[0].is_ascii_alphabetic()
                && bytes[1] == b':';
            let has_parent_segment = path
                .split(['/', '\\\\'])
                .any(|segment| segment == "..");
            if path.is_empty()
                || path.starts_with('/')
                || path.starts_with('\\\\')
                || has_drive_prefix
                || has_parent_segment
                || path.starts_with('-')
            {'''
          source, count = pattern.subn(lambda _match: replacement, source, count=1)
          if count != 1:
              raise SystemExit(f"expected one validation block, replaced {count}")
          target.write_text(source)
      - name: Format and commit
        run: |
          cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/medusa-desktop/src-tauri/src/mutations.rs
          git commit -m "fix(desktop): validate commit paths portably"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
