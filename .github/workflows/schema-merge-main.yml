name: Schema Merge Main

on:
  push:
    branches:
      - agent/schema-harness-foundation

permissions:
  contents: write

jobs:
  merge-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/schema-harness-foundation
          fetch-depth: 0
      - name: Merge latest main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-commit --no-ff origin/main || true
      - name: Resolve build integration
        shell: python
        run: |
          from pathlib import Path
          path = Path('crates/medusa-agent/build.rs')
          text = path.read_text()
          if '<<<<<<<' in text:
              ours = text.split('<<<<<<< HEAD\n', 1)[1].split('=======\n', 1)[0]
              theirs = text.split('=======\n', 1)[1].split('>>>>>>>', 1)[0]
              text = text.split('<<<<<<< HEAD\n', 1)[0] + ours + text.split('>>>>>>>', 1)[1].split('\n', 1)[1]
          text = text.replace(
              '        let system = coding_policy::apply(\n',
              '        if let Some(refresh) = repository_index::refresh(&session.repo)? {\n            observer(&AgentUpdate::ToolOutput {\n                tool: "code_index".to_owned(),\n                output: repository_index::summary(&refresh),\n                is_error: false,\n            });\n        }\n        let system = coding_policy::apply(\n',
              1,
          ) if 'repository_index::refresh(&session.repo)?' not in text else text
          text = text.replace(
              '    println!("cargo:rerun-if-changed=src/coding_policy.rs");\n',
              '    println!("cargo:rerun-if-changed=src/coding_policy.rs");\n    println!("cargo:rerun-if-changed=src/repository_index.rs");\n',
              1,
          ) if 'rerun-if-changed=src/repository_index.rs' not in text else text
          old = 'mod coding_policy {{ include!(concat!(env!("CARGO_MANIFEST_DIR"), "/src/coding_policy.rs")); }}\\nmod world_model_observation'
          new = 'mod coding_policy {{ include!(concat!(env!("CARGO_MANIFEST_DIR"), "/src/coding_policy.rs")); }}\\nmod repository_index {{ include!(concat!(env!("CARGO_MANIFEST_DIR"), "/src/repository_index.rs")); }}\\nmod world_model_observation'
          text = text.replace(old, new, 1)
          path.write_text(text)
          workflow = Path('.github/workflows/schema-merge-main.yml')
          workflow.unlink()
      - name: Format and commit merge
        run: |
          cargo fmt --all
          git add -A
          git commit -m "Merge main into Schema harness foundation"
          git push origin HEAD:agent/schema-harness-foundation
