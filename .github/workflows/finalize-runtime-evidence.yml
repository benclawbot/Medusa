name: Finalize Runtime Evidence

on:
  push:
    branches: [agent/extract-frontend-neutral-runtime]
    paths: [.github/runtime-evidence-trigger]

permissions:
  contents: write

concurrency:
  group: runtime-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - name: Update the post-merge evidence snapshot
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          readme_path = Path("README.md")
          readme = readme_path.read_text()
          old_snapshot = "The original phase labels are historical planning shorthand, not the current source of truth. As of July 18, 2026, `main` includes the work merged through PR #38: the Rust agent core, interactive TUI, durable sessions and memory, guarded repository tools, browser verification, parallel workers, release hardening, Markdown rendering, mid-turn follow-ups, and the optional Desktop Commander MCP integration."
          new_snapshot = "The original phase labels are historical planning shorthand, not the current source of truth. As of July 18, 2026, the repository evidence through PR #39 includes the Rust agent core, interactive TUI, frontend-neutral runtime, durable sessions and memory, guarded repository tools, browser verification, parallel workers, release hardening, Markdown rendering, mid-turn follow-ups, and the optional Desktop Commander MCP integration."
          assert old_snapshot in readme, "README status snapshot changed unexpectedly"
          readme = readme.replace(old_snapshot, new_snapshot, 1)
          old_runtime = "| Agent and repository runtime | Session orchestration, planning, tools, policy, verification, and persistence are implemented across `medusa-agent`, `medusa-intelligence`, `medusa-memory`, and related crates. |"
          new_runtime = "| Agent and repository runtime | `medusa-runtime` owns frontend-neutral interactive session control, while planning, tools, policy, verification, intelligence, and persistence remain implemented across `medusa-agent`, `medusa-intelligence`, `medusa-memory`, and related crates. |"
          assert old_runtime in readme, "README runtime row changed unexpectedly"
          readme = readme.replace(old_runtime, new_runtime, 1)
          old_active = "| Active architecture work | PR #39 is extracting a frontend-neutral `medusa-runtime` before the Zeus-derived desktop interface is wired to the same core. This work is not claimed as shipped until it merges and its canonical gates pass. |"
          new_active = "| Shared frontend runtime | `medusa-runtime` now owns commands, prompt attachments, session control, cancellation, follow-up queuing, provider setup, skills, and core events; `medusa-tui` is the terminal presentation adapter. The Zeus-derived desktop interface remains the next integration step. |"
          assert old_active in readme, "README active-work row changed unexpectedly"
          readme_path.write_text(readme.replace(old_active, new_active, 1))

          evidence_path = Path("docs/CAPABILITY-EVIDENCE.md")
          evidence = evidence_path.read_text()
          evidence = evidence.replace(
              "Status snapshot: **July 18, 2026**, based on `main` through merged PR #38.",
              "Status snapshot: **July 18, 2026**, based on `main` through merged PR #39.",
              1,
          )
          evidence = evidence.replace(
              "| Markdown rendering and mid-turn follow-up queueing | `crates/medusa-tui`; merged in PR #34 | Workspace tests and source-size guardrail |",
              "| Markdown rendering and mid-turn follow-up queueing | `crates/medusa-runtime`, `crates/medusa-tui`; introduced in PR #34 and moved behind the shared runtime in PR #39 | Workspace tests and source-size guardrail |",
              1,
          )
          evidence = evidence.replace(
              "| Clipboard text and screenshot prompts | `crates/medusa-tui` | Workspace tests and cross-platform package smoke |",
              "| Clipboard text and screenshot prompts | Frontend-neutral prompt types in `crates/medusa-runtime`; OS clipboard access in `crates/medusa-tui` | Runtime/TUI tests and cross-platform package smoke |",
              1,
          )
          agent_row = "| Agent loop, planning, cancellation, tools, and verification | `crates/medusa-agent`, `crates/medusa-protocol`, `crates/medusa-provider` | Workspace tests plus named adversarial regressions |"
          runtime_row = "| Shared frontend-neutral interactive runtime | `crates/medusa-runtime`; extracted in PR #39, with `crates/medusa-tui` reduced to a terminal adapter | Runtime behavior tests, TUI mapping tests, workspace Clippy/tests, coverage, and package smoke |"
          assert agent_row in evidence, "capability table anchor changed unexpectedly"
          if runtime_row not in evidence:
              evidence = evidence.replace(agent_row, runtime_row + "\n" + agent_row, 1)
          old_active_section = "## Active work, not yet shipped\n\nPR #39, `refactor: extract frontend-neutral runtime`, is moving interactive session control from the TUI into a reusable `medusa-runtime` crate. Its purpose is to let the terminal interface and the planned Zeus-derived desktop interface share one application core. Until that pull request merges and passes canonical validation, the runtime extraction and desktop entry point remain **in progress**."
          new_active_section = "## Next architecture work\n\nThe frontend-neutral runtime extraction is shipped in PR #39. The Zeus-derived desktop interface is still **not shipped**; it must consume `medusa-runtime` rather than duplicate session, provider, cancellation, follow-up, or event logic, and it requires its own canonical validation before the evidence ledger can claim a desktop entry point."
          assert old_active_section in evidence, "active-work evidence section changed unexpectedly"
          evidence_path.write_text(evidence.replace(old_active_section, new_active_section, 1))
          PY

      - name: Validate evidence update
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          grep -q 'repository evidence through PR #39' README.md
          grep -q '| Shared frontend runtime |' README.md
          grep -q 'based on `main` through merged PR #39' docs/CAPABILITY-EVIDENCE.md
          grep -q 'Shared frontend-neutral interactive runtime' docs/CAPABILITY-EVIDENCE.md
          ! grep -q 'PR #39 is extracting' README.md
          ! grep -q 'runtime extraction and desktop entry point remain' docs/CAPABILITY-EVIDENCE.md

      - name: Commit evidence and remove temporary automation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/CAPABILITY-EVIDENCE.md
          git rm .github/runtime-evidence-trigger .github/workflows/finalize-runtime-evidence.yml
          git commit -m "docs(runtime): mark shared runtime as shipped"
          git push origin HEAD:agent/extract-frontend-neutral-runtime
