name: Apply dynamic skill autocomplete

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/dynamic-skill-autocomplete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/dynamic-skill-autocomplete
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply guarded source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          commands = Path('crates/medusa-tui/src/commands.rs')
          text = commands.read_text()
          marker = 'struct DiscoveredSkill {'
          if marker not in text:
              text = 'use std::{\n    collections::BTreeMap,\n    env, fs,\n    path::{Path, PathBuf},\n};\n\n' + text

              old = '''#[derive(Clone, Copy, Debug, Eq, PartialEq)]
          pub struct CommandSpec {
              pub name: &'static str,
              pub usage: &'static str,
              pub description: &'static str,
          }
          '''
              new = old + '''
          #[derive(Clone, Debug, Eq, PartialEq)]
          pub struct CommandSuggestion {
              pub name: String,
              pub usage: String,
              pub description: String,
          }

          #[derive(Clone, Debug, Eq, PartialEq)]
          struct DiscoveredSkill {
              name: String,
              scope: String,
              description: Option<String>,
          }
          '''
              if text.count(old) != 1:
                  raise SystemExit('expected one CommandSpec block')
              text = text.replace(old, new, 1)

              old = '''#[must_use]
          pub fn command_suggestions(input: &str) -> Vec<CommandSpec> {
              let Some(prefix) = input.trim_start().strip_prefix('/') else {
                  return Vec::new();
              };
              if prefix.contains(char::is_whitespace) {
                  return Vec::new();
              }
              COMMAND_SPECS
                  .iter()
                  .copied()
                  .filter(|spec| spec.name.starts_with(&prefix.to_ascii_lowercase()))
                  .take(6)
                  .collect()
          }

          #[must_use]
          pub fn complete_first_command(input: &str) -> Option<String> {
              let suggestion = command_suggestions(input).into_iter().next()?;
              Some(format!("/{} ", suggestion.name))
          }
          '''
              new = '''#[must_use]
          pub fn command_suggestions(input: &str, repo: &Path) -> Vec<CommandSuggestion> {
              let Some(prefix) = input.trim_start().strip_prefix('/') else {
                  return Vec::new();
              };
              if prefix.contains(char::is_whitespace) {
                  return Vec::new();
              }
              let prefix = prefix.to_ascii_lowercase();
              let mut suggestions = COMMAND_SPECS
                  .iter()
                  .filter(|spec| spec.name.starts_with(&prefix))
                  .map(|spec| CommandSuggestion {
                      name: spec.name.to_owned(),
                      usage: spec.usage.to_owned(),
                      description: spec.description.to_owned(),
                  })
                  .take(6)
                  .collect::<Vec<_>>();
              let remaining = 6_usize.saturating_sub(suggestions.len());
              suggestions.extend(
                  skill_command_suggestions(repo)
                      .into_iter()
                      .filter(|spec| spec.name.to_ascii_lowercase().starts_with(&prefix))
                      .take(remaining),
              );
              suggestions
          }

          #[must_use]
          pub fn complete_first_command(input: &str, repo: &Path) -> Option<String> {
              let suggestion = command_suggestions(input, repo).into_iter().next()?;
              Some(format!("/{} ", suggestion.name))
          }

          fn skill_command_suggestions(repo: &Path) -> Vec<CommandSuggestion> {
              suggestions_for_discovered_skills(discover_skills(repo))
          }

          fn discover_skills(repo: &Path) -> Vec<DiscoveredSkill> {
              let mut skills = Vec::new();
              for (scope, root) in skill_roots(repo) {
                  let Ok(entries) = fs::read_dir(root) else {
                      continue;
                  };
                  for entry in entries.flatten() {
                      let skill = entry.path().join("SKILL.md");
                      if !skill.is_file() {
                          continue;
                      }
                      skills.push(DiscoveredSkill {
                          name: entry.file_name().to_string_lossy().into_owned(),
                          scope: scope.to_owned(),
                          description: skill_description(&skill),
                      });
                  }
              }
              skills
          }

          fn skill_roots(repo: &Path) -> Vec<(&'static str, PathBuf)> {
              let mut roots = vec![
                  ("project", repo.join(".medusa/skills")),
                  ("project", repo.join(".claude/skills")),
              ];
              if let Some(home) = env::var_os("HOME")
                  .or_else(|| env::var_os("USERPROFILE"))
                  .map(PathBuf::from)
              {
                  roots.push(("user", home.join(".medusa/skills")));
                  roots.push(("user", home.join(".claude/skills")));
              }
              roots
          }

          fn skill_description(path: &Path) -> Option<String> {
              fs::read_to_string(path).ok().and_then(|text| {
                  text.lines().find_map(|line| {
                      line.strip_prefix("description:")
                          .map(str::trim)
                          .filter(|value| !value.is_empty())
                          .map(|value| value.trim_matches('"').to_owned())
                  })
              })
          }

          fn suggestions_for_discovered_skills(
              skills: Vec<DiscoveredSkill>,
          ) -> Vec<CommandSuggestion> {
              let mut by_name = BTreeMap::<String, Vec<DiscoveredSkill>>::new();
              for skill in skills {
                  by_name.entry(skill.name.clone()).or_default().push(skill);
              }
              let built_in_names = COMMAND_SPECS
                  .iter()
                  .map(|spec| spec.name)
                  .collect::<Vec<_>>();
              let mut suggestions = Vec::new();
              for (name, named_skills) in by_name {
                  let built_in_collision = built_in_names.contains(&name.as_str());
                  if named_skills.len() == 1 && !built_in_collision {
                      let skill = &named_skills[0];
                      suggestions.push(skill_suggestion(name, skill));
                      continue;
                  }
                  let mut by_scope = BTreeMap::<String, Vec<DiscoveredSkill>>::new();
                  for skill in named_skills {
                      by_scope.entry(skill.scope.clone()).or_default().push(skill);
                  }
                  for (scope, scoped_skills) in by_scope {
                      if scoped_skills.len() != 1 {
                          continue;
                      }
                      let selector = format!("{name}@{scope}");
                      suggestions.push(skill_suggestion(selector, &scoped_skills[0]));
                  }
              }
              suggestions
          }

          fn skill_suggestion(selector: String, skill: &DiscoveredSkill) -> CommandSuggestion {
              let description = skill.description.as_deref().map_or_else(
                  || format!("installed {} skill", skill.scope),
                  |description| format!("{} skill - {description}", skill.scope),
              );
              CommandSuggestion {
                  usage: format!("/{selector} [task]"),
                  name: selector,
                  description,
              }
          }
          '''
              if text.count(old) != 1:
                  raise SystemExit('expected one command suggestion block')
              text = text.replace(old, new, 1)

              old = '''    #[test]
              fn suggestions_and_tab_completion_are_prefix_aware() {
                  assert!(command_suggestions("").is_empty());
                  assert!(command_suggestions("fix tests").is_empty());
                  assert_eq!(command_suggestions("/pl")[0].name, "plan");
                  assert_eq!(complete_first_command("/mo"), Some("/model ".to_owned()));
                  assert!(command_suggestions("/plan task").is_empty());
              }
          '''
              new = '''    #[test]
              fn suggestions_and_tab_completion_are_prefix_aware() {
                  let directory = tempfile::tempdir().expect("temporary directory");
                  assert!(command_suggestions("", directory.path()).is_empty());
                  assert!(command_suggestions("fix tests", directory.path()).is_empty());
                  assert_eq!(command_suggestions("/pl", directory.path())[0].name, "plan");
                  assert_eq!(
                      complete_first_command("/mo", directory.path()),
                      Some("/model ".to_owned())
                  );
                  assert!(command_suggestions("/plan task", directory.path()).is_empty());
              }
          '''
              if text.count(old) != 1:
                  raise SystemExit('expected suggestion test')
              text = text.replace(old, new, 1)

              old = '''    #[test]
              fn completion_handles_case_whitespace_and_no_match() {
                  assert_eq!(command_suggestions("   /HE")[0].name, "help");
                  assert_eq!(complete_first_command("/zz"), None);
                  assert_eq!(command_suggestions("/").len(), 6);
              }
          '''
              new = '''    #[test]
              fn installed_skills_are_discovered_live_and_completed() {
                  let directory = tempfile::tempdir().expect("temporary directory");
                  assert!(command_suggestions("/rel", directory.path()).is_empty());
                  let skill = directory.path().join(".medusa/skills/release/SKILL.md");
                  std::fs::create_dir_all(skill.parent().expect("skill directory"))
                      .expect("create skill directory");
                  std::fs::write(&skill, "description: Prepare a release\nUse the checklist.")
                      .expect("write skill");

                  let suggestions = command_suggestions("/rel", directory.path());
                  assert_eq!(suggestions[0].name, "release");
                  assert_eq!(suggestions[0].usage, "/release [task]");
                  assert!(suggestions[0].description.contains("Prepare a release"));
                  assert_eq!(
                      complete_first_command("/rel", directory.path()),
                      Some("/release ".to_owned())
                  );
              }

              #[test]
              fn colliding_skills_receive_scope_suffixes_and_invalid_duplicates_are_hidden() {
                  let scoped = suggestions_for_discovered_skills(vec![
                      DiscoveredSkill {
                          name: "release".to_owned(),
                          scope: "project".to_owned(),
                          description: None,
                      },
                      DiscoveredSkill {
                          name: "release".to_owned(),
                          scope: "user".to_owned(),
                          description: None,
                      },
                      DiscoveredSkill {
                          name: "plan".to_owned(),
                          scope: "project".to_owned(),
                          description: None,
                      },
                  ]);
                  let names = scoped.iter().map(|spec| spec.name.as_str()).collect::<Vec<_>>();
                  assert_eq!(names, vec!["plan@project", "release@project", "release@user"]);

                  let ambiguous = suggestions_for_discovered_skills(vec![
                      DiscoveredSkill {
                          name: "release".to_owned(),
                          scope: "project".to_owned(),
                          description: None,
                      },
                      DiscoveredSkill {
                          name: "release".to_owned(),
                          scope: "project".to_owned(),
                          description: None,
                      },
                  ]);
                  assert!(ambiguous.is_empty());
              }

              #[test]
              fn completion_handles_case_whitespace_and_no_match() {
                  let directory = tempfile::tempdir().expect("temporary directory");
                  assert_eq!(command_suggestions("   /HE", directory.path())[0].name, "help");
                  assert_eq!(complete_first_command("/zz", directory.path()), None);
                  assert_eq!(command_suggestions("/", directory.path()).len(), 6);
              }
          '''
              if text.count(old) != 1:
                  raise SystemExit('expected completion test')
              text = text.replace(old, new, 1)
              commands.write_text(text)

          app = Path('crates/medusa-tui/src/app.rs')
          text = app.read_text()
          if 'repository: PathBuf,' not in text:
              text = text.replace(
                  'use std::{io, path::PathBuf, sync::Arc, time::Instant};',
                  'use std::{\n    io,\n    path::{Path, PathBuf},\n    sync::Arc,\n    time::Instant,\n};',
                  1,
              )
              text = text.replace(
                  'pub struct AppState {\n    pub composer: ComposerState,',
                  'pub struct AppState {\n    repository: PathBuf,\n    pub composer: ComposerState,',
                  1,
              )
              text = text.replace(
                  '        Ok(Self {\n            composer,',
                  '        Ok(Self {\n            repository,\n            composer,',
                  1,
              )
              text = text.replace(
                  '    #[must_use]\n    pub fn scrollback_offset(&self) -> usize {',
                  '    #[must_use]\n    pub(crate) fn repository(&self) -> &Path {\n        &self.repository\n    }\n\n    #[must_use]\n    pub fn scrollback_offset(&self) -> usize {',
                  1,
              )
              text = text.replace(
                  'command_suggestions(&self.composer.draft.text)',
                  'command_suggestions(&self.composer.draft.text, &self.repository)',
              )
              text = text.replace(
                  'complete_first_command(&self.composer.draft.text)',
                  'complete_first_command(&self.composer.draft.text, &self.repository)',
              )
              app.write_text(text)

          render = Path('crates/medusa-tui/src/render.rs')
          text = render.read_text()
          text = text.replace(
              'command_suggestions(&app.composer.draft.text)',
              'command_suggestions(&app.composer.draft.text, app.repository())',
          )
          render.write_text(text)

          readme = Path('README.md')
          text = readme.read_text()
          needle = 'Selected skill instructions are applied as ephemeral system context for the active task and are not written into durable session messages.\n'
          addition = needle + 'Typing `/` filters both built-in commands and installed skills; Tab completes the selected entry, and newly installed skills appear without restarting Medusa.\n'
          if addition not in text:
              if text.count(needle) != 1:
                  raise SystemExit('expected selected skill README sentence')
              text = text.replace(needle, addition, 1)
              readme.write_text(text)
          PY
          cargo fmt --all
          git diff --check
          cargo test -p medusa-tui
      - name: Commit implementation when needed
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-tui/src/commands.rs crates/medusa-tui/src/app.rs crates/medusa-tui/src/render.rs
          git commit -m "feat(tui): autocomplete installed skills"
          git push origin HEAD:feat/dynamic-skill-autocomplete
