name: Format PR120

on:
  push:
    branches:
      - automation/format-pr120
    paths:
      - .github/workflows/format-pr120.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/skill-dependency-locks
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Format and verify
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
      - name: Commit formatted sources
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git add crates/medusa-agent/src/session/skill_probation.rs \
            crates/medusa-cli/src/skill_graduation.rs \
            crates/medusa-runtime/src/skill_dependencies.rs \
            crates/medusa-runtime/src/skill_dependency_locks.rs
          git commit -m "Format skill dependency lifecycle integration"
          git push origin HEAD:agent/skill-dependency-locks
