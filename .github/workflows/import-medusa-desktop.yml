name: Import Medusa Desktop

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: import-medusa-desktop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  import:
    if: github.head_ref == 'feat/medusa-desktop-runtime-entrypoint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/medusa-desktop-runtime-entrypoint
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy

      - name: Install Tauri build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate and validate Zeus-derived desktop entry point
        id: validate
        shell: bash
        run: |
          set +e
          {
            test ! -d apps/medusa-desktop
            git clone --depth 1 https://github.com/benclawbot/Zeus.git /tmp/Zeus
            python3 .github/desktop-import.py /tmp/Zeus
            cd apps/medusa-desktop
            npm install --package-lock-only
            npm ci
            npm run typecheck
            npm test
            npm run build
            cargo generate-lockfile --manifest-path src-tauri/Cargo.toml
            cargo fmt --manifest-path src-tauri/Cargo.toml
            cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
            cargo test --manifest-path src-tauri/Cargo.toml --locked
            cd ../..
            cargo fmt --all -- --check
            bash scripts/check-source-size.sh
          } > /tmp/desktop-import.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            tail -n 400 /tmp/desktop-import.log > .github/desktop-import-error.log
          fi

      - name: Commit diagnostics
        if: steps.validate.outputs.status != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/desktop-import-error.log
          git commit -m "chore: capture desktop import diagnostics"
          git push origin HEAD:feat/medusa-desktop-runtime-entrypoint

      - name: Stop after validation failure
        if: steps.validate.outputs.status != '0'
        run: exit 1

      - name: Commit production desktop integration
        id: publish
        if: steps.validate.outputs.status == '0'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git status --short
            git add .gitignore README.md docs/CAPABILITY-EVIDENCE.md apps/medusa-desktop .github/workflows/desktop.yml
            git rm .github/desktop-import.py .github/workflows/import-medusa-desktop.yml
            git status --short
            git commit -m "feat(desktop): add Zeus-derived Medusa entry point"
            git fetch origin feat/medusa-desktop-runtime-entrypoint
            git rebase origin/feat/medusa-desktop-runtime-entrypoint
            git push origin HEAD:feat/medusa-desktop-runtime-entrypoint
          } > /tmp/desktop-publish.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Capture publish diagnostics
        if: steps.validate.outputs.status == '0' && steps.publish.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/desktop-publish.log /tmp/desktop-publish-copy.log
          git rebase --abort 2>/dev/null || true
          git reset --hard origin/feat/medusa-desktop-runtime-entrypoint
          git clean -fdx apps/medusa-desktop || true
          tail -n 250 /tmp/desktop-publish-copy.log > .github/desktop-publish-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/desktop-publish-error.log
          git commit -m "chore: capture desktop publish diagnostics"
          git push origin HEAD:feat/medusa-desktop-runtime-entrypoint

      - name: Stop after publish failure
        if: steps.validate.outputs.status == '0' && steps.publish.outcome == 'failure'
        run: exit 1
