name: Import Medusa Desktop

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: import-medusa-desktop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  import:
    if: github.head_ref == 'feat/medusa-desktop-runtime-entrypoint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/medusa-desktop-runtime-entrypoint
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy

      - name: Install Tauri build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate Zeus-derived desktop entry point
        shell: bash
        run: |
          set -euo pipefail
          test ! -d apps/medusa-desktop
          git clone --depth 1 https://github.com/benclawbot/Zeus.git /tmp/Zeus
          python3 .github/desktop-import.py /tmp/Zeus
          cd apps/medusa-desktop
          npm install --package-lock-only
          npm ci
          npm run typecheck
          npm test
          npm run build
          cargo generate-lockfile --manifest-path src-tauri/Cargo.toml
          cargo fmt --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml --locked
          cd ../..
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh

      - name: Commit production desktop integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore README.md docs/CAPABILITY-EVIDENCE.md apps/medusa-desktop .github/workflows/desktop.yml
          git rm .github/desktop-import.py .github/workflows/import-medusa-desktop.yml
          git commit -m "feat(desktop): add Zeus-derived Medusa entry point"
          git push origin HEAD:feat/medusa-desktop-runtime-entrypoint
