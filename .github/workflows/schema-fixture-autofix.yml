name: Schema Fixture Autofix

on:
  push:
    branches:
      - agent/schema-harness-foundation

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/schema-harness-foundation
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Repair AgentSession test fixtures
        shell: python
        run: |
          from pathlib import Path

          fixture_files = [
              Path('crates/medusa-agent/src/session/lessons.rs'),
              Path('crates/medusa-agent/src/session/recall.rs'),
              Path('crates/medusa-agent/src/session/skill_outcomes.rs'),
              Path('crates/medusa-agent/src/usage.rs'),
          ]
          marker = '            rollback_receipts: Vec::new(),\n'
          for path in fixture_files:
              text = path.read_text()
              if '            world_model: None,\n' not in text:
                  if marker not in text:
                      raise SystemExit(f'missing fixture marker in {path}')
                  text = text.replace(marker, marker + '            world_model: None,\n', 1)
              path.write_text(text)

          world_model = Path('crates/medusa-agent/src/world_model_session.rs')
          text = world_model.read_text()
          text = text.replace('            world_model,\n            usage: Default::default(),\n', '            world_model,\n', 1)
          world_model.write_text(text)

          Path('.github/workflows/schema-fixture-autofix.yml').unlink()
      - name: Verify focused compilation
        run: |
          cargo fmt --all
          cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-agent/src/session/lessons.rs crates/medusa-agent/src/session/recall.rs crates/medusa-agent/src/session/skill_outcomes.rs crates/medusa-agent/src/usage.rs crates/medusa-agent/src/world_model_session.rs .github/workflows/schema-fixture-autofix.yml
          git commit -m "Fix world model session fixtures"
          git push origin HEAD:agent/schema-harness-foundation
