name: Generate Failure Lockfile Temp

on:
  push:
    branches:
      - agent/failure-classifier-clean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Generate and commit lockfile
        run: |
          cargo generate-lockfile
          rm .github/workflows/failure-lock-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock .github/workflows/failure-lock-temp.yml
          git commit -m "chore(failure): refresh Cargo lockfile"
          git push
