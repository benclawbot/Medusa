name: Fix PR 71 KeyEvent import

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'agent/tui-markdown-scrollback-terse-chat'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Add import and push
        shell: python
        run: |
          from pathlib import Path
          path = Path('crates/medusa-tui/src/app/tests.rs')
          text = path.read_text()
          marker = 'use super::*;\n'
          replacement = 'use super::*;\nuse crossterm::event::KeyEvent;\n'
          if replacement not in text:
              if marker not in text:
                  raise SystemExit('expected import marker not found')
              path.write_text(text.replace(marker, replacement, 1))
      - name: Format and push
        shell: bash
        run: |
          set -euxo pipefail
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-tui/src/app/tests.rs
          git commit -m 'test: import KeyEvent for scrollback coverage'
          git push origin HEAD
