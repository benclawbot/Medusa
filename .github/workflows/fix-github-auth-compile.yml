name: Fix GitHub auth compile

on:
  pull_request:
    paths:
      - ".github/workflows/fix-github-auth-compile.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply compile fix
        shell: python
        run: |
          from pathlib import Path
          target = Path("apps/medusa-desktop/src-tauri/src/github_auth.rs")
          source = target.read_text()
          source = source.replace("use serde::{Deserialize, Serialize};", "use serde::Serialize;")
          source = source.replace(
              '.find(|entry| entry.get("active")?.as_bool() == Some(true))',
              '.find(|entry| entry.get("active").and_then(Value::as_bool) == Some(true))',
          )
          target.write_text(source)
      - name: Format and commit
        run: |
          cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/medusa-desktop/src-tauri/src/github_auth.rs
          git commit -m "fix(desktop): compile GitHub auth parser"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
