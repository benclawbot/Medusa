name: Prompt Cache Lock Staging

on:
  push:
    branches:
      - agent/prompt-cache-clean

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/prompt-cache-clean
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo generate-lockfile
      - run: cargo fmt --all
      - run: rm .github/workflows/prompt-cache-lock-staging.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock Cargo.toml crates/medusa-prompt-cache .github/workflows/prompt-cache-lock-staging.yml
          git commit -m "Generate current prompt cache lockfile"
          git push origin HEAD:agent/prompt-cache-clean
