name: Apply TUI fixes

on:
  push:
    branches:
      - agent/tui-markdown-scrollback-terse-chat

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified patch
        shell: bash
        run: |
          cat > /tmp/tui.patch.b64 <<'PATCH_EOF'
          
          PATCH_EOF
          base64 -d /tmp/tui.patch.b64 > /tmp/tui.patch
          git apply --check /tmp/tui.patch
          git apply /tmp/tui.patch
          rm .github/workflows/apply-tui-fixes.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-agent/src/engine.rs crates/medusa-tui/src/app.rs crates/medusa-tui/src/app/tests.rs crates/medusa-tui/src/lib.rs crates/medusa-tui/src/render.rs crates/medusa-tui/src/render/markdown.rs crates/medusa-tui/src/session.rs .github/workflows/apply-tui-fixes.yml
          git commit -m "tui: fix markdown scrollback and concise chat"
          git push origin HEAD
