name: Roadmap 134 adapter patch

on:
  push:
    branches: [roadmap/134-provider-resilience]
    paths:
      - '.github/workflows/roadmap-134-adapter-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/134-provider-resilience
      - name: Consolidate provider retry authority
        shell: python
        run: |
          from pathlib import Path
          path = Path('crates/medusa-provider/src/lib.rs')
          text = path.read_text()
          text = text.replace('use std::{env, sync::OnceLock, thread, time::Duration};', 'use std::{env, sync::OnceLock, time::Duration};')
          text = text.replace('const MAX_PROVIDER_RETRIES: u8 = 2;\n', '')
          text = text.replace('    max_retries: u8,\n', '')
          text = text.replace('            max_retries: MAX_PROVIDER_RETRIES,\n', '')
          old = '''        let mut attempt = 0_u8;
        loop {
            let response = self
                .client
                .post(&endpoint)
                .header("x-api-key", &self.api_key)
                .header("anthropic-version", "2023-06-01")
                .json(&body)
                .send();
            match response {
                Ok(response) if response.status().is_success() => {
                    let wire: WireResponse = response.json().map_err(provider_error)?;
                    return Ok(wire.into_model_response());
                }
                Ok(response) => {
                    let status = response.status();
                    let text = response.text().unwrap_or_default();
                    let error = classify_status(status, text);
                    if !error.retryable || attempt >= self.max_retries {
                        return Err(error);
                    }
                }
                Err(error) => {
                    if attempt >= self.max_retries {
                        return Err(provider_error(error));
                    }
                }
            }
            attempt = attempt.saturating_add(1);
            thread::sleep(Duration::from_millis(250 * u64::from(attempt)));
        }
'''
          new = '''        let response = self
            .client
            .post(&endpoint)
            .header("x-api-key", &self.api_key)
            .header("anthropic-version", "2023-06-01")
            .json(&body)
            .send()
            .map_err(provider_error)?;
        if response.status().is_success() {
            let wire: WireResponse = response.json().map_err(provider_error)?;
            return Ok(wire.into_model_response());
        }
        let status = response.status();
        let retry_after = response
            .headers()
            .get(reqwest::header::RETRY_AFTER)
            .and_then(|value| value.to_str().ok())
            .and_then(|value| value.parse::<u64>().ok());
        let text = response.text().unwrap_or_default();
        Err(classify_status(status, text, retry_after))
'''
          if old not in text:
              raise SystemExit('adapter retry loop did not match expected source')
          text = text.replace(old, new)
          old_sig = 'fn classify_status(status: StatusCode, body: String) -> MedusaError {'
          new_sig = 'fn classify_status(status: StatusCode, body: String, retry_after_seconds: Option<u64>) -> MedusaError {'
          if old_sig not in text:
              raise SystemExit('classify_status signature did not match')
          text = text.replace(old_sig, new_sig)
          old_tail = '''    MedusaError::new(
        ErrorCode::DependencyUnavailable,
        category,
        format!("provider returned HTTP {status}: {body}"),
    )
    .with_retryable(retryable)
}'''
          new_tail = '''    let mut error = MedusaError::new(
        ErrorCode::DependencyUnavailable,
        category,
        format!("provider returned HTTP {status}: {body}"),
    )
    .with_retryable(retryable);
    if let Some(seconds) = retry_after_seconds {
        error
            .context
            .insert("retry_after_seconds".into(), serde_json::json!(seconds));
    }
    error
}'''
          if old_tail not in text:
              raise SystemExit('classify_status body did not match')
          path.write_text(text.replace(old_tail, new_tail))
      - name: Format and test provider crate
        run: |
          cargo fmt --all
          cargo test -p medusa-provider
      - name: Commit adapter consolidation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-provider/src/lib.rs
          git commit -m 'feat(provider): centralize retry authority in manager'
          git push origin HEAD:roadmap/134-provider-resilience
