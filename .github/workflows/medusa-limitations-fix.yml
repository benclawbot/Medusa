name: Medusa limitations repair

on:
  push:
    branches:
      - fix/medusa-limitations-batch
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Apply focused TUI regression fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/medusa-tui/src/app/modal_events.rs')
          text = path.read_text()

          old_space = '''                KeyCode::Char(' ') if key.modifiers.is_empty() => {
                    if let Some(modal) = self.question_modal.as_mut()
                        && !modal.is_reviewing()
                    {
                        modal.toggle_current_option();
                    }
                    Ok(AppAction::Redraw)
                }
'''
          new_space = '''                KeyCode::Char(' ') if key.modifiers.is_empty() => {
                    if let Some(modal) = self.question_modal.as_mut()
                        && !modal.is_reviewing()
                    {
                        let is_multi_select = modal
                            .active_prompt()
                            .is_some_and(|prompt| prompt.multi_select && !prompt.options.is_empty());
                        if is_multi_select {
                            modal.toggle_current_option();
                        } else {
                            modal.insert_answer(" ");
                        }
                    }
                    Ok(AppAction::Redraw)
                }
'''
          if old_space not in text:
              raise SystemExit('question-space handler did not match expected source')
          text = text.replace(old_space, new_space, 1)

          old_enter = '''                    if let Some(modal) = self.question_modal.as_mut() {
                        if !modal.select_current_answer() {
                            self.status = "choose or type an answer".to_owned();
                            return Ok(AppAction::Redraw);
                        }
                        modal.advance_or_review();
                        Ok(AppAction::Redraw)
                    } else {
                        Ok(AppAction::None)
                    }
'''
          new_enter = '''                    let is_last_question = self
                        .question_modal
                        .as_ref()
                        .is_some_and(|modal| {
                            modal.active_question().saturating_add(1) >= modal.questions().len()
                        });
                    if let Some(modal) = self.question_modal.as_mut() {
                        if !modal.select_current_answer() {
                            self.status = "choose or type an answer".to_owned();
                            return Ok(AppAction::Redraw);
                        }
                        if !is_last_question {
                            modal.advance_or_review();
                            return Ok(AppAction::Redraw);
                        }
                    } else {
                        return Ok(AppAction::None);
                    }

                    let Some(answer) = self
                        .question_modal
                        .as_ref()
                        .and_then(QuestionModal::answer_bundle)
                    else {
                        self.status = "answer every question before continuing".to_owned();
                        return Ok(AppAction::Redraw);
                    };
                    self.question_modal = None;
                    self.transcript.push(TranscriptEntry::User(PromptDraft {
                        text: answer.clone(),
                        ..PromptDraft::default()
                    }));
                    self.status = "answers submitted".to_owned();
                    Ok(AppAction::AnswerQuestion(answer))
'''
          if old_enter not in text:
              raise SystemExit('question-enter handler did not match expected source')
          text = text.replace(old_enter, new_enter, 1)
          path.write_text(text)

          readme = Path('README.md')
          readme_text = readme.read_text()
          marker = '## Limitations audit reconciliation\n'
          if marker not in readme_text:
              readme_text += '''

## Limitations audit reconciliation

The July 2026 limitations audit was checked against the current runtime. Browser verification, screenshot attachments, durable Markdown memory, autonomous goal execution, daemon-backed jobs, MCP isolation, guarded shell execution, and Windows-aware paths are implemented capabilities rather than active runtime limitations. The TUI question flow now preserves spaces in free-text answers and submits the final answer immediately without a redundant confirmation screen. Unsupported multimodal providers report a capability error instead of silently discarding image context.
'''
              readme.write_text(readme_text)
          PY
      - name: Add regression tests
        shell: bash
        run: |
          cat >> crates/medusa-tui/src/app/modal_events.rs <<'RS'

          #[cfg(test)]
          mod limitations_regression_tests {
              use std::sync::Arc;

              use crossterm::event::{Event, KeyCode, KeyEvent, KeyModifiers};

              use super::*;
              use crate::clipboard::UnsupportedClipboard;

              fn app_with_question(multi_select: bool) -> AppState {
                  let directory = tempfile::tempdir().expect("tempdir");
                  let mut app = AppState::new(
                      directory.path().to_path_buf(),
                      "limitations-regression",
                      "",
                      Arc::new(UnsupportedClipboard),
                  )
                  .expect("app");
                  app.open_question(vec![QuestionPrompt {
                      header: "Scope".to_owned(),
                      question: "What should Medusa do?".to_owned(),
                      options: if multi_select {
                          vec![QuestionOption {
                              label: "Fix it".to_owned(),
                              description: "Apply the repair".to_owned(),
                          }]
                      } else {
                          Vec::new()
                      },
                      multi_select,
                  }]);
                  app
              }

              #[test]
              fn space_is_inserted_in_free_text_question_answers() {
                  let mut app = app_with_question(false);
                  app.handle_question_modal_event(Event::Key(KeyEvent::new(
                      KeyCode::Char('a'),
                      KeyModifiers::NONE,
                  )))
                  .expect("type first word");
                  app.handle_question_modal_event(Event::Key(KeyEvent::new(
                      KeyCode::Char(' '),
                      KeyModifiers::NONE,
                  )))
                  .expect("insert space");
                  app.handle_question_modal_event(Event::Key(KeyEvent::new(
                      KeyCode::Char('b'),
                      KeyModifiers::NONE,
                  )))
                  .expect("type second word");
                  assert_eq!(
                      app.question_modal
                          .as_ref()
                          .expect("question")
                          .active_custom_answer(),
                      "a b"
                  );
              }

              #[test]
              fn final_question_submits_without_review_confirmation() {
                  let mut app = app_with_question(false);
                  app.handle_question_modal_event(Event::Paste("complete all fixes".to_owned()))
                      .expect("paste answer");
                  let action = app
                      .handle_question_modal_event(Event::Key(KeyEvent::new(
                          KeyCode::Enter,
                          KeyModifiers::NONE,
                      )))
                      .expect("submit answer");
                  assert!(matches!(action, AppAction::AnswerQuestion(_)));
                  assert!(app.question_modal.is_none());
              }
          }
          RS
      - name: Validate
        run: |
          cargo fmt --all -- --check
          cargo test -p medusa-tui
          cargo clippy -p medusa-tui --all-targets -- -D warnings
      - name: Commit verified repair
        shell: bash
        run: |
          rm .github/workflows/medusa-limitations-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-tui/src/app/modal_events.rs .github/workflows/medusa-limitations-fix.yml
          git commit -m "fix(tui): resolve limitations audit regressions"
          git push origin HEAD:fix/medusa-limitations-batch
