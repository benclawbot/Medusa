name: TUI lib boundary fix

on:
  push:
    branches: [refactor/tui-lib-modularization]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-lib-modularization
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Repair module boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          render = Path('crates/medusa-tui/src/render.rs')
          text = render.read_text()
          text = text.replace('mod support;\n\nuse super::*;\nuse support::*;', 'pub(super) mod support;\n\nuse super::*;\npub(super) use support::*;')
          render.write_text(text)

          support = Path('crates/medusa-tui/src/render/support.rs')
          text = support.read_text()
          text = text.replace('    pub(super) text: String,', '    pub(crate) text: String,')
          text = text.replace('    fn new(', '    pub(super) fn new(')
          text = text.replace('    fn with_marker(', '    pub(super) fn with_marker(')
          text = text.replace('    fn print(&self,', '    pub(super) fn print(&self,')
          text = text.replace('    fn print_at(&self,', '    pub(super) fn print_at(&self,')
          support.write_text(text)

          session = Path('crates/medusa-tui/src/session.rs')
          text = session.read_text()
          if 'use crate::render::support::{app_error, runtime_error};' not in text:
              text = text.replace('use super::*;\n', 'use super::*;\nuse crate::render::support::{app_error, runtime_error};\n', 1)
          session.write_text(text)
          PY
          rm -f .github/workflows/tui-lib-boundary-fix.yml .github/tui-lib-boundary-fix-trigger .github/tui-lib-boundary-fix-trigger-2
          cargo fmt --all
          cargo clippy -p medusa-tui --all-targets --all-features -- -D warnings || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: repair TUI module boundaries'
          git push origin HEAD:refactor/tui-lib-modularization
