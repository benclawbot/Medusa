name: TUI lib boundary fix

on:
  push:
    branches: [refactor/tui-lib-modularization]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-lib-modularization
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Repair remaining module boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          render = Path('crates/medusa-tui/src/render.rs')
          text = render.read_text()
          text = text.replace('pub(super) use support::*;', 'pub(crate) use support::*;')
          render.write_text(text)

          support = Path('crates/medusa-tui/src/render/support.rs')
          text = support.read_text()
          for name in ['attachment_label', 'activity_lines', 'app_error', 'runtime_error']:
              text = text.replace(f'pub(super) fn {name}', f'pub(crate) fn {name}')
          support.write_text(text)
          PY
          rm -f .github/workflows/tui-lib-boundary-fix.yml .github/tui-lib-boundary-trigger
          cargo fmt --all
          cargo clippy -p medusa-tui --all-targets --all-features -- -D warnings || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: expose shared TUI rendering helpers'
          git push origin HEAD:refactor/tui-lib-modularization
