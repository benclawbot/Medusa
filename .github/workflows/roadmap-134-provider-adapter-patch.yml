name: Roadmap 134 provider adapter patch

on:
  push:
    branches:
      - roadmap/134-provider-adapter-resilience
    paths:
      - scripts/roadmap-134-provider-adapter-patch.py
      - .github/workflows/roadmap-134-provider-adapter-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/134-provider-adapter-resilience
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Apply exact adapter patch
        run: python3 scripts/roadmap-134-provider-adapter-patch.py
      - name: Format
        run: cargo fmt --all
      - name: Verify formatting
        run: cargo fmt --all -- --check
      - name: Test provider crate
        run: cargo test -p medusa-provider
      - name: Commit verified source change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-provider/src/lib.rs
          git diff --cached --quiet && exit 1
          git commit -m "feat(provider): centralize adapter retry authority"
          git push origin HEAD:roadmap/134-provider-adapter-resilience
