name: Desktop Diagnostics

on:
  push:
    branches:
      - feat/medusa-desktop-runtime-entrypoint
    paths:
      - .github/desktop-ci-diagnostics-trigger

permissions:
  contents: write

concurrency:
  group: desktop-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/medusa-desktop-runtime-entrypoint
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/medusa-desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - name: Install Tauri dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Capture exact failures
        shell: bash
        run: |
          set +e
          {
            echo "=== FRONTEND ==="
            cd "$GITHUB_WORKSPACE/apps/medusa-desktop"
            npm ci
            npm test
            echo "FRONTEND_EXIT=$?"
            echo
            echo "=== RUST CLIPPY ==="
            cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
            echo "CLIPPY_EXIT=$?"
          } > "$GITHUB_WORKSPACE/.github/desktop-ci-diagnostics.txt" 2>&1
      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/desktop-ci-diagnostics.txt
          git commit -m "chore: capture desktop CI diagnostics"
          git push origin HEAD:feat/medusa-desktop-runtime-entrypoint
