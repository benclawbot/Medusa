name: Align skill lifetime wording

on:
  push:
    branches:
      - feat/direct-skill-commands

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/direct-skill-commands
      - name: Correct user-facing lifetime language
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "crates/medusa-tui/src/runtime.rs": (
                  "The next prompt will use this skill once.",
                  "The next prompt will add this skill to the current session context.",
              ),
              "README.md": (
                  "/release                        # load the release skill for the next prompt",
                  "/release                        # add the release skill on the next prompt",
              ),
          }
          for path, (old, new) in replacements.items():
              file = Path(path)
              text = file.read_text()
              if text.count(old) != 1:
                  raise SystemExit(f"{path}: expected exactly one match")
              file.write_text(text.replace(old, new, 1))
          PY
          git diff --check
      - name: Commit wording correction
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-tui/src/runtime.rs
          git commit -m "docs(tui): clarify selected skill lifetime"
          git push origin HEAD:feat/direct-skill-commands
