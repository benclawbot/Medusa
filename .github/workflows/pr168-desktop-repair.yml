name: PR 168 Desktop Repair

on:
  push:
    branches: [roadmap/161-frontend-telemetry-v2]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/161-frontend-telemetry-v2
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Apply normalized desktop telemetry repair
        run: python scripts/fix_pr168_desktop.py
      - name: Validate desktop adapter
        run: |
          cargo fmt --all --check
          cargo clippy --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Publish clean repair
        run: |
          rm scripts/fix_pr168_desktop.py scripts/fix_pr168_desktop_usage.py .github/workflows/pr168-desktop-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(desktop): forward normalized usage telemetry"
          git push origin HEAD:roadmap/161-frontend-telemetry-v2
