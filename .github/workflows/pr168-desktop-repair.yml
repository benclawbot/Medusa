name: PR 168 Desktop Repair

on:
  pull_request:
    types: [ready_for_review, reopened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.number == 168 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/161-frontend-telemetry-v2
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - run: python scripts/fix_pr168_desktop.py
      - run: |
          cargo fmt --all
          cargo clippy --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Commit clean repair
        run: |
          rm scripts/fix_pr168_desktop.py .github/workflows/pr168-desktop-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(desktop): forward normalized usage telemetry"
          git push origin HEAD:roadmap/161-frontend-telemetry-v2
