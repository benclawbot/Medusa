name: Refactor Guardrails

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'crates/**'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: refactor-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wire-dependency-locks:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/skill-dependency-locks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/skill-dependency-locks
          fetch-depth: 0
      - name: Verify present locks during project skill loading
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-runtime/src/support.rs')
          text = path.read_text()
          needle = '''        if path.starts_with(&canonical_root) {
            let resolved = crate::skill_dependencies::resolve_project_skill(
'''
          replacement = '''        if path.starts_with(&canonical_root) {
            crate::skill_dependency_locks::verify_dependency_lock_if_present(
                &approved_root,
                name,
            )
            .map_err(RuntimeError::InvalidCommand)?;
            let resolved = crate::skill_dependencies::resolve_project_skill(
'''
          if replacement not in text:
              if needle not in text:
                  raise SystemExit('skill loading insertion point not found')
              text = text.replace(needle, replacement, 1)
          path.write_text(text)
          PY
      - name: Format and verify command and runtime integration
        run: |
          cargo fmt --all
          cargo check -p medusa-runtime -p medusa-cli
          cargo test -p medusa-runtime skill -- --nocapture
          cargo test -p medusa-cli skill -- --nocapture
          bash scripts/check-source-size.sh
      - name: Restore workflow and commit implementation
        run: |
          git checkout origin/main -- .github/workflows/refactor-guardrails.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-runtime/src/support.rs crates/medusa-runtime/src/skill_dependency_locks.rs crates/medusa-runtime/src/lib.rs crates/medusa-runtime/Cargo.toml crates/medusa-cli/src/skill_dependencies.rs Cargo.lock .github/workflows/refactor-guardrails.yml
          git commit -m "Wire skill dependency lock commands and runtime verification"
          git push origin HEAD:agent/skill-dependency-locks
