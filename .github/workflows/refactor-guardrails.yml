name: Refactor Guardrails

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'crates/**'
      - 'scripts/check-source-size.sh'
      - 'scripts/check-workflow-hygiene.sh'
      - 'scripts/test-workflow-hygiene.sh'
      - 'docs/REFACTOR-BASELINE.md'
      - 'docs/PUBLIC-API-BASELINE.md'
      - 'docs/BENCHMARKS.md'
      - 'docs/source-size-exceptions.txt'
      - 'docs/workflow-write-allowlist.txt'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'crates/**'
      - 'scripts/check-source-size.sh'
      - 'scripts/check-workflow-hygiene.sh'
      - 'scripts/test-workflow-hygiene.sh'
      - 'docs/REFACTOR-BASELINE.md'
      - 'docs/PUBLIC-API-BASELINE.md'
      - 'docs/BENCHMARKS.md'
      - 'docs/source-size-exceptions.txt'
      - 'docs/workflow-write-allowlist.txt'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: refactor-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-size:
    name: Production source files <= 800 lines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/provider-first-run-config
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
          components: rustfmt
      - name: Extract inline tests
        run: |
          python3 scripts/extract_oversized_inline_tests.py
          cargo fmt --all
      - name: Verify extracted modules
        run: |
          cargo check -p medusa-extensions -p medusa-tui --all-targets --locked
          cargo test -p medusa-extensions --locked
          cargo test -p medusa-tui --locked
          bash scripts/check-source-size.sh
      - name: Commit extraction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit --no-verify -m 'refactor: extract oversized inline test modules'
            git push origin HEAD:agent/provider-first-run-config
          fi

  workflow-hygiene:
    name: Workflows are read-only or explicitly justified
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test workflow hygiene guard
        run: bash scripts/test-workflow-hygiene.sh
      - name: Audit repository workflows
        run: bash scripts/check-workflow-hygiene.sh

  compatibility-baseline:
    name: Public API and benchmark baseline present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate baseline documents
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/REFACTOR-BASELINE.md
          test -s docs/PUBLIC-API-BASELINE.md
          test -s docs/BENCHMARKS.md
          test -s docs/source-size-exceptions.txt
          grep -q '75%' docs/REFACTOR-BASELINE.md
          grep -q '5%' docs/BENCHMARKS.md
          grep -q 'medusa-agent' docs/PUBLIC-API-BASELINE.md
          echo refactor-baseline-ok
