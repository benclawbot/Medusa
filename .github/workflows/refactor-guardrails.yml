name: Refactor Guardrails

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'crates/**'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: refactor-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wire-dependency-locks:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/skill-dependency-locks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/skill-dependency-locks
          fetch-depth: 0
      - name: Restore and patch runtime module export
        run: |
          set -euo pipefail
          git checkout origin/main -- crates/medusa-runtime/src/lib.rs
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-runtime/src/lib.rs')
          text = path.read_text()
          needle = 'pub mod skill_dependencies;\n'
          replacement = needle + 'pub mod skill_dependency_locks;\n'
          if replacement not in text:
              text = text.replace(needle, replacement, 1)
          path.write_text(text)
          PY
      - name: Format and verify lock runtime
        run: |
          cargo fmt --all
          cargo check -p medusa-runtime
          bash scripts/check-source-size.sh
      - name: Restore workflow and commit implementation
        run: |
          git checkout origin/main -- .github/workflows/refactor-guardrails.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-runtime/src/lib.rs crates/medusa-runtime/src/skill_dependency_locks.rs crates/medusa-runtime/Cargo.toml Cargo.lock .github/workflows/refactor-guardrails.yml
          git commit -m "Implement skill dependency lock runtime"
          git push origin HEAD:agent/skill-dependency-locks
