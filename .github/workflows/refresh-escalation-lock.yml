name: Refresh Escalation Lock

on:
  workflow_dispatch:
  push:
    branches:
      - agent/chatgpt-escalation-bridge

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chatgpt-escalation-bridge
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Regenerate lockfile
        run: cargo generate-lockfile
      - name: Commit refreshed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: refresh lockfile for escalation CLI"
          git push origin HEAD:agent/chatgpt-escalation-bridge
