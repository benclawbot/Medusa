name: Fix provider PR final gates

on:
  push:
    branches: [agent/provider-first-run-config]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/provider-first-run-config
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
      - name: Apply final fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/medusa-cli/src/config_command.rs')
          text = path.read_text()
          old = '''        let mut profile = ProviderProfile::default();
                  profile.configured = true;
                  profile.connection = "omniroute".into();
                  profile.base_url = Some("http://127.0.0.1:20128/v1".into());'''.replace('                  ', '        ')
          new = '''        let profile = ProviderProfile {
                      configured: true,
                      connection: "omniroute".into(),
                      base_url: Some("http://127.0.0.1:20128/v1".into()),
                      ..ProviderProfile::default()
                  };'''.replace('                  ', '        ').replace('                      ', '            ')
          if old in text:
              text = text.replace(old, new)
          elif new not in text:
              raise SystemExit('config profile test marker missing')
          path.write_text(text)

          path = Path('apps/medusa-desktop/src-tauri/src/dto.rs')
          text = path.read_text()
          if '    Progress,\n    Verification,' not in text:
              text = text.replace('    Tool,\n    Verification,', '    Tool,\n    Progress,\n    Verification,')
          mapping = '                        RuntimeActivityKind::Progress => DesktopActivityKind::Progress,\n'
          if mapping not in text:
              anchor = '                        RuntimeActivityKind::Tool => DesktopActivityKind::Tool,\n'
              if anchor not in text:
                  raise SystemExit('desktop tool mapping marker missing')
              text = text.replace(anchor, anchor + mapping)
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Verify fixes
        run: |
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo check --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml --all-targets --locked
          cargo test -p medusa-cli --locked
          bash scripts/check-source-size.sh
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit --no-verify -m 'fix: satisfy final provider and desktop gates'
            git push origin HEAD:agent/provider-first-run-config
          fi
