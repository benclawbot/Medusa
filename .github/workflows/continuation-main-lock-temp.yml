name: Generate Continuation Main Lockfile Temp

on:
  push:
    branches:
      - agent/incomplete-plan-continuation-main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Generate and commit lockfile
        run: |
          cargo generate-lockfile
          cargo fmt --all
          rm .github/workflows/continuation-main-lock-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock crates/medusa-continuation/src/lib.rs .github/workflows/continuation-main-lock-temp.yml
          git commit -m "chore(continuation): refresh lockfile and format"
          git push
