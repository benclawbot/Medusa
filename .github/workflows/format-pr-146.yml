name: Format PR 146

on:
  push:
    branches:
      - roadmap/143-actions-logs

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/143-actions-logs
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --all
      - run: rm .github/workflows/format-pr-146.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style(desktop): apply rustfmt to GitHub log reader"
          git push origin HEAD:roadmap/143-actions-logs
