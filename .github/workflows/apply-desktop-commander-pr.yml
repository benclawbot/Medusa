name: Apply Desktop Commander integration

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: apply-desktop-commander-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'feat/desktop-commander-mcp'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/desktop-commander-mcp
          fetch-depth: 0
      - run: python3 .github/scripts/apply_desktop_commander_integration.py
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - run: cargo fmt --all
      - run: bash scripts/check-source-size.sh
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test -p medusa-extensions -p medusa-agent -p medusa-cli --locked
      - name: Commit integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md crates/medusa-extensions/src crates/medusa-agent/src crates/medusa-cli/src/main.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git diff --cached --check
          git commit -m "feat(mcp): wire Desktop Commander into the agent"
          git push origin HEAD:feat/desktop-commander-mcp
