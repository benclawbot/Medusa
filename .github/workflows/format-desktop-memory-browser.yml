name: Format desktop memory browser

on:
  push:
    branches:
      - agent/desktop-memory-browser

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/desktop-memory-browser
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format memory browser
        run: cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
      - name: Commit formatting
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/medusa-desktop/src-tauri/src/memories.rs
          git commit -m "Format desktop memory browser fix"
          git push origin HEAD:agent/desktop-memory-browser
