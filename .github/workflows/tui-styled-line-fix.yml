name: TUI StyledLine visibility fix

on:
  push:
    branches: [refactor/tui-lib-modularization]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-lib-modularization
      - name: Expose StyledLine to crate tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-tui/src/render/support.rs')
          text = path.read_text().replace('pub(super) struct StyledLine', 'pub(crate) struct StyledLine')
          path.write_text(text)
          PY
          rm -f .github/workflows/tui-styled-line-fix.yml .github/tui-styled-line-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix: expose TUI styled line to crate tests'
          git push origin HEAD:refactor/tui-lib-modularization
