name: Remove dead system prompt wrapper

on:
  push:
    branches:
      - feat/direct-skill-commands

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/direct-skill-commands
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Remove dead wrapper
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-agent/src/engine_support.rs')
          text = path.read_text()
          old = '''pub(crate) fn system_prompt(mode: Mode, repo: &Path) -> String {
    system_prompt_with_context(mode, repo, None)
}

'''
          old_call = '        let prompt = system_prompt(Mode::Yolo, directory.path());\n'
          if old in text:
              text = text.replace(old, '', 1)
          if old_call in text:
              text = text.replace(
                  old_call,
                  '        let prompt = system_prompt_with_context(Mode::Yolo, directory.path(), None);\n',
                  1,
              )
          path.write_text(text)
          PY
          cargo fmt --all
          git diff --check
      - name: Commit Clippy fix when needed
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-agent/src/engine_support.rs
          git commit -m "fix(agent): remove dead prompt wrapper"
          git push origin HEAD:feat/direct-skill-commands
