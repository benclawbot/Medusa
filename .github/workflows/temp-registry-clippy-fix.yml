name: Temporary registry Clippy fix

on:
  push:
    branches:
      - agent/durable-process-registry-main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/durable-process-registry-main
      - name: Remove redundant must_use
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-process-registry/src/lib.rs')
          text = path.read_text()
          old = '    #[must_use]\n    pub fn records(&self) -> impl Iterator<Item = &ProcessRecord> {'
          new = '    pub fn records(&self) -> impl Iterator<Item = &ProcessRecord> {'
          if old not in text:
              raise SystemExit('target not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: cargo fmt --all
      - run: rm .github/workflows/temp-registry-clippy-fix.yml
      - name: Commit fix and cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(process-registry): satisfy clippy"
          git push origin HEAD:agent/durable-process-registry-main
