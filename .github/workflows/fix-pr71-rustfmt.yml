name: Fix PR 71 rustfmt

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.number == 71 && github.event.pull_request.head.ref == 'agent/tui-markdown-scrollback-terse-chat'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format and push
        shell: bash
        run: |
          set -euxo pipefail
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-tui/src/app/tests.rs \
            crates/medusa-tui/src/lib.rs \
            crates/medusa-tui/src/render.rs \
            crates/medusa-tui/src/render/markdown.rs \
            crates/medusa-tui/src/session.rs
          if git diff --cached --quiet; then
            echo 'No formatting changes required'
            exit 0
          fi
          git commit -m 'chore: apply rustfmt to TUI fixes'
          git push origin HEAD
