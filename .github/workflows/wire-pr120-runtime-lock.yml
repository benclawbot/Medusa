name: Wire PR120 runtime lock verification

on:
  push:
    branches:
      - agent/skill-dependency-locks
    paths:
      - '.github/workflows/wire-pr120-runtime-lock.yml'

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/skill-dependency-locks
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Enforce present dependency locks during runtime loading
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-runtime/src/support.rs')
          text = path.read_text()
          needle = '''        if path.starts_with(&canonical_root) {
            let resolved = crate::skill_dependencies::resolve_project_skill(
'''
          replacement = '''        if path.starts_with(&canonical_root) {
            crate::skill_dependency_locks::verify_dependency_lock_if_present(
                &approved_root,
                name,
            )
            .map_err(RuntimeError::InvalidCommand)?;
            let resolved = crate::skill_dependencies::resolve_project_skill(
'''
          if replacement not in text:
              if needle not in text:
                  raise SystemExit('runtime skill loading insertion point not found')
              text = text.replace(needle, replacement, 1)
          path.write_text(text)
          PY
      - name: Verify runtime integration
        run: |
          cargo fmt --all
          cargo check -p medusa-runtime -p medusa-cli
          cargo test -p medusa-runtime skill -- --nocapture
          cargo test -p medusa-cli skill -- --nocapture
          bash scripts/check-source-size.sh
      - name: Commit verified runtime integration and remove workflow
        run: |
          set -euo pipefail
          rm .github/workflows/wire-pr120-runtime-lock.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-runtime/src/support.rs .github/workflows/wire-pr120-runtime-lock.yml
          git commit -m "Enforce skill dependency locks at runtime"
          git push origin HEAD:agent/skill-dependency-locks
