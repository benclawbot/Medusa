name: Apply engine modularization

on:
  push:
    branches:
      - refactor/agent-engine-modularization

permissions:
  contents: write

jobs:
  modularize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/agent-engine-modularization
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Split engine helpers into focused module
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          engine_path = root / 'crates/medusa-agent/src/engine.rs'
          text = engine_path.read_text()
          marker = 'fn content_with_session_goal'
          if marker not in text:
              raise SystemExit('engine already modularized or marker missing')
          index = text.index(marker)
          engine = text[:index]
          support = text[index:]

          engine = engine.replace(
              'use std::{collections::VecDeque, fs, path::Path};',
              'use std::{collections::VecDeque, path::Path};',
          )
          engine = engine.replace(
              'use medusa_provider::{\n    ImageSource, Message, MessageBlock, ModelProvider, ModelRequest, ProviderCapabilities,\n    ResponseBlock, Role,\n};',
              'use medusa_provider::{Message, MessageBlock, ModelProvider, ModelRequest, ResponseBlock, Role};',
          )
          engine = engine.replace(
              '    output_envelope::{EnvelopeConfig, OutputEnvelope, OutputFormat, wrap as wrap_envelope},\n',
              '    output_envelope::{OutputFormat, wrap as wrap_envelope},\n',
          )
          engine = engine.replace(
              '        AgentPlanStep, AgentPlanStepStatus, AgentQuestion, AgentQuestionItem, AgentQuestionOption,\n        AgentSession, bootstrap, load, persist,\n',
              '        AgentPlanStep, AgentQuestion, AgentSession, bootstrap, load, persist,\n',
          )
          engine = engine.replace(
              '    tools::{available_skills, built_in_tools, execute_tool},\n',
              '    engine_support::*,\n    tools::execute_tool,\n',
          )
          engine = engine.replace('const SYSTEM_PROMPT:', 'pub(crate) const SYSTEM_PROMPT:')
          engine = engine.replace('const PLAN_SYSTEM_PROMPT:', 'pub(crate) const PLAN_SYSTEM_PROMPT:')
          engine = engine.replace('const MAX_REPOSITORY_INSTRUCTIONS_BYTES: usize = 32_000;\n', '')

          header = '''use std::{fs, path::Path};

          use medusa_config::Mode;
          use medusa_core::{ErrorCategory, ErrorCode, MedusaError, MedusaResult};
          use medusa_protocol::{Actor, EventPayload};
          use medusa_provider::{ImageSource, Message, MessageBlock, ProviderCapabilities, Role};
          use time::OffsetDateTime;

          use crate::{
              engine::{AgentUpdate, PLAN_SYSTEM_PROMPT, SYSTEM_PROMPT},
              evidence::append_event,
              output_envelope::{EnvelopeConfig, OutputEnvelope},
              session::{
                  AgentPlanStep, AgentPlanStepStatus, AgentQuestion, AgentQuestionItem,
                  AgentQuestionOption, AgentSession, persist,
              },
              tools::{available_skills, built_in_tools},
          };

          const MAX_REPOSITORY_INSTRUCTIONS_BYTES: usize = 32_000;

          '''
          for name in [
              'content_with_session_goal', 'system_prompt', 'available_tools', 'tool_allowed',
              'question_from_input', 'question_from_assistant_text', 'pause_for_question',
              'plan_from_input', 'default_envelope_config', 'compact_envelope_for_model',
              'has_mutating_tool_result', 'plan_is_complete', 'compact_message_text',
              'append_observed', 'validate_messages', 'validate_user_content', 'json_error',
          ]:
              support = support.replace(f'fn {name}', f'pub(crate) fn {name}', 1)

          engine_path.write_text(engine)
          (root / 'crates/medusa-agent/src/engine_support.rs').write_text(header + support)

          lib_path = root / 'crates/medusa-agent/src/lib.rs'
          lib = lib_path.read_text()
          lib = lib.replace('mod engine;\n', 'mod engine;\nmod engine_support;\n')
          lib = lib.replace(
              'pub use engine::{\n    AgentEngine, AgentUpdate, StepOutcome, compact_session, update_session_objective,\n};',
              'pub use engine::{AgentEngine, AgentUpdate, StepOutcome};\npub use engine_support::{compact_session, update_session_objective};',
          )
          lib_path.write_text(lib)

          exceptions = root / 'docs/source-size-exceptions.txt'
          lines = [
              line for line in exceptions.read_text().splitlines()
              if 'crates/medusa-agent/src/engine.rs|' not in line
          ]
          exceptions.write_text('\n'.join(lines) + '\n')

          Path('.github/workflows/export-engine.yml').unlink()
          Path('docs/.engine-modularization-marker').unlink()
          PY
          cargo fmt --all
          test "$(wc -l < crates/medusa-agent/src/engine.rs)" -le 800
          test "$(wc -l < crates/medusa-agent/src/engine_support.rs)" -le 800
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: split agent engine support modules"
          git push origin HEAD:refactor/agent-engine-modularization
