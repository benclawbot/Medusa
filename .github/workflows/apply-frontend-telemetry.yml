name: Apply frontend telemetry patch

on:
  push:
    branches:
      - roadmap/161-frontend-telemetry-v2

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: python3 scripts/apply-frontend-telemetry.py
      - run: cargo fmt --all
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(usage): surface durable session telemetry" || exit 0
          git push
