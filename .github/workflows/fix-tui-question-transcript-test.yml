name: Fix TUI question transcript test

on: pull_request

permissions:
  contents: write

concurrency:
  group: fix-tui-question-transcript-test-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Update stale transcript expectations
        shell: python
        run: |
          from pathlib import Path

          path = Path('crates/medusa-tui/src/app/tests.rs')
          text = path.read_text()
          old = '''    assert_eq!(
        app.question_modal()
            .expect("question modal")
            .active_question(),
        1
    );
    assert!(app.transcript.is_empty());
    assert_eq!(
        app.handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("answer second question"),
        AppAction::Redraw
    );
    assert!(app.question_modal().expect("review answers").is_reviewing());
    assert!(app.transcript.is_empty());
'''
          new = '''    assert_eq!(
        app.question_modal()
            .expect("question modal")
            .active_question(),
        1
    );
    assert!(matches!(
        app.transcript.as_slice(),
        [TranscriptEntry::Assistant(text)]
            if text.contains("Which project should I use?")
                && text.contains("Who is this for?")
    ));
    assert_eq!(
        app.handle_event(Event::Key(crossterm::event::KeyEvent::new(
            KeyCode::Enter,
            KeyModifiers::NONE,
        )))
        .expect("answer second question"),
        AppAction::Redraw
    );
    assert!(app.question_modal().expect("review answers").is_reviewing());
    assert_eq!(app.transcript.len(), 1);
'''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'expected one stale question transcript block, found {text.count(old)}')
              path.write_text(text.replace(old, new, 1))
      - name: Verify complete TUI suite
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh
          cargo test -p medusa-tui
      - name: Commit test correction
        run: |
          if git diff --quiet; then
            echo 'Test correction already applied and verified.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates/medusa-tui/src/app/tests.rs
          git commit -m 'test(tui): retain clarification conversation'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
