name: PR 168 Metric Repair

on:
  push:
    branches: [roadmap/161-frontend-telemetry-v2]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/161-frontend-telemetry-v2
          fetch-depth: 0
      - name: Repair cumulative throughput assertion
        run: python scripts/fix_pr168_metric_test.py
      - name: Publish clean repair commit
        run: |
          rm scripts/fix_pr168_metric_test.py .github/workflows/pr168-metric-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test(tui): expect cumulative session throughput"
          git push origin HEAD:roadmap/161-frontend-telemetry-v2
