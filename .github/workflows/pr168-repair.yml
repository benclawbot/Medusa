name: PR 168 Repair

on:
  push:
    branches:
      - roadmap/161-frontend-telemetry-v2
    paths:
      - .github/workflows/pr168-repair.yml
      - scripts/fix_pr168.py

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/161-frontend-telemetry-v2
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - name: Apply focused repair
        run: python scripts/fix_pr168.py
      - name: Format and verify focused crates
        run: |
          cargo fmt --all
          cargo clippy -p medusa-runtime -p medusa-tui --all-targets -- -D warnings
          cargo test -p medusa-runtime -p medusa-tui
      - name: Commit repaired source and remove temporary automation
        run: |
          rm scripts/fix_pr168.py .github/workflows/pr168-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(usage): preserve live telemetry and cumulative throughput"
          git push origin HEAD:roadmap/161-frontend-telemetry-v2
