name: temp registry fix
on:
  push:
    branches: [agent/durable-process-registry-main]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/durable-process-registry-main
      - run: sed -i '/^    #\[must_use\]$/ { N; /pub fn records/ s/^    #\[must_use\]\n//; }' crates/medusa-process-registry/src/lib.rs
      - run: cargo fmt --all
      - run: rm .github/workflows/temp-registry-fix.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix(process-registry): satisfy clippy'
          git push origin HEAD:agent/durable-process-registry-main
