name: Report source size

on:
  push:
    branches: [agent/provider-first-run-config]

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture source-size report
        run: |
          set +e
          scripts/check-source-size.sh > source-size.log 2>&1
          echo $? > source-size.status
          find crates -type f -name '*.rs' -print0 | xargs -0 wc -l | sort -nr >> source-size.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: source-size-report
          path: |
            source-size.log
            source-size.status
