name: Fix runtime module boundaries

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'refactor/tui-runtime-modularization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-runtime-modularization
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Repair module imports and visibility
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path('crates/medusa-tui/src/runtime.rs')
          text = runtime.read_text()
          text = text.replace('    collections::BTreeMap,\n    io,', '    collections::BTreeMap,\n    env, io,')
          text = text.replace(
              'use medusa_agent::{AgentEngine, AgentSession, StepOutcome};',
              'use medusa_agent::{\n    AgentEngine, AgentSession, StepOutcome, compact_session, update_session_objective,\n};'
          )
          text = text.replace(
              '    commands::{Effort, ModelConfiguration, SlashCommand},',
              '    commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand},'
          )
          text = text.replace(
              '    UpdateState, configure_model, credential_environment, effort_for_turns, execute_slash_command,\n    forward_update, message_blocks, runtime_question, transcript_plan,',
              '    UpdateState, configure_model, credential_environment, discover_skills, effort_for_turns,\n    forward_update, is_supported_provider, message_blocks, model_configuration_details,\n    objective_for, runtime_question, transcript_plan, turns_for_effort,'
          )
          runtime.write_text(text)

          support = Path('crates/medusa-tui/src/runtime/support.rs')
          text = support.read_text()
          text = text.replace('    sync::{atomic::AtomicBool, mpsc::Sender},', '    sync::mpsc::Sender,')
          text = text.replace(
              'use medusa_agent::{\n    AgentPlanStep, AgentPlanStepStatus, AgentQuestion, AgentUpdate, compact_session,\n    update_session_objective,\n};',
              'use medusa_agent::{AgentPlanStep, AgentPlanStepStatus, AgentQuestion, AgentUpdate};'
          )
          text = text.replace('use medusa_config::Mode;\n', '')
          text = text.replace(
              '    commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand},',
              '    commands::{Effort, ModelConfiguration},'
          )
          text = text.replace(
              '    RuntimeActivity, RuntimeActivityKind, RuntimeError, RuntimeEvent, RuntimeQuestion,\n    RuntimeState, run_prompt,',
              '    RuntimeActivity, RuntimeActivityKind, RuntimeError, RuntimeEvent, RuntimeQuestion,\n    RuntimeState,'
          )
          for name in [
              'turns_for_effort', 'is_supported_provider', 'model_configuration_details',
              'discover_skills', 'tool_title', 'objective_for'
          ]:
              text = text.replace(f'fn {name}(', f'pub(super) fn {name}(')
          support.write_text(text)

          tests = Path('crates/medusa-tui/src/runtime/tests.rs')
          text = tests.read_text()
          text = text.replace('use std::sync::mpsc;', 'use std::{fs, sync::mpsc};')
          text = text.replace(
              'use medusa_protocol::EventPayload;',
              'use medusa_protocol::EventPayload;\nuse medusa_provider::ImageSource;'
          )
          text = text.replace(
              'use crate::clipboard::{ImageAttachment, PromptAttachment};',
              'use crate::{\n    app::TranscriptPlanStepState,\n    clipboard::{ImageAttachment, PromptAttachment},\n};\nuse super::support::{discover_skills, model_configuration_details, tool_title};'
          )
          tests.write_text(text)
          PY
          cargo fmt --all
          cargo check -p medusa-tui --all-targets
          rm .github/workflows/fix-runtime-module-boundaries.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: repair runtime module boundaries"
          git push origin HEAD:refactor/tui-runtime-modularization
