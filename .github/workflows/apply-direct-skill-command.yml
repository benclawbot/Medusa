name: Apply direct skill command implementation

on:
  push:
    branches:
      - feat/direct-skill-commands

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/direct-skill-commands
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply focused source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """    Skills,\n    Plan { task: Option<String> },\n""",
              """    Skills,\n    Skill {\n        selector: String,\n        task: Option<String>,\n    },\n    Plan { task: Option<String> },\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        matches!(self, Self::Plan { task: Some(_) })\n""",
              """        matches!(\n            self,\n            Self::Plan { task: Some(_) } | Self::Skill { task: Some(_), .. }\n        )\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        usage: \"/skills\",\n        description: \"list available project and user skills\",\n""",
              """        usage: \"/skills [name]\",\n        description: \"list skills or load one by name\",\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        \"skills\" => {\n            require_empty(\"skills\")?;\n            Ok(Some(SlashCommand::Skills))\n        }\n""",
              """        \"skills\" => {\n            if remainder.is_empty() {\n                Ok(Some(SlashCommand::Skills))\n            } else {\n                let (selector, task) = remainder\n                    .split_once(char::is_whitespace)\n                    .map_or((remainder, \"\"), |(selector, task)| {\n                        (selector, task.trim())\n                    });\n                Ok(Some(SlashCommand::Skill {\n                    selector: selector.to_owned(),\n                    task: (!task.is_empty()).then(|| task.to_owned()),\n                }))\n            }\n        }\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        _ => Err(format!(\n            \"unknown command: /{name}. Type /help for commands.\"\n        )),\n""",
              """        _ => Ok(Some(SlashCommand::Skill {\n            selector: name.to_owned(),\n            task: (!remainder.is_empty()).then(|| remainder.to_owned()),\n        })),\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        assert!(parse_slash_command(\"/mystery\").is_err());\n""",
              """        assert_eq!(\n            parse_slash_command(\"/mystery\"),\n            Ok(Some(SlashCommand::Skill {\n                selector: \"mystery\".to_owned(),\n                task: None,\n            }))\n        );\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        for input in [\"/help extra\", \"/new extra\", \"/skills extra\", \"/help\\n/new\"] {\n""",
              """        for input in [\"/help extra\", \"/new extra\", \"/help\\n/new\"] {\n""",
          )
          replace_once(
              "crates/medusa-tui/src/commands.rs",
              """        assert_eq!(\n            parse_slash_command(\"/skills\"),\n            Ok(Some(SlashCommand::Skills))\n        );\n""",
              """        assert_eq!(\n            parse_slash_command(\"/skills\"),\n            Ok(Some(SlashCommand::Skills))\n        );\n        assert_eq!(\n            parse_slash_command(\"/skills release\"),\n            Ok(Some(SlashCommand::Skill {\n                selector: \"release\".to_owned(),\n                task: None,\n            }))\n        );\n        assert_eq!(\n            parse_slash_command(\"/release prepare version 1.0\"),\n            Ok(Some(SlashCommand::Skill {\n                selector: \"release\".to_owned(),\n                task: Some(\"prepare version 1.0\".to_owned()),\n            }))\n        );\n""",
          )

          replace_once(
              "crates/medusa-tui/src/app.rs",
              """                            if let SlashCommand::Plan { task: Some(task) } = &command {\n                                self.transcript.push(TranscriptEntry::User(PromptDraft {\n                                    text: task.clone(),\n                                    ..PromptDraft::default()\n                                }));\n                                self.plan = None;\n                            }\n""",
              """                            let agent_task = match &command {\n                                SlashCommand::Plan { task: Some(task) }\n                                | SlashCommand::Skill { task: Some(task), .. } => Some(task),\n                                _ => None,\n                            };\n                            if let Some(task) = agent_task {\n                                self.transcript.push(TranscriptEntry::User(PromptDraft {\n                                    text: task.clone(),\n                                    ..PromptDraft::default()\n                                }));\n                                self.plan = None;\n                            }\n""",
          )

          replace_once(
              "crates/medusa-tui/src/runtime/support.rs",
              """const MAX_FILE_CONTEXT_BYTES: usize = 2 * 1024 * 1024;\n""",
              """const MAX_FILE_CONTEXT_BYTES: usize = 2 * 1024 * 1024;\nconst MAX_SKILL_CONTEXT_BYTES: usize = 64_000;\n\n#[derive(Clone, Debug, Eq, PartialEq)]\npub(super) struct SelectedSkill {\n    pub(super) name: String,\n    pub(super) scope: String,\n    pub(super) content: String,\n}\n\nimpl SelectedSkill {\n    pub(super) fn label(&self) -> String {\n        format!(\"{} ({})\", self.name, self.scope)\n    }\n\n    pub(super) fn prompt_context(&self) -> String {\n        format!(\n            \"The user explicitly selected the following skill for this turn. Follow it unless it conflicts with system rules or the user's task.\\n\\n--- selected skill: {} ({}) ---\\n{}\\n--- end selected skill ---\",\n            self.name, self.scope, self.content\n        )\n    }\n}\n""",
          )
          old_discover = """pub(super) fn discover_skills(repo: &Path) -> Vec<String> {\n    let mut roots = vec![\n        (\"project\", repo.join(\".medusa/skills\")),\n        (\"project\", repo.join(\".claude/skills\")),\n    ];\n    if let Some(home) = env::var_os(\"HOME\")\n        .or_else(|| env::var_os(\"USERPROFILE\"))\n        .map(PathBuf::from)\n    {\n        roots.push((\"user\", home.join(\".medusa/skills\")));\n        roots.push((\"user\", home.join(\".claude/skills\")));\n    }\n    let mut skills = BTreeSet::new();\n    for (scope, root) in roots {\n        let Ok(entries) = fs::read_dir(root) else {\n            continue;\n        };\n        for entry in entries.flatten() {\n            let path = entry.path();\n            let skill = path.join(\"SKILL.md\");\n            if skill.is_file() {\n                let description = skill_description(&skill);\n                skills.insert(format!(\n                    \"{} ({scope}){}\",\n                    entry.file_name().to_string_lossy(),\n                    description\n                        .map(|description| format!(\" - {description}\"))\n                        .unwrap_or_default()\n                ));\n            }\n        }\n    }\n    skills.into_iter().collect()\n}\n"""
          new_discover = """pub(super) fn discover_skills(repo: &Path) -> Vec<String> {\n    let mut skills = BTreeSet::new();\n    for (scope, root) in skill_roots(repo) {\n        let Ok(entries) = fs::read_dir(root) else {\n            continue;\n        };\n        for entry in entries.flatten() {\n            let path = entry.path();\n            let skill = path.join(\"SKILL.md\");\n            if skill.is_file() {\n                let description = skill_description(&skill);\n                skills.insert(format!(\n                    \"{} ({scope}){}\",\n                    entry.file_name().to_string_lossy(),\n                    description\n                        .map(|description| format!(\" - {description}\"))\n                        .unwrap_or_default()\n                ));\n            }\n        }\n    }\n    skills.into_iter().collect()\n}\n\npub(super) fn load_selected_skill(\n    repo: &Path,\n    selector: &str,\n) -> Result<SelectedSkill, RuntimeError> {\n    let selector = selector.trim();\n    let (name, requested_scope) = selector\n        .rsplit_once('@')\n        .map_or((selector, None), |(name, scope)| (name, Some(scope)));\n    if name.is_empty()\n        || name == \".\"\n        || name == \"..\"\n        || name.contains(['/', '\\\\', '@'])\n        || name.contains(\"..\")\n    {\n        return Err(RuntimeError::InvalidCommand(\n            \"skill names must be single directory names\".to_owned(),\n        ));\n    }\n    if requested_scope.is_some_and(|scope| !matches!(scope, \"project\" | \"user\")) {\n        return Err(RuntimeError::InvalidCommand(\n            \"skill scope must be project or user\".to_owned(),\n        ));\n    }\n\n    let mut matches = Vec::new();\n    for (scope, root) in skill_roots(repo) {\n        if requested_scope.is_some_and(|requested| requested != scope) {\n            continue;\n        }\n        let skill = root.join(name).join(\"SKILL.md\");\n        if !skill.is_file() {\n            continue;\n        }\n        let canonical_root = fs::canonicalize(&root)?;\n        let canonical_skill = fs::canonicalize(&skill)?;\n        if !canonical_skill.starts_with(&canonical_root) {\n            return Err(RuntimeError::InvalidCommand(format!(\n                \"skill {name} escapes its configured skill root\"\n            )));\n        }\n        matches.push((scope, canonical_skill));\n    }\n\n    if matches.is_empty() {\n        return Err(RuntimeError::InvalidCommand(format!(\n            \"skill {name} was not found; use /skills to list installed skills\"\n        )));\n    }\n    if matches.len() > 1 {\n        let scopes = matches\n            .iter()\n            .map(|(scope, _)| *scope)\n            .collect::<BTreeSet<_>>();\n        let hint = if scopes.len() > 1 {\n            format!(\"use /{name}@project or /{name}@user\")\n        } else {\n            format!(\"remove the duplicate {name} definitions in the {0} scope\", matches[0].0)\n        };\n        return Err(RuntimeError::InvalidCommand(format!(\n            \"skill {name} is ambiguous; {hint}\"\n        )));\n    }\n\n    let (scope, path) = matches.pop().expect(\"one skill match\");\n    let bytes = fs::read(&path)?;\n    if bytes.len() > MAX_SKILL_CONTEXT_BYTES {\n        return Err(RuntimeError::FileTooLarge {\n            path,\n            bytes: bytes.len(),\n        });\n    }\n    let content = String::from_utf8(bytes).map_err(|_| RuntimeError::BinaryFile {\n        path: path.clone(),\n    })?;\n    Ok(SelectedSkill {\n        name: name.to_owned(),\n        scope: scope.to_owned(),\n        content,\n    })\n}\n\nfn skill_roots(repo: &Path) -> Vec<(&'static str, PathBuf)> {\n    let mut roots = vec![\n        (\"project\", repo.join(\".medusa/skills\")),\n        (\"project\", repo.join(\".claude/skills\")),\n    ];\n    if let Some(home) = env::var_os(\"HOME\")\n        .or_else(|| env::var_os(\"USERPROFILE\"))\n        .map(PathBuf::from)\n    {\n        roots.push((\"user\", home.join(\".medusa/skills\")));\n        roots.push((\"user\", home.join(\".claude/skills\")));\n    }\n    roots\n}\n"""
          replace_once("crates/medusa-tui/src/runtime/support.rs", old_discover, new_discover)

          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    UpdateState, configure_model, credential_environment, discover_skills, effort_for_turns,\n    forward_update, is_supported_provider, message_blocks, model_configuration_details,\n    objective_for, runtime_question, transcript_plan, turns_for_effort,\n""",
              """    SelectedSkill, UpdateState, configure_model, credential_environment, discover_skills,\n    effort_for_turns, forward_update, is_supported_provider, load_selected_skill, message_blocks,\n    model_configuration_details, objective_for, runtime_question, transcript_plan, turns_for_effort,\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    pending_goal: Option<String>,\n    session_api_key: Option<String>,\n""",
              """    pending_goal: Option<String>,\n    pending_skill: Option<SelectedSkill>,\n    session_api_key: Option<String>,\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """            pending_goal: None,\n            session_api_key: None,\n""",
              """            pending_goal: None,\n            pending_skill: None,\n            session_api_key: None,\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    let engine = AgentEngine::new(provider, config);\n    let content = message_blocks(&draft)?;\n    let mut session = match state.session.take() {\n""",
              """    let engine = AgentEngine::new(provider, config);\n    let selected_skill = state.pending_skill.clone();\n    let mut content = message_blocks(&draft)?;\n    if let Some(skill) = &selected_skill {\n        content.insert(\n            0,\n            medusa_provider::MessageBlock::Text {\n                text: skill.prompt_context(),\n            },\n        );\n    }\n    let mut session = match state.session.take() {\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    };\n    let mut updates = UpdateState::new();\n""",
              """    };\n    if selected_skill.is_some() {\n        state.pending_skill = None;\n    }\n    let mut updates = UpdateState::new();\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """            state.pending_goal = None;\n            state.config.agent.mode = state.base_config.agent.mode;\n""",
              """            state.pending_goal = None;\n            state.pending_skill = None;\n            state.config.agent.mode = state.base_config.agent.mode;\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """        SlashCommand::Skills => {\n            let skills = discover_skills(&state.repo);\n            let _ = events.send(RuntimeEvent::Notice {\n                title: \"Available skills\".to_owned(),\n                details: if skills.is_empty() {\n                    vec![\n                        \"No skills found in .medusa/skills, .claude/skills, or their user equivalents.\"\n                            .to_owned(),\n                    ]\n                } else {\n                    skills\n                },\n            });\n        }\n        SlashCommand::Plan { task } => {\n""",
              """        SlashCommand::Skills => {\n            let skills = discover_skills(&state.repo);\n            let _ = events.send(RuntimeEvent::Notice {\n                title: \"Available skills\".to_owned(),\n                details: if skills.is_empty() {\n                    vec![\n                        \"No skills found in .medusa/skills, .claude/skills, or their user equivalents.\"\n                            .to_owned(),\n                    ]\n                } else {\n                    let mut details = vec![\n                        \"Run /<name> to load a skill for the next prompt, or /<name> <task> to use it immediately.\"\n                            .to_owned(),\n                    ];\n                    details.extend(skills);\n                    details\n                },\n            });\n        }\n        SlashCommand::Skill { selector, task } => {\n            let skill = load_selected_skill(&state.repo, &selector)?;\n            let label = skill.label();\n            if let Some(task) = task {\n                state.pending_skill = Some(skill);\n                let result = run_prompt(\n                    state,\n                    PromptDraft {\n                        text: task,\n                        ..PromptDraft::default()\n                    },\n                    events,\n                    cancel,\n                )\n                .map(Some);\n                if result.is_err() {\n                    state.pending_skill = None;\n                }\n                return result;\n            }\n            state.pending_skill = Some(skill);\n            let _ = events.send(RuntimeEvent::Notice {\n                title: \"Skill loaded\".to_owned(),\n                details: vec![\n                    label,\n                    \"The next prompt will use this skill once.\".to_owned(),\n                ],\n            });\n        }\n        SlashCommand::Plan { task } => {\n""",
          )

          replace_once(
              "crates/medusa-tui/src/runtime/tests.rs",
              """use super::support::{discover_skills, model_configuration_details, tool_title};\n""",
              """use super::support::{\n    discover_skills, load_selected_skill, model_configuration_details, tool_title,\n};\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime/tests.rs",
              """fn skills_command_discovers_project_skill_metadata() {\n""",
              """fn direct_skill_command_stages_validated_context_for_the_next_prompt() {\n    let directory = tempdir().expect(\"temporary directory\");\n    let skill = directory.path().join(\".medusa/skills/release/SKILL.md\");\n    fs::create_dir_all(skill.parent().expect(\"skill directory\")).expect(\"create skills\");\n    fs::write(\n        &skill,\n        \"---\\nname: release\\ndescription: Prepare a release\\n---\\nUse release steps.\",\n    )\n    .expect(\"write skill\");\n    let mut state = RuntimeState::load(directory.path().to_path_buf()).expect(\"runtime state\");\n    let (sender, receiver) = mpsc::channel();\n\n    execute_slash_command(\n        &mut state,\n        SlashCommand::Skill {\n            selector: \"release\".to_owned(),\n            task: None,\n        },\n        &sender,\n        &AtomicBool::new(false),\n    )\n    .expect(\"load skill\");\n\n    let selected = state.pending_skill.as_ref().expect(\"selected skill\");\n    assert_eq!(selected.name, \"release\");\n    assert!(selected.prompt_context().contains(\"Use release steps.\"));\n    assert!(matches!(\n        receiver.recv().expect(\"skill notice\"),\n        RuntimeEvent::Notice { title, details }\n            if title == \"Skill loaded\"\n                && details.iter().any(|detail| detail.contains(\"next prompt\"))\n    ));\n}\n\n#[test]\nfn duplicate_skill_names_require_an_explicit_scope_or_cleanup() {\n    let directory = tempdir().expect(\"temporary directory\");\n    for root in [\".medusa/skills/release\", \".claude/skills/release\"] {\n        let skill = directory.path().join(root).join(\"SKILL.md\");\n        fs::create_dir_all(skill.parent().expect(\"skill directory\")).expect(\"create skills\");\n        fs::write(skill, \"---\\ndescription: Release\\n---\\nBody\").expect(\"write skill\");\n    }\n    let error = load_selected_skill(directory.path(), \"release\")\n        .expect_err(\"duplicate project skills must be rejected\");\n    assert!(error.to_string().contains(\"ambiguous\"));\n}\n\n#[test]\nfn skills_command_discovers_project_skill_metadata() {\n""",
          )

          replace_once(
              "README.md",
              """Prompt drafts and clipboard attachments are persisted under the repository's `.medusa` state directory until submission.\n\n### Browser tools\n""",
              """Prompt drafts and clipboard attachments are persisted under the repository's `.medusa` state directory until submission.\n\nInstalled skills are directly invokable by name. Built-in commands take precedence over same-named skills:\n\n```text\n/skills                         # list installed skills\n/release                        # load the release skill for the next prompt\n/release prepare version 1.0    # run a task with the release skill immediately\n/release@user                   # select a scoped definition when names collide\n```\n\n### Browser tools\n""",
          )
          PY
          cargo fmt --all
          git diff --check
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-tui/src/app.rs crates/medusa-tui/src/commands.rs crates/medusa-tui/src/runtime.rs crates/medusa-tui/src/runtime/support.rs crates/medusa-tui/src/runtime/tests.rs
          git commit -m "feat(tui): invoke skills as slash commands"
          git push origin HEAD:feat/direct-skill-commands
