name: Add app coverage

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  cover:
    if: github.head_ref == 'refactor/tui-app-modularization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-app-modularization
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Add focused modal and scrollback coverage
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/medusa-tui/src/app/tests.rs')
          text = path.read_text()
          marker = 'fn modal_and_scrollback_boundaries_are_covered()'
          if marker not in text:
              text += r'''

#[test]
fn modal_and_scrollback_boundaries_are_covered() {
    let mut scrollback = Scrollback::default();
    scrollback.scroll_up(10, 4);
    assert_eq!(scrollback.offset, 4);
    scrollback.scroll_down(2);
    assert_eq!(scrollback.offset, 2);
    scrollback.scroll_down(10);
    assert_eq!(scrollback.offset, 0);

    let mut modal = ModelModal::new(None, Some("effort:low"), false);
    assert_eq!(modal.provider(), "minimax");
    assert_eq!(modal.selected_model(), "MiniMax-M3");
    assert_eq!(modal.effort(), Effort::Low);
    assert_eq!(modal.api_key_mask(), "not configured");

    modal.cycle_focus_back();
    assert_eq!(modal.focus(), ModelModalFocus::Provider);
    modal.move_selection(1);
    assert_eq!(modal.provider(), "anthropic");
    assert_eq!(modal.selected_model(), "claude-opus-4-6");
    modal.cycle_focus();
    modal.move_selection(1);
    assert_eq!(modal.selected_model(), "claude-sonnet-4-6");
    modal.cycle_focus();
    modal.move_selection(1);
    assert_eq!(modal.effort(), Effort::Medium);
    modal.cycle_focus();
    modal.insert_key_text(" key with spaces ");
    assert_eq!(modal.api_key_mask(), "*************");
    modal.delete_key_character();
    assert_eq!(modal.configuration().api_key.as_deref(), Some("keywithspace"));

    let configured = ModelModal::new(
        Some("anthropic-compatible / custom-v2"),
        Some("effort:auto"),
        true,
    );
    assert_eq!(configured.provider(), "anthropic-compatible");
    assert_eq!(configured.selected_model(), "custom-v2");
    assert_eq!(configured.effort(), Effort::Auto);
    assert_eq!(configured.api_key_mask(), "configured");
}

#[test]
fn question_modal_covers_multi_select_custom_and_review_paths() {
    let mut modal = QuestionModal::new(vec![QuestionPrompt {
        header: "Scope".to_owned(),
        question: "Choose targets".to_owned(),
        options: vec![
            QuestionOption {
                label: "A".to_owned(),
                description: String::new(),
            },
            QuestionOption {
                label: "B".to_owned(),
                description: String::new(),
            },
        ],
        multi_select: true,
    }]);
    assert_eq!(modal.active_selected_option(), 0);
    modal.toggle_current_option();
    modal.move_selection(1);
    modal.toggle_current_option();
    assert_eq!(modal.answer_for(0).as_deref(), Some("A, B"));
    assert!(modal.select_current_answer());
    modal.advance_or_review();
    assert!(modal.is_reviewing());
    assert_eq!(modal.answer_bundle().as_deref(), Some("Scope: A, B"));
    modal.move_question(-1);
    assert!(!modal.is_reviewing());
    modal.insert_answer("custom");
    assert_eq!(modal.active_custom_answer(), "custom");
    modal.delete_answer_character();
    assert_eq!(modal.answer_for(0).as_deref(), Some("custo"));
}
'''
              path.write_text(text)
          PY
          cargo fmt --all
          cargo test -p medusa-tui modal_and_scrollback_boundaries_are_covered -- --exact
          cargo test -p medusa-tui question_modal_covers_multi_select_custom_and_review_paths -- --exact
          cargo clippy -p medusa-tui --all-targets --all-features -- -D warnings
          rm .github/workflows/add-app-coverage.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: restore app modularization coverage"
          git push origin HEAD:refactor/tui-app-modularization
