name: Patch desktop memory browser

on:
  push:
    branches:
      - agent/desktop-memory-browser

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/desktop-memory-browser
      - uses: actions/setup-python@v5
      - name: Wire memory browser
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing patch anchor in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1))

          replace(
              'apps/medusa-desktop/src-tauri/Cargo.toml',
              'medusa-daemon = { path = "../../../crates/medusa-daemon" }\n',
              'medusa-daemon = { path = "../../../crates/medusa-daemon" }\nmedusa-memory = { path = "../../../crates/medusa-memory" }\n',
          )
          replace(
              'apps/medusa-desktop/src-tauri/src/lib.rs',
              'mod dto;\n',
              'mod dto;\nmod memories;\n',
          )
          replace(
              'apps/medusa-desktop/src-tauri/src/lib.rs',
              'use diffs::runtime_read_diff;\n',
              'use diffs::runtime_read_diff;\nuse memories::runtime_list_memories;\n',
          )
          replace(
              'apps/medusa-desktop/src-tauri/src/lib.rs',
              '            runtime_read_diff,\n',
              '            runtime_read_diff,\n            runtime_list_memories,\n',
          )

          runtime = Path('apps/medusa-desktop/src/runtime.ts')
          text = runtime.read_text()
          marker = 'export interface ModelConfiguration {'
          if marker not in text:
              raise SystemExit('runtime type anchor missing')
          types = '''export interface DesktopMemory {
            id: string;
            memoryType: string;
            title: string;
            body: string;
            createdAt: string;
            updatedAt: string;
            scope: string;
            projectId?: string;
            sessionId?: string;
            status: string;
            confidenceMilli: number;
            validation: string;
            sources: string[];
            supersedes: string[];
            supersededBy: string[];
            tags: string[];
            expiresAt?: string;
            lastValidatedAt: string;
            successfulReuseCount: number;
            path: string;
          }

          '''
          text = text.replace(marker, types + marker, 1)
          text += '''\nexport async function listRuntimeMemories(\n  repo: string,\n  query = "",\n  includeInactive = false,\n): Promise<DesktopMemory[]> {\n  return invoke<DesktopMemory[]>("runtime_list_memories", { repo, query, includeInactive });\n}\n'''
          runtime.write_text(text)

          app = Path('apps/medusa-desktop/src/App.tsx')
          text = app.read_text()
          text = text.replace('  Bot,\n', '  Bot,\n  BookOpen,\n', 1)
          import_anchor = 'import { ApprovalCard } from "./ApprovalCard";\nimport "./approval-card.css";\n'
          if import_anchor not in text:
              raise SystemExit('App import anchor missing')
          text = text.replace(import_anchor, import_anchor + 'import { MemoryBrowser } from "./MemoryBrowser";\nimport "./memory-browser.css";\n', 1)
          text = text.replace('useState<"chat" | "plan" | "settings">("chat")', 'useState<"chat" | "plan" | "memory" | "settings">("chat")', 1)
          nav_anchor = '''          <button className={`nav-item ${activePanel === "plan" ? "active" : ""}`} onClick={() => setActivePanel("plan")}>
            <ListChecks size={16} /> Plan
          </button>
'''
          nav_new = nav_anchor + '''          <button className={`nav-item ${activePanel === "memory" ? "active" : ""}`} onClick={() => setActivePanel("memory")}>
            <BookOpen size={16} /> Memory
          </button>
'''
          if nav_anchor not in text:
              raise SystemExit('App nav anchor missing')
          text = text.replace(nav_anchor, nav_new, 1)
          settings_anchor = '        {activePanel === "settings" && (\n'
          if settings_anchor not in text:
              raise SystemExit('App settings anchor missing')
          text = text.replace(settings_anchor, '        {activePanel === "memory" && <MemoryBrowser repo={repo} />}\n\n' + settings_anchor, 1)
          app.write_text(text)
          PY
      - name: Format and validate
        run: |
          cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml -- --check
          cd apps/medusa-desktop
          npm ci
          npm run typecheck
          npm test
          npm run build
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/medusa-desktop
          git commit -m "Wire desktop memory browser" || exit 0
          git push origin HEAD:agent/desktop-memory-browser
