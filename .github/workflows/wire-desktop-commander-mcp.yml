    ) -> MedusaResult<String> {
        let tool = input_string(input, "tool")?;
        let arguments = input.get("arguments").ok_or_else(|| {
            MedusaError::new(
                ErrorCode::InvalidConfiguration,
                ErrorCategory::Validation,
                "desktop_commander.arguments must be an object",
            )
