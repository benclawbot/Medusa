name: Harden skill autocomplete metadata

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'feat/dynamic-skill-autocomplete'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/dynamic-skill-autocomplete
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply bounded and contained discovery
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/medusa-tui/src/commands.rs')
          text = path.read_text()

          old = '''use std::{
              collections::BTreeMap,
              env, fs,
              path::{Path, PathBuf},
          };
          '''
          new = '''use std::{
              collections::BTreeMap,
              env, fs,
              io::Read,
              path::{Path, PathBuf},
          };

          const MAX_SKILL_DESCRIPTION_BYTES: u64 = 8 * 1024;
          '''
          if text.count(old) != 1:
              raise SystemExit('expected one commands import block')
          text = text.replace(old, new, 1)

          old = '''fn discover_skills(repo: &Path) -> Vec<DiscoveredSkill> {
              let mut skills = Vec::new();
              for (scope, root) in skill_roots(repo) {
                  let Ok(entries) = fs::read_dir(root) else {
                      continue;
                  };
                  for entry in entries.flatten() {
                      let skill = entry.path().join("SKILL.md");
                      if !skill.is_file() {
                          continue;
                      }
                      skills.push(DiscoveredSkill {
                          name: entry.file_name().to_string_lossy().into_owned(),
                          scope: scope.to_owned(),
                          description: skill_description(&skill),
                      });
                  }
              }
              skills
          }
          '''
          new = '''fn discover_skills(repo: &Path) -> Vec<DiscoveredSkill> {
              let mut skills = Vec::new();
              for (scope, root) in skill_roots(repo) {
                  let Ok(canonical_root) = fs::canonicalize(&root) else {
                      continue;
                  };
                  let Ok(entries) = fs::read_dir(&canonical_root) else {
                      continue;
                  };
                  for entry in entries.flatten() {
                      let name = entry.file_name().to_string_lossy().into_owned();
                      if !valid_skill_name(&name) {
                          continue;
                      }
                      let skill = entry.path().join("SKILL.md");
                      let Ok(canonical_skill) = fs::canonicalize(&skill) else {
                          continue;
                      };
                      if !canonical_skill.starts_with(&canonical_root) || !canonical_skill.is_file() {
                          continue;
                      }
                      skills.push(DiscoveredSkill {
                          name,
                          scope: scope.to_owned(),
                          description: skill_description(&canonical_skill),
                      });
                  }
              }
              skills
          }
          '''
          if text.count(old) != 1:
              raise SystemExit('expected one discover_skills function')
          text = text.replace(old, new, 1)

          old = '''fn skill_description(path: &Path) -> Option<String> {
              fs::read_to_string(path).ok().and_then(|text| {
                  text.lines().find_map(|line| {
                      line.strip_prefix("description:")
                          .map(str::trim)
                          .filter(|value| !value.is_empty())
                          .map(|value| value.trim_matches('"').to_owned())
                  })
              })
          }
          '''
          new = '''fn skill_description(path: &Path) -> Option<String> {
              let mut reader = fs::File::open(path).ok()?.take(MAX_SKILL_DESCRIPTION_BYTES);
              let mut text = String::new();
              reader.read_to_string(&mut text).ok()?;
              text.lines().find_map(|line| {
                  line.strip_prefix("description:")
                      .map(str::trim)
                      .filter(|value| !value.is_empty())
                      .map(|value| value.trim_matches('"').to_owned())
              })
          }

          fn valid_skill_name(name: &str) -> bool {
              !name.is_empty()
                  && name != "."
                  && name != ".."
                  && !name.contains('/')
                  && !name.as_bytes().contains(&92)
                  && !name.contains('@')
                  && !name.contains("..")
          }
          '''
          if text.count(old) != 1:
              raise SystemExit('expected one skill_description function')
          text = text.replace(old, new, 1)

          marker = '''    #[test]
              fn colliding_skills_receive_scope_suffixes_and_invalid_duplicates_are_hidden() {
          '''.replace('              fn', '    fn')
          tests = r'''    #[test]
          fn invalid_skill_names_are_never_suggested() {
              for name in ["", ".", "..", "bad@name", "bad..name", "bad\\name"] {
                  assert!(!valid_skill_name(name), "{name}");
              }
              assert!(valid_skill_name("release-tools"));
          }

          #[cfg(unix)]
          #[test]
          fn escaped_skill_symlink_is_not_suggested() {
              use std::os::unix::fs::symlink;

              let repository = tempfile::tempdir().expect("repository");
              let outside = tempfile::tempdir().expect("outside directory");
              let outside_skill = outside.path().join("escaped");
              std::fs::create_dir_all(&outside_skill).expect("outside skill directory");
              std::fs::write(
                  outside_skill.join("SKILL.md"),
                  "description: Escaped instructions",
              )
              .expect("outside skill");
              let root = repository.path().join(".medusa/skills");
              std::fs::create_dir_all(&root).expect("skill root");
              symlink(&outside_skill, root.join("escaped")).expect("skill symlink");

              assert!(command_suggestions("/esc", repository.path()).is_empty());
          }

          '''
          if text.count(marker) != 1:
              raise SystemExit('expected collision test marker')
          text = text.replace(marker, tests + marker, 1)
          path.write_text(text)
          PY
          cargo fmt --all
          git diff --check
          cargo test -p medusa-tui commands::tests -- --nocapture 2>&1 | tee hardening-tests.log
      - name: Capture diagnostics
        if: failure()
        shell: bash
        run: git diff -- . ':!Cargo.lock' > hardening.patch
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: skill-autocomplete-hardening-diagnostics
          path: |
            hardening-tests.log
            hardening.patch
          if-no-files-found: ignore
      - name: Commit hardening
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-tui/src/commands.rs
          git commit -m "fix(tui): harden skill autocomplete discovery"
          git push origin HEAD:feat/dynamic-skill-autocomplete
