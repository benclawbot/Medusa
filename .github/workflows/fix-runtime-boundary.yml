name: Fix runtime split boundary

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'refactor/tui-runtime-modularization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-runtime-modularization
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Restore RuntimeError attribute boundary
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          support = Path('crates/medusa-tui/src/runtime/support.rs')
          text = support.read_text().rstrip()
          suffix = '#[derive(Debug)]'
          if not text.endswith(suffix):
              raise SystemExit('expected detached derive attribute')
          support.write_text(text[:-len(suffix)].rstrip() + '\n')

          runtime = Path('crates/medusa-tui/src/runtime.rs')
          text = runtime.read_text()
          needle = 'pub enum RuntimeError {'
          if '#[derive(Debug)]\n' + needle not in text:
              text = text.replace(needle, '#[derive(Debug)]\n' + needle, 1)
          runtime.write_text(text)
          Path('.github/workflows/fix-runtime-boundary.yml').unlink()
          PY
          cargo fmt --all
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: restore runtime error attribute boundary"
          git push origin HEAD:refactor/tui-runtime-modularization
