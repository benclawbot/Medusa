name: Desktop Format Artifact

on:
  pull_request:
    paths:
      - "apps/medusa-desktop/src-tauri/**/*.rs"
      - ".github/workflows/desktop-format-artifact.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format desktop Rust adapter
        run: cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/medusa-desktop/src-tauri/src
          git commit -m "style(desktop): apply rustfmt"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
