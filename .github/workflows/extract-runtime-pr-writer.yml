name: Extract Runtime PR Writer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract:
    if: github.head_ref == 'agent/extract-frontend-neutral-runtime'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Extract frontend-neutral runtime
        shell: bash
        run: |
          if [ -d crates/medusa-runtime ]; then
            echo "runtime already extracted"
            exit 0
          fi
          awk '/python3 <<'"'"'PY'"'"'/{capture=1; next} /^          PY$/{capture=0} capture {sub(/^          /, ""); print}' \
            .github/workflows/extract-runtime-writer.yml > /tmp/extract-runtime.py
          python3 /tmp/extract-runtime.py
          cargo fmt --all
          cargo check --workspace --all-features
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked

      - name: Commit extraction
        shell: bash
        run: |
          if git diff --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md crates/medusa-runtime crates/medusa-tui
          git commit -m "refactor: extract frontend-neutral runtime"
          git push origin HEAD:agent/extract-frontend-neutral-runtime
