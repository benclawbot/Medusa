name: Extract Runtime PR Writer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract:
    if: github.head_ref == 'agent/extract-frontend-neutral-runtime'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Extract frontend-neutral runtime
        id: extraction
        shell: bash
        run: |
          if [ -d crates/medusa-runtime ] || [ -f .github/runtime-extraction-error.log ]; then
            echo "status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          awk '/python3 <<'"'"'PY'"'"'/{capture=1; next} /^          PY$/{capture=0} capture {sub(/^          /, ""); print}' \
            .github/workflows/extract-runtime-writer.yml > /tmp/extract-runtime.py
          set +e
          {
            python3 /tmp/extract-runtime.py
            python3 <<'PY'
            from pathlib import Path

            runtime = Path('crates/medusa-runtime/src/lib.rs')
            text = runtime.read_text()
            text = text.replace(
                'pub use commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand};\n',
                '',
                1,
            )
            text = text.replace(
                'pub use medusa_agent::{AgentPlanStepStatus, AgentQuestionItem, AgentQuestionOption};',
                'pub use medusa_agent::{\n    AgentPlanStep as RuntimePlanStep, AgentPlanStepStatus, AgentQuestionItem,\n    AgentQuestionOption,\n};',
                1,
            )
            text = text.replace(
                'pub use prompt::{\n    ClipboardContent, ClipboardError, ClipboardImage, FileAttachment, ImageAttachment,\n    PromptAttachment, PromptDraft, TextAttachment,\n};\n',
                '',
                1,
            )
            runtime.write_text(text)

            adapter = Path('crates/medusa-tui/src/runtime.rs')
            text = adapter.read_text().replace(
                'medusa_runtime::AgentPlanStep {',
                'medusa_runtime::RuntimePlanStep {',
                1,
            )
            adapter.write_text(text)
            PY
            cargo fmt --all
            cargo check --workspace --all-features
            cargo fmt --all -- --check
            bash scripts/check-source-size.sh
            cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
            cargo test --workspace --all-features --locked
          } > /tmp/runtime-extraction.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            tail -n 300 /tmp/runtime-extraction.log > .github/runtime-extraction-error.log
          fi

      - name: Commit extraction or diagnostics
        shell: bash
        run: |
          if git diff --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.extraction.outputs.status }}" -ne 0 ]; then
            git add .github/runtime-extraction-error.log
            git commit -m "chore: capture runtime extraction diagnostics"
          else
            git add Cargo.toml Cargo.lock README.md crates/medusa-runtime crates/medusa-tui
            git commit -m "refactor: extract frontend-neutral runtime"
          fi
          git push origin HEAD:agent/extract-frontend-neutral-runtime
