name: Normalize Desktop Commander lockfile

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: normalize-desktop-commander-lockfile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  normalize:
    if: github.head_ref == 'fix/desktop-commander-lockfile' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/desktop-commander-lockfile
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - name: Restore prior lock and resolve only the new path edge
        shell: bash
        run: |
          git checkout f5ee0ca365c8402f911a2621eded74179be1980e -- Cargo.lock
          cargo check --workspace --all-features
          git diff -- Cargo.lock | tee /tmp/cargo-lock.diff
          python3 - <<'PY'
          from pathlib import Path
          lines = []
          for line in Path('/tmp/cargo-lock.diff').read_text().splitlines():
              if line.startswith(('+++', '---')):
                  continue
              if line.startswith(('+', '-')):
                  lines.append(line)
          expected = ['+ "medusa-extensions",']
          if lines != expected:
              raise SystemExit(f'unexpected Cargo.lock changes: {lines}')
          PY
      - run: cargo fmt --all -- --check
      - run: bash scripts/check-source-size.sh
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - name: Commit normalized lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git diff --cached --check
          git commit -m "fix(build): minimize Desktop Commander lockfile changes"
          git push origin HEAD:fix/desktop-commander-lockfile
