name: Commit runtime boundary fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'refactor/tui-runtime-modularization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-runtime-modularization
      - name: Commit boundary correction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          support = Path('crates/medusa-tui/src/runtime/support.rs')
          text = support.read_text().rstrip()
          if text.endswith('#[derive(Debug)]'):
              text = text[:-len('#[derive(Debug)]')].rstrip()
          support.write_text(text + '\n')

          runtime = Path('crates/medusa-tui/src/runtime.rs')
          text = runtime.read_text()
          needle = 'pub enum RuntimeError {'
          if '#[derive(Debug)]\n' + needle not in text:
              text = text.replace(needle, '#[derive(Debug)]\n' + needle, 1)
          runtime.write_text(text)
          for path in [
              '.github/workflows/fix-runtime-boundary.yml',
              '.github/workflows/fix-runtime-boundary-raw.yml',
          ]:
              Path(path).unlink(missing_ok=True)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: restore runtime error attribute boundary"
          git push origin HEAD:refactor/tui-runtime-modularization
