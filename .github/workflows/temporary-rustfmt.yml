name: Temporary Rustfmt Baseline

on:
  push:
    branches:
      - chore/rustfmt-baseline

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/rustfmt-baseline
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format workspace
        run: cargo fmt --all
      - name: Commit generated formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formatting changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates
          git commit -m "style: format Rust workspace"
          git push origin HEAD:chore/rustfmt-baseline
