name: Temporary Rustfmt

on:
  push:
    branches: [roadmap/147-issue-mutations]
    paths:
      - ".github/workflows/temporary-rustfmt.yml"

permissions:
  contents: write

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/147-issue-mutations
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/medusa-desktop/src-tauri/src/github_issue_mutations.rs
          git commit -m "style(desktop): format issue mutation module"
          git push origin HEAD:roadmap/147-issue-mutations
