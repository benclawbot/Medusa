name: Apply Documentation Evidence

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: docs-evidence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'agent/docs-ci-hygiene'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/docs-ci-hygiene
          fetch-depth: 0

      - name: Generate and validate documentation and workflow edits
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/apply-docs-ci-hygiene.py
          git diff --check
          ruby -e "require 'yaml'; Dir['.github/workflows/*.{yml,yaml}'].each { |f| YAML.load_file(f); puts \"yaml-ok #{f}\" }"
          grep -q '## Current status and evidence' README.md
          grep -q 'Draft pull requests skip these expensive jobs' docs/CAPABILITY-EVIDENCE.md
          grep -q "github.event.pull_request.draft == false" .github/workflows/release-gates.yml
          bash scripts/check-source-size.sh

      - name: Commit documentation evidence only
        shell: bash
        run: |
          set -euo pipefail
          git restore .github/workflows/release-gates.yml .github/workflows/refactor-guardrails.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/CAPABILITY-EVIDENCE.md
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "docs: add current capability evidence"
          git push origin HEAD:agent/docs-ci-hygiene
