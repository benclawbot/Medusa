name: Apply TUI conversation transcript

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-tui-conversation-transcript.yml'
      - '.github/scripts/apply_tui_conversation_transcript.py'
      - 'crates/medusa-tui/**'

permissions:
  contents: write

concurrency:
  group: apply-tui-conversation-transcript-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Apply guarded transcript patch
        run: python .github/scripts/apply_tui_conversation_transcript.py
      - name: Format
        run: cargo fmt --all -- --check || (cargo fmt --all && cargo fmt --all -- --check)
      - name: Focused transcript tests
        run: |
          cargo test -p medusa-tui internal_plan_transport_is_hidden_and_assistant_text_is_forwarded_verbatim -- --exact
          cargo test -p medusa-tui conversation_preserves_user_and_medusa_multiline_text -- --exact
          cargo test -p medusa-tui clarification_question_and_confirmed_answer_stay_in_transcript -- --exact
          cargo test -p medusa-tui spacebar_is_inserted_as_regular_text -- --exact
          cargo test -p medusa-tui ctrl_v_pastes_clipboard_content -- --exact
          cargo test -p medusa-tui tool_call_is_shown_as_one_high_level_row -- --exact
      - name: Commit production changes
        run: |
          if git diff --quiet; then
            echo "Patch already applied and tests passed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/medusa-tui
          git commit -m "feat(tui): preserve full conversation transcript"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
