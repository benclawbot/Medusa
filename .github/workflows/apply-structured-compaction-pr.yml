name: Apply structured compaction from PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'roadmap/131-structured-compaction' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/131-structured-compaction
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: |
          python3 scripts/apply-structured-compaction.py
          cargo fmt --all
          rm scripts/apply-structured-compaction.py
          rm .github/workflows/apply-structured-compaction-pr.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(context): add structured compaction snapshots"
          git push origin HEAD:roadmap/131-structured-compaction
