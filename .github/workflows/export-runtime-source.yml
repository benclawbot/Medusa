name: Apply runtime modularization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/tui-runtime-modularization'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/tui-runtime-modularization
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Split runtime into focused modules
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('crates/medusa-tui/src/runtime.rs')
          lines = source.read_text().splitlines()
          if len(lines) != 1367:
              raise SystemExit(f'unexpected runtime.rs line count: {len(lines)}')

          prefix = lines[:578]
          support_body = lines[578:1016]
          errors = lines[1016:1072]
          tests = lines[1072:]

          const_index = next(
              index for index, line in enumerate(prefix)
              if line.startswith('const MAX_FILE_CONTEXT_BYTES')
          )
          runtime_body = prefix[const_index + 2:]

          runtime_header = '''use std::{
              collections::BTreeMap,
              io,
              path::PathBuf,
              sync::{
                  Arc,
                  atomic::{AtomicBool, Ordering},
                  mpsc::{self, Receiver, Sender, TryRecvError},
              },
              thread,
          };

          use medusa_agent::{AgentEngine, AgentSession, StepOutcome};
          use medusa_config::{Config, Mode};
          use medusa_provider::{MessageBlock, MiniMaxProvider};

          use crate::{
              app::{QuestionPrompt, TranscriptPlan},
              clipboard::PromptDraft,
              commands::{Effort, ModelConfiguration, SlashCommand},
          };

          mod support;
          #[cfg(test)]
          #[path = "runtime/tests.rs"]
          mod tests;

          use support::{
              UpdateState, configure_model, credential_environment, effort_for_turns,
              execute_slash_command, forward_update, message_blocks, runtime_question, transcript_plan,
          };'''.splitlines()

          runtime = '\n'.join(runtime_header + [''] + runtime_body + [''] + errors) + '\n'

          support_header = '''use std::{
              collections::{BTreeSet, VecDeque},
              env, fs,
              path::{Path, PathBuf},
              sync::{atomic::AtomicBool, mpsc::Sender},
          };

          use base64::{Engine as _, engine::general_purpose::STANDARD};
          use medusa_agent::{
              AgentPlanStep, AgentPlanStepStatus, AgentQuestion, AgentUpdate, compact_session,
              update_session_objective,
          };
          use medusa_config::Mode;
          use medusa_protocol::EventPayload;
          use medusa_provider::{ImageSource, MessageBlock};
          use serde_json::Value;

          use crate::{
              app::{QuestionOption, QuestionPrompt, TranscriptPlan, TranscriptPlanStep, TranscriptPlanStepState},
              clipboard::{ImageAttachment, PromptAttachment, PromptDraft},
              commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand},
          };

          use super::{
              RuntimeActivity, RuntimeActivityKind, RuntimeError, RuntimeEvent, RuntimeQuestion, RuntimeState,
              run_prompt,
          };

          const MAX_FILE_CONTEXT_BYTES: usize = 2 * 1024 * 1024;'''.splitlines()

          support = '\n'.join(support_body)
          for name in [
              'execute_slash_command', 'configure_model', 'effort_for_turns',
              'credential_environment', 'forward_update', 'runtime_question',
              'transcript_plan', 'message_blocks',
          ]:
              support = support.replace(f'fn {name}(', f'pub(super) fn {name}(')
          support = support.replace('struct UpdateState {', 'pub(super) struct UpdateState {')
          support = support.replace('    fn new() -> Self {', '    pub(super) fn new() -> Self {', 1)
          support = '\n'.join(support_header) + '\n\n' + support + '\n'

          if tests[:2] != ['#[cfg(test)]', 'mod tests {'] or tests[-1] != '}':
              raise SystemExit('unexpected test module boundaries')
          test_body = tests[2:-1]
          test_body = [line[4:] if line.startswith('    ') else line for line in test_body]
          test_source = '\n'.join(test_body) + '\n'

          runtime_dir = Path('crates/medusa-tui/src/runtime')
          runtime_dir.mkdir(parents=True, exist_ok=True)
          source.write_text(runtime)
          (runtime_dir / 'support.rs').write_text(support)
          (runtime_dir / 'tests.rs').write_text(test_source)

          exceptions = Path('docs/source-size-exceptions.txt')
          exception_lines = [
              line for line in exceptions.read_text().splitlines()
              if not line.startswith('crates/medusa-tui/src/runtime.rs|')
          ]
          exceptions.write_text('\n'.join(exception_lines) + '\n')

          for temporary in [
              '.medusa-runtime-refactor',
              '.medusa-runtime-refactor-plan',
              '.medusa-runtime-refactor-trigger',
              '.medusa-runtime-refactor-ready',
              '.github/workflows/export-runtime-source.yml',
          ]:
              Path(temporary).unlink(missing_ok=True)
          PY
          cargo fmt --all
          test "$(wc -l < crates/medusa-tui/src/runtime.rs)" -le 800
          test "$(wc -l < crates/medusa-tui/src/runtime/support.rs)" -le 800
          test "$(wc -l < crates/medusa-tui/src/runtime/tests.rs)" -le 800
      - name: Commit modularization
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: split TUI runtime responsibilities"
          git push origin HEAD:refactor/tui-runtime-modularization
