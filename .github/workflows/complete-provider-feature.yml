name: Complete provider feature

on:
  push:
    branches:
      - agent/provider-first-run-config
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/provider-first-run-config
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
          components: rustfmt, clippy
      - name: Apply production provider implementation
        run: python3 scripts/complete_provider_feature.py
      - name: Format
        run: cargo fmt --all
      - name: Record generated diff
        run: |
          git status --short
          git diff --binary > provider-feature.patch
      - uses: actions/upload-artifact@v4
        with:
          name: provider-feature-patch
          path: provider-feature.patch
      - name: Compile workspace
        run: |
          set -o pipefail
          cargo check --workspace --all-targets --locked 2>&1 | tee provider-compile.log
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-compile-log
          path: provider-compile.log
      - name: Test provider, config, runtime, and CLI
        run: |
          cargo test -p medusa-config --locked
          cargo test -p medusa-provider --locked
          cargo test -p medusa-runtime --locked
          cargo test -p medusa-cli --locked
      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f provider-feature.patch provider-compile.log
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes'
          else
            git commit --no-verify -m 'feat: wire production provider configuration end to end'
            git push origin HEAD:agent/provider-first-run-config
          fi
