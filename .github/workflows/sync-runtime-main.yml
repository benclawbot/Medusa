name: Sync Runtime Branch With Main

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: sync-runtime-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.head_ref == 'agent/extract-frontend-neutral-runtime'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - name: Merge current main and preserve runtime documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$conflicts" | grep -v '^README.md$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:"
              printf '%s\n' "$unexpected"
              exit 1
            fi
            git checkout --theirs README.md
          fi

          python3 <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text()
          old = '| `medusa-tui` | Interactive terminal interface, composer, clipboard, drafts, and runtime bridge |'
          new = '| `medusa-runtime` | Frontend-neutral interactive session controller, commands, events, cancellation, follow-ups, and provider orchestration |\n| `medusa-tui` | Terminal presentation adapter, composer, clipboard access, drafts, and rendering |'
          if old in text:
              text = text.replace(old, new, 1)
          elif '| `medusa-runtime` | Frontend-neutral interactive session controller' not in text:
              raise SystemExit('README architecture insertion point was not found')
          path.write_text(text)
          PY

          git add README.md
          git rm .github/workflows/sync-runtime-main.yml
          git commit -m "merge: sync runtime extraction with main"
          git push origin HEAD:agent/extract-frontend-neutral-runtime
