name: Roadmap 133 Runtime Splice

on:
  push:
    branches:
      - roadmap/133-identity-approval-transactions

permissions:
  contents: write

jobs:
  splice:
    if: ${{ !contains(github.event.head_commit.message, '[runtime-spliced]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/133-identity-approval-transactions
          fetch-depth: 0
      - name: Apply minimal runtime hooks
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lib = Path('crates/medusa-agent/src/lib.rs')
          text = lib.read_text()
          if 'mod approval;' not in text:
              text = text.replace('mod engine;\n', 'mod approval;\nmod engine;\n')
          if 'mod identity_guard;' not in text:
              text = text.replace('mod evidence;\n', 'mod evidence;\nmod identity_guard;\n')
          if 'mod transaction;' not in text:
              text = text.replace('pub mod tools;\n', 'pub mod tools;\nmod transaction;\n')
          if 'pub use approval::' not in text:
              text = text.replace(
                  'pub use engine::{AgentEngine, AgentUpdate, StepOutcome};\n',
                  'pub use approval::{ApprovalDecision, ApprovalGrant, ApprovalReceipt, ApprovalScope, RollbackOutcome, RollbackReceipt};\n'
                  'pub use engine::{AgentEngine, AgentUpdate, StepOutcome};\n'
              )
          if 'pub use identity_guard::' not in text:
              text = text.replace(
                  'pub use policy::validate_shell_command;\n',
                  'pub use identity_guard::{compatibility_context, validate_provider_text};\n'
                  'pub use policy::validate_shell_command;\n'
              )
          if 'pub use transaction::' not in text:
              text = text.replace(
                  'pub use verification::{VerificationResult, targeted_verification};\n',
                  'pub use transaction::{FileMutation, TransactionOutcome, TransactionPreview, apply_atomic, preview};\n'
                  'pub use verification::{VerificationResult, targeted_verification};\n'
              )
          lib.write_text(text)

          engine = Path('crates/medusa-agent/src/engine.rs')
          text = engine.read_text()
          if 'identity_guard::validate_provider_text' not in text:
              text = text.replace(
                  'evidence::append_event,\n',
                  'evidence::append_event,\n    identity_guard::validate_provider_text,\n'
              )
          needle = 'ResponseBlock::Text { text } => {\n                    assistant_text.push(text.clone());'
          replacement = 'ResponseBlock::Text { text } => {\n                    validate_provider_text(&text)?;\n                    assistant_text.push(text.clone());'
          if needle in text:
              text = text.replace(needle, replacement)
          engine.write_text(text)
          PY
      - name: Format and test focused safety suite
        run: |
          cargo fmt --all
          cargo test -p medusa-agent approval --lib
          cargo test -p medusa-agent --test approval_safety
      - name: Commit runtime splice
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-agent/src/lib.rs crates/medusa-agent/src/engine.rs crates/medusa-agent/src/approval.rs crates/medusa-agent/src/identity_guard.rs crates/medusa-agent/src/transaction.rs crates/medusa-agent/tests/approval_safety.rs
          git diff --cached --quiet && exit 0
          git commit -m 'feat(safety): wire runtime authority guards [runtime-spliced]'
          git push origin HEAD:roadmap/133-identity-approval-transactions
