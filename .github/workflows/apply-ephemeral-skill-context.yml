name: Apply ephemeral skill context fix

on:
  push:
    branches:
      - feat/direct-skill-commands

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/direct-skill-commands
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply review fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "crates/medusa-agent/src/engine_support.rs",
              """pub(crate) fn system_prompt(mode: Mode, repo: &Path) -> String {\n    let base = if mode == Mode::ReadOnly {\n""",
              """pub(crate) fn system_prompt(mode: Mode, repo: &Path) -> String {\n    system_prompt_with_context(mode, repo, None)\n}\n\npub(crate) fn system_prompt_with_context(\n    mode: Mode,\n    repo: &Path,\n    additional_context: Option<&str>,\n) -> String {\n    let base = if mode == Mode::ReadOnly {\n""",
          )
          replace_once(
              "crates/medusa-agent/src/engine_support.rs",
              """    }\n    prompt\n}\n\npub(crate) fn available_tools(mode: Mode) -> Vec<medusa_provider::ToolDefinition> {\n""",
              """    }\n    if let Some(context) = additional_context\n        .map(str::trim)\n        .filter(|context| !context.is_empty())\n    {\n        prompt.push_str(\n            \"\\n\\nExplicit user-selected context for the current agent turn:\\n\",\n        );\n        prompt.push_str(context);\n    }\n    prompt\n}\n\npub(crate) fn available_tools(mode: Mode) -> Vec<medusa_provider::ToolDefinition> {\n""",
          )

          replace_once(
              "crates/medusa-agent/src/engine.rs",
              """    pub fn step_with_observer<F>(\n        &self,\n        session: &mut AgentSession,\n        mut observer: F,\n    ) -> MedusaResult<StepOutcome>\n    where\n        F: FnMut(&AgentUpdate),\n    {\n""",
              """    pub fn step_with_observer<F>(\n        &self,\n        session: &mut AgentSession,\n        observer: F,\n    ) -> MedusaResult<StepOutcome>\n    where\n        F: FnMut(&AgentUpdate),\n    {\n        self.step_with_observer_and_context(session, None, observer)\n    }\n\n    pub fn step_with_observer_and_context<F>(\n        &self,\n        session: &mut AgentSession,\n        additional_system_context: Option<&str>,\n        mut observer: F,\n    ) -> MedusaResult<StepOutcome>\n    where\n        F: FnMut(&AgentUpdate),\n    {\n""",
          )
          replace_once(
              "crates/medusa-agent/src/engine.rs",
              """            system: system_prompt(self.config.agent.mode, &session.repo),\n""",
              """            system: system_prompt_with_context(\n                self.config.agent.mode,\n                &session.repo,\n                additional_system_context,\n            ),\n""",
          )

          replace_once(
              "crates/medusa-agent/src/lib.rs",
              """    use std::{collections::VecDeque, fs, sync::Mutex};\n""",
              """    use std::{\n        collections::VecDeque,\n        fs,\n        sync::{Arc, Mutex},\n    };\n""",
          )
          replace_once(
              "crates/medusa-agent/src/lib.rs",
              """    impl ModelProvider for ScriptedProvider {\n        fn complete(&self, _request: &ModelRequest) -> MedusaResult<ModelResponse> {\n            self.responses\n                .lock()\n                .expect(\"provider lock\")\n                .pop_front()\n                .ok_or_else(|| {\n                    MedusaError::new(\n                        ErrorCode::DependencyUnavailable,\n                        ErrorCategory::Internal,\n                        \"scripted response exhausted\",\n                    )\n                })\n        }\n    }\n\n    fn response(blocks: Vec<ResponseBlock>, stop_reason: &str) -> ModelResponse {\n""",
              """    impl ModelProvider for ScriptedProvider {\n        fn complete(&self, _request: &ModelRequest) -> MedusaResult<ModelResponse> {\n            self.responses\n                .lock()\n                .expect(\"provider lock\")\n                .pop_front()\n                .ok_or_else(|| {\n                    MedusaError::new(\n                        ErrorCode::DependencyUnavailable,\n                        ErrorCategory::Internal,\n                        \"scripted response exhausted\",\n                    )\n                })\n        }\n    }\n\n    struct CapturingProvider {\n        systems: Arc<Mutex<Vec<String>>>,\n    }\n\n    impl ModelProvider for CapturingProvider {\n        fn complete(&self, request: &ModelRequest) -> MedusaResult<ModelResponse> {\n            self.systems\n                .lock()\n                .expect(\"captured systems lock\")\n                .push(request.system.clone());\n            Ok(response(\n                vec![ResponseBlock::Text {\n                    text: \"Task acknowledged.\".to_owned(),\n                }],\n                \"end_turn\",\n            ))\n        }\n    }\n\n    fn response(blocks: Vec<ResponseBlock>, stop_reason: &str) -> ModelResponse {\n""",
          )
          replace_once(
              "crates/medusa-agent/src/lib.rs",
              """    #[test]\n    fn conversational_end_turn_returns_to_the_composer_without_verification_or_completion() {\n""",
              """    #[test]\n    fn ephemeral_system_context_is_sent_but_never_persisted_in_session_messages() {\n        let directory = tempfile::tempdir().expect(\"temporary directory\");\n        let systems = Arc::new(Mutex::new(Vec::new()));\n        let engine = AgentEngine::new(\n            CapturingProvider {\n                systems: Arc::clone(&systems),\n            },\n            Config::default(),\n        );\n        let mut session = engine\n            .create_session(directory.path(), \"prepare a release\".to_owned())\n            .expect(\"session\");\n\n        assert_eq!(\n            engine\n                .step_with_observer_and_context(\n                    &mut session,\n                    Some(\"Use the selected release checklist.\"),\n                    |_| {},\n                )\n                .expect(\"ephemeral context step\"),\n            StepOutcome::TurnComplete\n        );\n\n        let captured = systems.lock().expect(\"captured systems\");\n        assert_eq!(captured.len(), 1);\n        assert!(captured[0].contains(\"Use the selected release checklist.\"));\n        let durable_messages = serde_json::to_string(&session.messages).expect(\"serialize messages\");\n        assert!(!durable_messages.contains(\"Use the selected release checklist.\"));\n    }\n\n    #[test]\n    fn conversational_end_turn_returns_to_the_composer_without_verification_or_completion() {\n""",
          )

          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    let engine = AgentEngine::new(provider, config);\n    let selected_skill = state.pending_skill.clone();\n    let mut content = message_blocks(&draft)?;\n    if let Some(skill) = &selected_skill {\n        content.insert(\n            0,\n            medusa_provider::MessageBlock::Text {\n                text: skill.prompt_context(),\n            },\n        );\n    }\n    let mut session = match state.session.take() {\n""",
              """    let engine = AgentEngine::new(provider, config);\n    let selected_skill = state.pending_skill.clone();\n    let skill_context = selected_skill.as_ref().map(SelectedSkill::prompt_context);\n    let content = message_blocks(&draft)?;\n    let mut session = match state.session.take() {\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    };\n    if selected_skill.is_some() {\n        state.pending_skill = None;\n    }\n    let mut updates = UpdateState::new();\n""",
              """    };\n    let mut updates = UpdateState::new();\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """            let outcome = engine\n                .step_with_observer(&mut session, |update| {\n                    forward_update(update, events, &mut updates);\n                })\n                .map_err(RuntimeError::agent)?;\n""",
              """            let outcome = engine\n                .step_with_observer_and_context(\n                    &mut session,\n                    skill_context.as_deref(),\n                    |update| {\n                        forward_update(update, events, &mut updates);\n                    },\n                )\n                .map_err(RuntimeError::agent)?;\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """    })();\n    state.session = Some(session);\n    result\n}\n""",
              """    })();\n    let waiting_for_user = matches!(&result, Ok(RuntimeEvent::Question(_)));\n    if selected_skill.is_some() && !waiting_for_user {\n        state.pending_skill = None;\n    }\n    state.session = Some(session);\n    result\n}\n""",
          )
          replace_once(
              "crates/medusa-tui/src/runtime.rs",
              """                    \"The next prompt will add this skill to the current session context.\"\n                        .to_owned(),\n""",
              """                    \"The next prompt will use this skill without persisting its instructions.\"\n                        .to_owned(),\n""",
          )

          replace_once(
              "README.md",
              """/release                        # add the release skill on the next prompt\n""",
              """/release                        # use the release skill on the next prompt\n""",
          )
          replace_once(
              "README.md",
              """/release@user                   # select a scoped definition when names collide\n```\n""",
              """/release@user                   # select a scoped definition when names collide\n```\n\nSelected skill instructions are applied as ephemeral system context for the active task and are not written into durable session messages.\n""",
          )
          PY
          cargo fmt --all
          git diff --check
      - name: Commit review fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-agent/src/engine.rs crates/medusa-agent/src/engine_support.rs crates/medusa-agent/src/lib.rs crates/medusa-tui/src/runtime.rs
          git commit -m "fix(skills): keep selected context ephemeral"
          git push origin HEAD:feat/direct-skill-commands
