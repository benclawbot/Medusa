name: Reconstruct GitHub foundation

on:
  push:
    branches:
      - roadmap/130-github-foundation-main

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore validated PR 139 tree delta
        shell: bash
        run: |
          set -euo pipefail
          source_sha=f7be59d5b5841c8fbc9ad51a4a8996ab34be64f9
          git fetch origin "$source_sha"
          git checkout "$source_sha" -- \
            .medusa/skills/github/SKILL.md \
            apps/medusa-desktop/src-tauri/src/github_actions.rs \
            apps/medusa-desktop/src-tauri/src/github_auth.rs \
            apps/medusa-desktop/src-tauri/src/github_checks.rs \
            apps/medusa-desktop/src-tauri/src/github_issues.rs \
            apps/medusa-desktop/src-tauri/src/github_merge.rs \
            apps/medusa-desktop/src-tauri/src/github_repository.rs \
            apps/medusa-desktop/src-tauri/src/lib.rs \
            apps/medusa-desktop/src/githubActionsApi.test.ts \
            apps/medusa-desktop/src/githubActionsApi.ts \
            apps/medusa-desktop/src/githubAuthApi.test.ts \
            apps/medusa-desktop/src/githubAuthApi.ts \
            apps/medusa-desktop/src/githubChecksApi.test.ts \
            apps/medusa-desktop/src/githubChecksApi.ts \
            apps/medusa-desktop/src/githubIssuesApi.test.ts \
            apps/medusa-desktop/src/githubIssuesApi.ts \
            apps/medusa-desktop/src/githubMergeApi.test.ts \
            apps/medusa-desktop/src/githubMergeApi.ts \
            apps/medusa-desktop/src/githubMutation.ts \
            apps/medusa-desktop/src/githubRepositoryApi.test.ts \
            apps/medusa-desktop/src/githubRepositoryApi.ts \
            crates/medusa-tui/tests/github_parity.rs
          rm -f .github/workflows/reconstruct-github-foundation.yml

      - name: Commit reconstructed tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Validated tree already present"
            exit 0
          fi
          git commit -m "feat(github): reconstruct validated GitHub workflow foundation"
          git push origin HEAD:roadmap/130-github-foundation-main
