name: Extract Runtime

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: extract-runtime-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  extract:
    if: github.head_ref == 'agent/extract-frontend-neutral-runtime'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy

      - name: Extract frontend-neutral runtime
        shell: bash
        run: |
          set -euo pipefail
          if [ -d crates/medusa-runtime ]; then
            echo "runtime already extracted"
            exit 0
          fi
          awk '/python3 <<'"'"'PY'"'"'/{capture=1; next} /^          PY$/{capture=0} capture {sub(/^          /, ""); print}' \
            .github/runtime-extraction-payload.txt > /tmp/extract-runtime.py
          test -s /tmp/extract-runtime.py
          python3 /tmp/extract-runtime.py
          if [ -f .github/extract-runtime-fix.py ]; then
            python3 .github/extract-runtime-fix.py
          fi
          cargo fmt --all
          cargo check --workspace --all-features
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked

      - name: Commit extraction and remove temporary automation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md crates/medusa-runtime crates/medusa-tui
          git rm --ignore-unmatch \
            .github/extract-runtime-fix.py \
            .github/runtime-extraction-payload.txt \
            .github/runtime-extraction-trigger \
            .github/workflows/extract-runtime-writer.yml
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "refactor: extract frontend-neutral runtime"
          git push origin HEAD:agent/extract-frontend-neutral-runtime
