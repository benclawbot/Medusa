name: Extract Runtime Writer

on:
  push:
    branches:
      - agent/extract-frontend-neutral-runtime
    paths:
      - .github/runtime-extraction-trigger

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extract-frontend-neutral-runtime
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Extract frontend-neutral runtime
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          runtime_dir = root / 'crates/medusa-runtime'
          (runtime_dir / 'src').mkdir(parents=True, exist_ok=True)

          (runtime_dir / 'Cargo.toml').write_text('''[package]
          name = "medusa-runtime"
          version.workspace = true
          edition.workspace = true
          rust-version.workspace = true
          license.workspace = true
          repository.workspace = true

          [dependencies]
          base64 = "0.22"
          medusa-agent = { path = "../medusa-agent" }
          medusa-config = { path = "../medusa-config" }
          medusa-protocol = { path = "../medusa-protocol" }
          medusa-provider = { path = "../medusa-provider" }
          png = "0.17"
          serde_json.workspace = true

          [dev-dependencies]
          tempfile.workspace = true

          [lints]
          workspace = true
          '''.replace('          ', ''))

          commands = (root / 'crates/medusa-tui/src/commands.rs').read_text()
          (runtime_dir / 'src/commands.rs').write_text(commands)

          clipboard = (root / 'crates/medusa-tui/src/clipboard.rs').read_text()
          service_pattern = re.compile(
              r'\npub trait ClipboardService: Send \+ Sync \{.*?\n\}\n\n#\[derive\(Default\)\]\npub struct UnsupportedClipboard;.*?\n\}\n',
              re.S,
          )
          prompt, count = service_pattern.subn('\n', clipboard, count=1)
          assert count == 1, 'clipboard service block was not found'
          (runtime_dir / 'src/prompt.rs').write_text(prompt)

          runtime_path = root / 'crates/medusa-tui/src/runtime.rs'
          runtime = runtime_path.read_text()
          old = '''use medusa_agent::{
              AgentEngine, AgentSession, StepOutcome, compact_session, update_session_objective,
          };'''.replace('          ', '')
          new = '''use medusa_agent::{
              AgentEngine, AgentPlanStep, AgentQuestion, AgentSession, StepOutcome, compact_session,
              update_session_objective,
          };'''.replace('          ', '')
          assert old in runtime
          runtime = runtime.replace(old, new, 1)

          old = '''use crate::{
              app::{QuestionPrompt, TranscriptPlan},
              clipboard::PromptDraft,
              commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand},
          };'''.replace('          ', '')
          new = '''use crate::{
              commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand},
              prompt::PromptDraft,
          };'''.replace('          ', '')
          assert old in runtime
          runtime = runtime.replace(old, new, 1)

          old = '''mod support;
          #[cfg(test)]
          #[path = "runtime/tests.rs"]
          mod tests;'''.replace('          ', '')
          new = '''pub mod commands;
          pub mod prompt;
          mod support;
          #[cfg(test)]
          mod tests;

          pub use commands::{Effort, ModelCommand, ModelConfiguration, SlashCommand};
          pub use medusa_agent::{AgentPlanStepStatus, AgentQuestionItem, AgentQuestionOption};
          pub use prompt::{
              ClipboardContent, ClipboardError, ClipboardImage, FileAttachment, ImageAttachment,
              PromptAttachment, PromptDraft, TextAttachment,
          };'''.replace('          ', '')
          assert old in runtime
          runtime = runtime.replace(old, new, 1)

          runtime = runtime.replace('#[derive(Clone, Debug, Eq, PartialEq)]\npub enum RuntimeEvent', '#[derive(Debug)]\npub enum RuntimeEvent', 1)
          runtime = runtime.replace('Plan(TranscriptPlan),', 'Plan(Vec<AgentPlanStep>),', 1)
          runtime = runtime.replace('Question(RuntimeQuestion),', 'Question(AgentQuestion),', 1)
          runtime, count = re.subn(
              r'\n#\[derive\(Clone, Debug, Eq, PartialEq\)\]\npub struct RuntimeQuestion \{.*?\n\}\n',
              '\n',
              runtime,
              count=1,
              flags=re.S,
          )
          assert count == 1, 'RuntimeQuestion block was not found'
          runtime = runtime.replace('transcript_plan(&session.plan)', 'session.plan.clone()')
          runtime = runtime.replace('runtime_question(question)', 'question.clone()')
          runtime = runtime.replace('crate::commands::COMMAND_SPECS', 'commands::COMMAND_SPECS')
          runtime = runtime.replace('"medusa-tui-runtime"', '"medusa-runtime"')
          runtime = runtime.replace(
              '''    SelectedSkill, UpdateState, configure_model, credential_environment, discover_skills,
              effort_for_turns, forward_update, is_supported_provider, load_selected_skill, message_blocks,
              model_configuration_details, objective_for, runtime_question, transcript_plan,
              turns_for_effort,
          '''.replace('          ', ''),
              '''    SelectedSkill, UpdateState, configure_model, credential_environment, discover_skills,
              effort_for_turns, forward_update, is_supported_provider, load_selected_skill, message_blocks,
              model_configuration_details, objective_for, turns_for_effort,
          '''.replace('          ', ''),
              1,
          )
          (runtime_dir / 'src/lib.rs').write_text(runtime)

          support_path = root / 'crates/medusa-tui/src/runtime/support.rs'
          support = support_path.read_text()
          support = support.replace(
              'use medusa_agent::{AgentPlanStep, AgentPlanStepStatus, AgentQuestion, AgentUpdate};',
              'use medusa_agent::AgentUpdate;',
              1,
          )
          old = '''use crate::{
              app::{
                  QuestionOption, QuestionPrompt, TranscriptPlan, TranscriptPlanStep, TranscriptPlanStepState,
              },
              clipboard::{ImageAttachment, PromptAttachment, PromptDraft},
              commands::{Effort, ModelConfiguration},
          };'''.replace('          ', '')
          new = '''use crate::{
              commands::{Effort, ModelConfiguration},
              prompt::{ImageAttachment, PromptAttachment, PromptDraft},
          };'''.replace('          ', '')
          assert old in support
          support = support.replace(old, new, 1)
          support = support.replace(
              '    RuntimeActivity, RuntimeActivityKind, RuntimeError, RuntimeEvent, RuntimeQuestion, RuntimeState,\n',
              '    RuntimeActivity, RuntimeActivityKind, RuntimeError, RuntimeEvent, RuntimeState,\n',
              1,
          )
          support = support.replace('RuntimeEvent::Plan(transcript_plan(steps))', 'RuntimeEvent::Plan(steps.clone())')
          support, count = re.subn(
              r'\npub\(super\) fn runtime_question\(question: &AgentQuestion\) -> RuntimeQuestion \{.*?\n\}\n\nfn is_internal_tool',
              '\nfn is_internal_tool',
              support,
              count=1,
              flags=re.S,
          )
          assert count == 1, 'runtime_question helper was not found'
          support, count = re.subn(
              r'\npub\(super\) fn transcript_plan\(steps: &\[AgentPlanStep\]\) -> TranscriptPlan \{.*?\n\}\n\npub\(super\) fn tool_title',
              '\npub(super) fn tool_title',
              support,
              count=1,
              flags=re.S,
          )
          assert count == 1, 'transcript_plan helper was not found'
          (runtime_dir / 'src/support.rs').write_text(support)

          (runtime_dir / 'src/tests.rs').write_text(r'''use std::sync::mpsc;

use medusa_agent::{AgentPlanStep, AgentPlanStepStatus, AgentUpdate};
use medusa_protocol::EventPayload;
use medusa_provider::{ImageSource, MessageBlock};
use serde_json::json;
use tempfile::tempdir;

use super::support::{UpdateState, forward_update, message_blocks};
use super::*;

#[test]
fn text_and_image_prompts_are_frontend_neutral_message_blocks() {
    let text = PromptDraft {
        text: "fix the failing test".to_owned(),
        ..PromptDraft::default()
    };
    assert_eq!(
        message_blocks(&text).expect("text blocks"),
        vec![MessageBlock::Text {
            text: "fix the failing test".to_owned(),
        }]
    );

    let image = PromptDraft {
        attachments: vec![PromptAttachment::Image(ImageAttachment {
            display_name: "screen.png".to_owned(),
            width: 1,
            height: 1,
            rgba: vec![0, 0, 0, 255],
            source_format: Some("image/rgba8".to_owned()),
        })],
        ..PromptDraft::default()
    };
    assert!(matches!(
        &message_blocks(&image).expect("image blocks")[0],
        MessageBlock::Image {
            source: ImageSource::Base64 { media_type, data },
            ..
        } if media_type == "image/png" && !data.is_empty()
    ));
}

#[test]
fn runtime_events_preserve_usage_and_agent_plan_contracts() {
    let (sender, receiver) = mpsc::channel();
    let mut state = UpdateState::new();
    forward_update(
        &AgentUpdate::Event(EventPayload::ModelResponseReceived {
            response_id: Some("response-1".to_owned()),
            usage: json!({"input_tokens": 12, "output_tokens": 3}),
        }),
        &sender,
        &mut state,
    );
    assert!(matches!(
        receiver.recv().expect("usage event"),
        RuntimeEvent::Usage {
            input_tokens: 12,
            output_tokens: 3,
            ..
        }
    ));

    forward_update(
        &AgentUpdate::Plan(vec![AgentPlanStep {
            title: "Extract runtime".to_owned(),
            status: AgentPlanStepStatus::InProgress,
        }]),
        &sender,
        &mut state,
    );
    let RuntimeEvent::Plan(plan) = receiver.recv().expect("plan event") else {
        panic!("expected plan event");
    };
    assert_eq!(plan[0].title, "Extract runtime");
    assert_eq!(plan[0].status, AgentPlanStepStatus::InProgress);
}

#[test]
fn controller_exposes_shared_busy_and_cancel_semantics() {
    let directory = tempdir().expect("temporary directory");
    let runtime = RuntimeController::start(directory.path().to_path_buf());
    assert!(!runtime.is_busy());
    assert!(!runtime.cancel());
}
''')

          (root / 'crates/medusa-tui/src/commands.rs').write_text(
              'pub use medusa_runtime::commands::*;\n'
          )
          (root / 'crates/medusa-tui/src/clipboard.rs').write_text(r'''pub use medusa_runtime::prompt::*;

pub trait ClipboardService: Send + Sync {
    fn read(&self) -> Result<ClipboardContent, ClipboardError>;
}

#[derive(Default)]
pub struct UnsupportedClipboard;

impl ClipboardService for UnsupportedClipboard {
    fn read(&self) -> Result<ClipboardContent, ClipboardError> {
        Err(ClipboardError::Unavailable(
            "clipboard access is unavailable in this build".to_owned(),
        ))
    }
}
''')

          (root / 'crates/medusa-tui/src/runtime.rs').write_text(r'''use std::path::PathBuf;

use crate::app::{
    QuestionOption, QuestionPrompt, TranscriptPlan, TranscriptPlanStep, TranscriptPlanStepState,
};
use crate::clipboard::PromptDraft;
use crate::commands::{ModelConfiguration, SlashCommand};

pub use medusa_runtime::{
    RuntimeActivity, RuntimeActivityKind, RuntimeError, SubmitDisposition,
};

#[derive(Debug)]
pub enum RuntimeEvent {
    Started,
    AssistantText(String),
    Activity(RuntimeActivity),
    Plan(TranscriptPlan),
    Question(RuntimeQuestion),
    Usage {
        input_tokens: u64,
        output_tokens: u64,
        cache_read_input_tokens: u64,
        cache_creation_input_tokens: u64,
        model_elapsed_millis: u64,
    },
    Progress {
        turn: u32,
    },
    Settings {
        model: String,
        effort: String,
        plan_mode: bool,
        credential_configured: bool,
    },
    Notice {
        title: String,
        details: Vec<String>,
    },
    NewSession,
    Compacted {
        message: String,
    },
    Completed {
        session_id: String,
    },
    TurnFinished,
    Cancelled,
    Failed(String),
}

#[derive(Debug)]
pub struct RuntimeQuestion {
    pub questions: Vec<QuestionPrompt>,
}

pub struct RuntimeController {
    inner: medusa_runtime::RuntimeController,
}

impl RuntimeController {
    pub fn start(repo: PathBuf) -> Self {
        Self {
            inner: medusa_runtime::RuntimeController::start(repo),
        }
    }

    pub fn submit(&self, draft: PromptDraft) -> Result<SubmitDisposition, RuntimeError> {
        self.inner.submit(draft)
    }

    pub fn run_command(&self, command: SlashCommand) -> Result<(), RuntimeError> {
        self.inner.run_command(command)
    }

    pub fn configure_model(&self, configuration: ModelConfiguration) -> Result<(), RuntimeError> {
        self.inner.configure_model(configuration)
    }

    pub fn cancel(&self) -> bool {
        self.inner.cancel()
    }

    #[must_use]
    pub fn is_busy(&self) -> bool {
        self.inner.is_busy()
    }

    pub fn try_event(&self) -> Result<Option<RuntimeEvent>, RuntimeError> {
        self.inner.try_event().map(|event| event.map(map_event))
    }
}

fn map_event(event: medusa_runtime::RuntimeEvent) -> RuntimeEvent {
    match event {
        medusa_runtime::RuntimeEvent::Started => RuntimeEvent::Started,
        medusa_runtime::RuntimeEvent::AssistantText(text) => RuntimeEvent::AssistantText(text),
        medusa_runtime::RuntimeEvent::Activity(activity) => RuntimeEvent::Activity(activity),
        medusa_runtime::RuntimeEvent::Plan(steps) => RuntimeEvent::Plan(TranscriptPlan {
            steps: steps
                .into_iter()
                .map(|step| TranscriptPlanStep {
                    title: step.title,
                    state: match step.status {
                        medusa_runtime::AgentPlanStepStatus::Pending => {
                            TranscriptPlanStepState::Pending
                        }
                        medusa_runtime::AgentPlanStepStatus::InProgress => {
                            TranscriptPlanStepState::Active
                        }
                        medusa_runtime::AgentPlanStepStatus::Completed => {
                            TranscriptPlanStepState::Completed
                        }
                        medusa_runtime::AgentPlanStepStatus::Failed => {
                            TranscriptPlanStepState::Failed
                        }
                    },
                })
                .collect(),
        }),
        medusa_runtime::RuntimeEvent::Question(question) => RuntimeEvent::Question(RuntimeQuestion {
            questions: question
                .prompts()
                .iter()
                .map(|item| QuestionPrompt {
                    header: item.header.clone(),
                    question: item.question.clone(),
                    options: item
                        .options
                        .iter()
                        .map(|option| QuestionOption {
                            label: option.label.clone(),
                            description: option.description.clone(),
                        })
                        .collect(),
                    multi_select: item.multi_select,
                })
                .collect(),
        }),
        medusa_runtime::RuntimeEvent::Usage {
            input_tokens,
            output_tokens,
            cache_read_input_tokens,
            cache_creation_input_tokens,
            model_elapsed_millis,
        } => RuntimeEvent::Usage {
            input_tokens,
            output_tokens,
            cache_read_input_tokens,
            cache_creation_input_tokens,
            model_elapsed_millis,
        },
        medusa_runtime::RuntimeEvent::Progress { turn } => RuntimeEvent::Progress { turn },
        medusa_runtime::RuntimeEvent::Settings {
            model,
            effort,
            plan_mode,
            credential_configured,
        } => RuntimeEvent::Settings {
            model,
            effort,
            plan_mode,
            credential_configured,
        },
        medusa_runtime::RuntimeEvent::Notice { title, details } => {
            RuntimeEvent::Notice { title, details }
        }
        medusa_runtime::RuntimeEvent::NewSession => RuntimeEvent::NewSession,
        medusa_runtime::RuntimeEvent::Compacted { message } => {
            RuntimeEvent::Compacted { message }
        }
        medusa_runtime::RuntimeEvent::Completed { session_id } => {
            RuntimeEvent::Completed { session_id }
        }
        medusa_runtime::RuntimeEvent::TurnFinished => RuntimeEvent::TurnFinished,
        medusa_runtime::RuntimeEvent::Cancelled => RuntimeEvent::Cancelled,
        medusa_runtime::RuntimeEvent::Failed(error) => RuntimeEvent::Failed(error),
    }
}

#[cfg(test)]
mod tests {
    use super::*;

    #[test]
    fn maps_agent_plan_statuses_into_terminal_presentation_states() {
        let event = medusa_runtime::RuntimeEvent::Plan(vec![medusa_runtime::AgentPlanStep {
            title: "Inspect".to_owned(),
            status: medusa_runtime::AgentPlanStepStatus::Completed,
        }]);
        let RuntimeEvent::Plan(plan) = map_event(event) else {
            panic!("expected plan event");
        };
        assert_eq!(plan.steps[0].state, TranscriptPlanStepState::Completed);
    }
}
''')

