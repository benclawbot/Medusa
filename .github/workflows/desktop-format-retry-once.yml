name: Desktop format retry once

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-format-retry-once.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: |
          cargo fmt --manifest-path apps/medusa-desktop/src-tauri/Cargo.toml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/medusa-desktop/src-tauri/src
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(desktop): format Actions retry adapter"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
