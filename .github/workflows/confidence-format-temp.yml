name: Format Confidence Temp

on:
  push:
    branches:
      - agent/todo-confidence-main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format and commit
        run: |
          cargo fmt --all
          rm .github/workflows/confidence-format-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/medusa-confidence/src/lib.rs .github/workflows/confidence-format-temp.yml
          git commit -m "style(confidence): apply workspace rustfmt"
          git push
