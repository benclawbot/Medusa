name: Apply TUI session metrics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: apply-tui-session-metrics-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'feat/tui-session-metrics'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/tui-session-metrics
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply metrics implementation and focused tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, label):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              path.write_text(text.replace(old, new, 1))

          app = Path('crates/medusa-tui/src/app.rs')
          replace_once(
              app,
              '''    pub status: String,\n    pub token_count: u64,\n    pub active_turn: u32,\n''',
              '''    pub status: String,\n    pub input_tokens: u64,\n    pub output_tokens: u64,\n    pub cache_read_input_tokens: u64,\n    pub cache_creation_input_tokens: u64,\n    pub model_elapsed_millis: u64,\n    pub active_turn: u32,\n''',
              'app metric fields',
          )
          replace_once(
              app,
              '''    run_started_at: Option<Instant>,\n    draft_store: DraftStore,\n''',
              '''    session_started_at: Instant,\n    run_started_at: Option<Instant>,\n    draft_store: DraftStore,\n''',
              'app session clock field',
          )
          replace_once(
              app,
              '''            status: "ready".to_owned(),\n            token_count: 0,\n            active_turn: 0,\n''',
              '''            status: "ready".to_owned(),\n            input_tokens: 0,\n            output_tokens: 0,\n            cache_read_input_tokens: 0,\n            cache_creation_input_tokens: 0,\n            model_elapsed_millis: 0,\n            active_turn: 0,\n''',
              'app metric initialization',
          )
          replace_once(
              app,
              '''            question_modal: None,\n            run_started_at: None,\n            draft_store,\n''',
              '''            question_modal: None,\n            session_started_at: Instant::now(),\n            run_started_at: None,\n            draft_store,\n''',
              'app session clock initialization',
          )
          replace_once(
              app,
              '''        self.plan = None;\n        self.token_count = 0;\n        self.active_turn = 0;\n''',
              '''        self.plan = None;\n        self.input_tokens = 0;\n        self.output_tokens = 0;\n        self.cache_read_input_tokens = 0;\n        self.cache_creation_input_tokens = 0;\n        self.model_elapsed_millis = 0;\n        self.active_turn = 0;\n        self.session_started_at = Instant::now();\n''',
              'new session metric reset',
          )
          replace_once(
              app,
              '''    pub fn begin_run(&mut self) {\n        self.status = "Working".to_owned();\n        self.token_count = 0;\n        self.active_turn = 0;\n''',
              '''    pub fn begin_run(&mut self) {\n        self.status = "Working".to_owned();\n        self.active_turn = 0;\n''',
              'run must not reset session metrics',
          )
          replace_once(
              app,
              '''    pub fn add_output_tokens(&mut self, tokens: u64) {\n        self.token_count = self.token_count.saturating_add(tokens);\n    }\n\n    #[must_use]\n    pub fn elapsed_seconds(&self) -> Option<u64> {\n''',
              '''    pub fn record_usage(\n        &mut self,\n        input_tokens: u64,\n        output_tokens: u64,\n        cache_read_input_tokens: u64,\n        cache_creation_input_tokens: u64,\n        model_elapsed_millis: u64,\n    ) {\n        self.input_tokens = self.input_tokens.saturating_add(input_tokens);\n        self.output_tokens = self.output_tokens.saturating_add(output_tokens);\n        self.cache_read_input_tokens = self\n            .cache_read_input_tokens\n            .saturating_add(cache_read_input_tokens);\n        self.cache_creation_input_tokens = self\n            .cache_creation_input_tokens\n            .saturating_add(cache_creation_input_tokens);\n        self.model_elapsed_millis = self\n            .model_elapsed_millis\n            .saturating_add(model_elapsed_millis);\n    }\n\n    #[must_use]\n    pub fn total_input_tokens(&self) -> u64 {\n        self.input_tokens\n            .saturating_add(self.cache_read_input_tokens)\n            .saturating_add(self.cache_creation_input_tokens)\n    }\n\n    #[must_use]\n    pub fn cache_read_percentage(&self) -> f64 {\n        let total = self.total_input_tokens();\n        if total == 0 {\n            return 0.0;\n        }\n        self.cache_read_input_tokens as f64 * 100.0 / total as f64\n    }\n\n    #[must_use]\n    pub fn output_tokens_per_second(&self) -> Option<f64> {\n        (self.model_elapsed_millis > 0).then(|| {\n            self.output_tokens as f64 * 1_000.0 / self.model_elapsed_millis as f64\n        })\n    }\n\n    #[must_use]\n    pub fn session_elapsed_seconds(&self) -> u64 {\n        self.session_started_at.elapsed().as_secs()\n    }\n\n    #[must_use]\n    pub fn elapsed_seconds(&self) -> Option<u64> {\n''',
              'replace output-only accounting',
          )

          runtime = Path('crates/medusa-tui/src/runtime.rs')
          replace_once(
              runtime,
              '''    Usage {\n        output_tokens: u64,\n    },\n''',
              '''    Usage {\n        input_tokens: u64,\n        output_tokens: u64,\n        cache_read_input_tokens: u64,\n        cache_creation_input_tokens: u64,\n        model_elapsed_millis: u64,\n    },\n''',
              'runtime usage event',
          )

          support = Path('crates/medusa-tui/src/runtime/support.rs')
          replace_once(
              support,
              '''    sync::mpsc::Sender,\n};\n''',
              '''    sync::mpsc::Sender,\n    time::Instant,\n};\n''',
              'support instant import',
          )
          replace_once(
              support,
              '''pub(super) struct UpdateState {\n    next_tool_id: u64,\n    pending_tools: VecDeque<PendingTool>,\n}\n''',
              '''pub(super) struct UpdateState {\n    next_tool_id: u64,\n    pending_tools: VecDeque<PendingTool>,\n    model_started_at: Option<Instant>,\n}\n''',
              'update state timer',
          )
          replace_once(
              support,
              '''        Self {\n            next_tool_id: 0,\n            pending_tools: VecDeque::new(),\n        }\n''',
              '''        Self {\n            next_tool_id: 0,\n            pending_tools: VecDeque::new(),\n            model_started_at: None,\n        }\n''',
              'update state timer initialization',
          )
          replace_once(
              support,
              '''    match update {\n        AgentUpdate::Event(EventPayload::ModelResponseReceived { usage, .. }) => {\n            if let Some(output_tokens) = usage.get("output_tokens").and_then(Value::as_u64) {\n                let _ = events.send(RuntimeEvent::Usage { output_tokens });\n            }\n        }\n''',
              '''    match update {\n        AgentUpdate::Event(EventPayload::ModelRequestStarted { .. }) => {\n            state.model_started_at = Some(Instant::now());\n        }\n        AgentUpdate::Event(EventPayload::ModelResponseReceived { usage, .. }) => {\n            let model_elapsed_millis = state.model_started_at.take().map_or(0, |started_at| {\n                u64::try_from(started_at.elapsed().as_millis())\n                    .unwrap_or(u64::MAX)\n                    .max(1)\n            });\n            let _ = events.send(RuntimeEvent::Usage {\n                input_tokens: usage\n                    .get("input_tokens")\n                    .and_then(Value::as_u64)\n                    .unwrap_or_default(),\n                output_tokens: usage\n                    .get("output_tokens")\n                    .and_then(Value::as_u64)\n                    .unwrap_or_default(),\n                cache_read_input_tokens: usage\n                    .get("cache_read_input_tokens")\n                    .and_then(Value::as_u64)\n                    .unwrap_or_default(),\n                cache_creation_input_tokens: usage\n                    .get("cache_creation_input_tokens")\n                    .and_then(Value::as_u64)\n                    .unwrap_or_default(),\n                model_elapsed_millis,\n            });\n        }\n''',
              'forward full usage and timing',
          )

          session = Path('crates/medusa-tui/src/session.rs')
          replace_once(
              session,
              '''            RuntimeEvent::Usage { output_tokens } => {\n                app.add_output_tokens(output_tokens);\n            }\n''',
              '''            RuntimeEvent::Usage {\n                input_tokens,\n                output_tokens,\n                cache_read_input_tokens,\n                cache_creation_input_tokens,\n                model_elapsed_millis,\n            } => {\n                app.record_usage(\n                    input_tokens,\n                    output_tokens,\n                    cache_read_input_tokens,\n                    cache_creation_input_tokens,\n                    model_elapsed_millis,\n                );\n            }\n''',
              'session full usage handling',
          )

          render = Path('crates/medusa-tui/src/render.rs')
          replace_once(
              render,
              '''    token_count: u64,\n    elapsed_seconds: Option<u64>,\n''',
              '''    input_tokens: u64,\n    output_tokens: u64,\n    cache_read_input_tokens: u64,\n    cache_creation_input_tokens: u64,\n    model_elapsed_millis: u64,\n    run_elapsed_seconds: Option<u64>,\n    session_elapsed_seconds: u64,\n''',
              'portable snapshot metrics',
          )
          replace_once(
              render,
              '''        token_count: app.token_count,\n        elapsed_seconds: app.elapsed_seconds(),\n''',
              '''        input_tokens: app.input_tokens,\n        output_tokens: app.output_tokens,\n        cache_read_input_tokens: app.cache_read_input_tokens,\n        cache_creation_input_tokens: app.cache_creation_input_tokens,\n        model_elapsed_millis: app.model_elapsed_millis,\n        run_elapsed_seconds: app.elapsed_seconds(),\n        session_elapsed_seconds: app.session_elapsed_seconds(),\n''',
              'portable snapshot metric values',
          )
          replace_once(
              render,
              '''pub(super) fn running_status(app: &AppState) -> String {\n    format!(\n        "{} ({} · ↑ {} tokens)",\n        app.status,\n        format_elapsed(app.elapsed_seconds().unwrap_or_default()),\n        format_token_count(app.token_count)\n    )\n}\n''',
              '''pub(super) fn running_status(app: &AppState) -> String {\n    format!(\n        "{} ({} · turn {})",\n        app.status,\n        format_elapsed(app.elapsed_seconds().unwrap_or_default()),\n        app.active_turn\n    )\n}\n\npub(super) fn session_metrics_line(app: &AppState) -> String {\n    let rate = app.output_tokens_per_second().map_or_else(\n        || "—".to_owned(),\n        format_token_rate,\n    );\n    format!(\n        "session {} · in {} · out {} · cached {} ({:.0}%) · {rate} tok/s",\n        format_elapsed(app.session_elapsed_seconds()),\n        format_token_count(app.total_input_tokens()),\n        format_token_count(app.output_tokens),\n        format_token_count(app.cache_read_input_tokens),\n        app.cache_read_percentage(),\n    )\n}\n\nfn format_token_rate(tokens_per_second: f64) -> String {\n    if tokens_per_second < 1_000.0 {\n        return format!("{tokens_per_second:.1}");\n    }\n    format!("{:.1}k", tokens_per_second / 1_000.0)\n}\n''',
              'render metrics line',
          )
          replace_once(
              render,
              '''        ResetColor,\n        Print("\\r\\n"),\n    )?;\n    let header_height = HEADER_TOP_PADDING + 4;\n''',
              '''        ResetColor,\n        Print("\\r\\n"),\n    )?;\n    StyledLine::new(session_metrics_line(app), Color::DarkGrey).print(stdout, width)?;\n    let header_height = HEADER_TOP_PADDING + 5;\n''',
              'legacy header metrics row',
          )
          replace_once(
              render,
              '''    set_frame_line(\n        &mut frame,\n        row,\n        StyledLine::new(\n            format!(\n                "{} {}",\n                app.model_label.as_deref().unwrap_or(&identity.model),\n                app.effort_label.as_deref().unwrap_or(&identity.effort)\n            ),\n            Color::Magenta,\n        ),\n    );\n\n    let header_height = HEADER_TOP_PADDING + 4;\n''',
              '''    set_frame_line(\n        &mut frame,\n        row,\n        StyledLine::new(\n            format!(\n                "{} {}",\n                app.model_label.as_deref().unwrap_or(&identity.model),\n                app.effort_label.as_deref().unwrap_or(&identity.effort)\n            ),\n            Color::Magenta,\n        ),\n    );\n    row = row.saturating_add(1);\n    set_frame_line(\n        &mut frame,\n        row,\n        StyledLine::new(session_metrics_line(app), Color::DarkGrey),\n    );\n\n    let header_height = HEADER_TOP_PADDING + 5;\n''',
              'retained header metrics row',
          )

          runtime_tests = Path('crates/medusa-tui/src/runtime/tests.rs')
          runtime_text = runtime_tests.read_text()
          marker = '''#[test]\nfn tool_call_is_shown_as_one_high_level_row() {\n'''
          test = '''#[test]\nfn provider_usage_forwards_input_output_cache_and_model_time() {\n    let (sender, receiver) = mpsc::channel();\n    let mut state = UpdateState::new();\n    forward_update(\n        &AgentUpdate::Event(EventPayload::ModelRequestStarted {\n            provider: "minimax".to_owned(),\n            model: "MiniMax-M3".to_owned(),\n        }),\n        &sender,\n        &mut state,\n    );\n    forward_update(\n        &AgentUpdate::Event(EventPayload::ModelResponseReceived {\n            response_id: Some("response-1".to_owned()),\n            usage: json!({\n                "input_tokens": 120,\n                "output_tokens": 30,\n                "cache_read_input_tokens": 80,\n                "cache_creation_input_tokens": 20\n            }),\n        }),\n        &sender,\n        &mut state,\n    );\n\n    assert!(matches!(\n        receiver.recv().expect("usage event"),\n        RuntimeEvent::Usage {\n            input_tokens: 120,\n            output_tokens: 30,\n            cache_read_input_tokens: 80,\n            cache_creation_input_tokens: 20,\n            model_elapsed_millis,\n        } if model_elapsed_millis >= 1\n    ));\n}\n\n#[test]\nfn tool_call_is_shown_as_one_high_level_row() {\n'''
          if runtime_text.count(marker) != 1:
              raise SystemExit('runtime usage test marker missing')
          runtime_tests.write_text(runtime_text.replace(marker, test, 1))

          lib = Path('crates/medusa-tui/src/lib.rs')
          lib_text = lib.read_text()
          old_test = '''    #[test]\n    fn running_status_includes_elapsed_time_and_tokens() {\n        let directory = tempfile::tempdir().expect("tempdir");\n        let mut app = AppState::new(\n            directory.path().to_path_buf(),\n            "status-test",\n            "",\n            Arc::new(UnsupportedClipboard),\n        )\n        .expect("app");\n        app.begin_run();\n        app.add_output_tokens(1_200);\n        assert_eq!(running_status(&app), "Working (0s · ↑ 1.2k tokens)");\n    }\n'''
          new_test = '''    #[test]\n    fn running_status_and_header_metrics_use_real_accounting() {\n        let directory = tempfile::tempdir().expect("tempdir");\n        let mut app = AppState::new(\n            directory.path().to_path_buf(),\n            "status-test",\n            "",\n            Arc::new(UnsupportedClipboard),\n        )\n        .expect("app");\n        app.begin_run();\n        app.update_turn(3);\n        app.record_usage(700, 1_200, 200, 100, 2_000);\n        assert_eq!(running_status(&app), "Working (0s · turn 3)");\n        assert_eq!(\n            session_metrics_line(&app),\n            "session 0s · in 1.0k · out 1.2k · cached 200 (20%) · 600.0 tok/s"\n        );\n    }\n\n    #[test]\n    fn new_session_resets_all_usage_totals() {\n        let directory = tempfile::tempdir().expect("tempdir");\n        let mut app = AppState::new(\n            directory.path().to_path_buf(),\n            "metrics-reset",\n            "",\n            Arc::new(UnsupportedClipboard),\n        )\n        .expect("app");\n        app.record_usage(10, 20, 30, 40, 500);\n        app.clear_for_new_session();\n        assert_eq!(app.total_input_tokens(), 0);\n        assert_eq!(app.output_tokens, 0);\n        assert_eq!(app.cache_read_input_tokens, 0);\n        assert_eq!(app.cache_creation_input_tokens, 0);\n        assert_eq!(app.model_elapsed_millis, 0);\n        assert_eq!(app.output_tokens_per_second(), None);\n    }\n'''
          if lib_text.count(old_test) != 1:
              raise SystemExit('render status test marker missing')
          lib.write_text(lib_text.replace(old_test, new_test, 1))

          readme = Path('README.md')
          replace_once(
              readme,
              '''Typing `/` filters both built-in commands and installed skills; Tab completes the selected entry, and newly installed skills appear without restarting Medusa.\n\n### Browser tools\n''',
              '''Typing `/` filters both built-in commands and installed skills; Tab completes the selected entry, and newly installed skills appear without restarting Medusa.\n\nThe TUI header reports live session duration, cumulative input/output tokens, cache-read tokens and hit percentage, and output throughput. Input totals include uncached, cache-read, and cache-creation tokens; throughput is based only on measured provider response time. `/new` resets the session metrics.\n\n### Browser tools\n''',
              'README metrics documentation',
          )
          PY
          cargo fmt --all
          git diff --check
          cargo test -p medusa-tui runtime::tests::provider_usage_forwards_input_output_cache_and_model_time -- --exact --nocapture
          cargo test -p medusa-tui tests::running_status_and_header_metrics_use_real_accounting -- --exact --nocapture
          cargo test -p medusa-tui tests::new_session_resets_all_usage_totals -- --exact --nocapture
      - name: Capture diagnostics
        if: failure()
        shell: bash
        run: |
          git diff > tui-session-metrics.patch
          cargo test -p medusa-tui 2>&1 | tee tui-session-metrics-tests.log || true
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tui-session-metrics-diagnostics
          path: |
            tui-session-metrics.patch
            tui-session-metrics-tests.log
          if-no-files-found: error
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md crates/medusa-tui/src/app.rs crates/medusa-tui/src/lib.rs crates/medusa-tui/src/render.rs crates/medusa-tui/src/runtime.rs crates/medusa-tui/src/runtime/support.rs crates/medusa-tui/src/runtime/tests.rs crates/medusa-tui/src/session.rs
          git commit -m "feat(tui): add live session metrics"
          git push origin HEAD:feat/tui-session-metrics
