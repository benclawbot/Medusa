name: Apply independent runtime capability fix

on:
  push:
    branches:
      - fix/independent-runtime-capability-grounding

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/independent-runtime-capability-grounding
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Patch runtime identity and capability grounding
        shell: python
        run: |
          from pathlib import Path

          engine = Path('crates/medusa-agent/src/engine.rs')
          text = engine.read_text(encoding='utf-8')
          old = 'You are Medusa, an autonomous coding agent. Inspect the repository,'
          new = (
              'You are Medusa, an independent autonomous coding agent. You are not Claude Code, '
              'Codex, ChatGPT, or a wrapper around another coding assistant. Never read or infer '
              'your identity, model, tools, permissions, memory, or limits from ~/.claude, '
              'CLAUDE.md, settings.json, or another product\'s configuration. The active Medusa '
              'configuration and the live runtime capability matrix in this system prompt are the '
              'only authoritative sources for those facts. Do not recite generic model limitations '
              'or claim a capability is absent when its runtime entry is available. Inspect the repository,'
          )
          if old not in text:
              raise SystemExit('standard system prompt anchor not found')
          text = text.replace(old, new, 1)
          old_plan = 'You are Medusa in read-only planning mode. Inspect the repository'
          new_plan = (
              'You are Medusa, an independent coding agent, in read-only planning mode. You are not '
              'Claude Code or a wrapper around another assistant, and must not derive identity, model, '
              'configuration, tools, or limits from ~/.claude, CLAUDE.md, settings.json, or another '
              'product. Trust only Medusa configuration and the live runtime capability matrix. '
              'Inspect the repository'
          )
          if old_plan not in text:
              raise SystemExit('planning system prompt anchor not found')
          engine.write_text(text.replace(old_plan, new_plan, 1), encoding='utf-8')

          support = Path('crates/medusa-agent/src/engine_support.rs')
          text = support.read_text(encoding='utf-8')
          text = text.replace(
              'No Medusa or Claude skills are installed for this workspace or user.',
              'No Medusa skills are installed for this workspace or user.',
          )
          old_sources = '["AGENTS.md", "CLAUDE.md", "MEDUSA.md", ".medusa/AGENTS.md"]'
          new_sources = '["AGENTS.md", "MEDUSA.md", ".medusa/AGENTS.md"]'
          if old_sources not in text:
              raise SystemExit('repository instruction source anchor not found')
          text = text.replace(old_sources, new_sources, 1)
          assertion = 'assert!(prompt.contains("Runtime capabilities (shared with every Medusa frontend):"));'
          replacement = assertion + '''
          assert!(prompt.contains("independent autonomous coding agent"));
          assert!(prompt.contains("live runtime capability matrix"));
          assert!(!prompt.contains("--- CLAUDE.md ---"));'''
          if assertion not in text:
              raise SystemExit('prompt regression test anchor not found')
          support.write_text(text.replace(assertion, replacement, 1), encoding='utf-8')

          Path('.github/workflows/fix-independent-runtime.yml').unlink()
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test focused crates
        run: cargo test -p medusa-agent -p medusa-config -p medusa-capabilities
      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add crates/medusa-agent/src/engine.rs crates/medusa-agent/src/engine_support.rs .github/workflows/fix-independent-runtime.yml
          git commit -m "fix: keep Medusa identity and capabilities independent"
          git push origin HEAD:fix/independent-runtime-capability-grounding
