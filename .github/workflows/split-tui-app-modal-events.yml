name: Split TUI app modal events

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/split-tui-app-modal-events.yml'
      - 'crates/medusa-tui/src/app.rs'
      - 'crates/medusa-tui/src/app/modal_events.rs'

permissions:
  contents: write

concurrency:
  group: split-tui-app-modal-events-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  split:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Extract modal event handlers
        shell: python
        run: |
          from pathlib import Path

          app_path = Path('crates/medusa-tui/src/app.rs')
          module_path = Path('crates/medusa-tui/src/app/modal_events.rs')
          app = app_path.read_text()
          module_decl = 'mod modal_events;\n'
          if module_decl not in app:
              anchor = 'mod models;\n'
              if app.count(anchor) != 1:
                  raise SystemExit('expected one models module declaration')
              app = app.replace(anchor, anchor + module_decl, 1)

          start_marker = '    fn handle_model_modal_event'
          end_marker = '    pub fn paste_from_clipboard'
          if start_marker in app:
              start = app.index(start_marker)
              end = app.index(end_marker, start)
              handlers = app[start:end].rstrip()
              handlers = handlers.replace(
                  '    fn handle_model_modal_event',
                  '    pub(super) fn handle_model_modal_event',
                  1,
              ).replace(
                  '    fn handle_question_modal_event',
                  '    pub(super) fn handle_question_modal_event',
                  1,
              )
              module = 'use crossterm::event::{Event, KeyCode, KeyEventKind, KeyModifiers};\n\nuse super::*;\n\nimpl AppState {\n' + handlers + '\n}\n'
              module_path.write_text(module)
              app = app[:start] + app[end:]
          else:
              if not module_path.exists():
                  raise SystemExit('handlers absent but modal_events.rs missing')
              module = module_path.read_text()
              for required in [
                  'pub(super) fn handle_model_modal_event',
                  'pub(super) fn handle_question_modal_event',
              ]:
                  if required not in module:
                      raise SystemExit(f'missing extracted handler: {required}')

          app_path.write_text(app)
      - name: Format and verify
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          bash scripts/check-source-size.sh
          cargo test -p medusa-tui internal_plan_transport_is_hidden_and_assistant_text_is_forwarded_verbatim -- --exact
          cargo test -p medusa-tui conversation_preserves_user_and_medusa_multiline_text -- --exact
          cargo test -p medusa-tui clarification_question_and_confirmed_answer_stay_in_transcript -- --exact
          cargo test -p medusa-tui question_modal_tabs_answers_and_requires_confirmation_before_submission -- --exact
          cargo test -p medusa-tui model_form_requires_explicit_apply_and_updates_effort_and_session_key -- --exact
          cargo test -p medusa-tui spacebar_is_inserted_as_regular_text -- --exact
          cargo test -p medusa-tui ctrl_v_pastes_clipboard_content -- --exact
      - name: Commit extraction
        run: |
          if git diff --quiet; then
            echo 'Extraction already applied and verified.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add crates/medusa-tui/src/app.rs crates/medusa-tui/src/app/modal_events.rs
          git commit -m 'refactor(tui): extract modal event handlers'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
